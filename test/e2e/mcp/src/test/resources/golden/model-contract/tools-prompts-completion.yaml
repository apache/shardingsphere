prompts:
  - name: database_gateway_plan_encrypt_rule
    title: Plan Encrypt Rule
    arguments:
      - name: database
        required: false
      - name: schema
        required: false
      - name: table
        required: false
      - name: column
        required: false
      - name: algorithm_type
        required: false
      - name: plan_id
        required: false
  - name: database_gateway_plan_mask_rule
    title: Plan Mask Rule
    arguments:
      - name: database
        required: false
      - name: schema
        required: false
      - name: table
        required: false
      - name: column
        required: false
      - name: algorithm_type
        required: false
      - name: plan_id
        required: false
  - name: inspect_metadata
    title: Inspect Metadata
    arguments:
      - name: database
        required: false
      - name: schema
        required: false
      - name: query
        required: false
  - name: recover_workflow
    title: Recover Workflow
    arguments:
      - name: plan_id
        required: false
      - name: failure_summary
        required: false
  - name: safe_sql_execution
    title: Safe SQL Execution
    arguments:
      - name: database
        required: true
      - name: schema
        required: false
      - name: sql_intent
        required: true
inspectMetadataPrompt:
  description: Guide the model to inspect ShardingSphere logical metadata by reading capability and metadata resources before choosing database_gateway_search_metadata or detail resources.
  messages:
    - role: user
      contentType: text
      textSha256: 46c516e34c28ceda71e28eb81d7a02efc9532e1cb70adb0fc3eaa5c8e3d69a67
missingContextCompletion:
  completion:
    values: []
    total: 0
    hasMore: false
  _meta:
    org.apache.shardingsphere/response-mode: list
    org.apache.shardingsphere/reference-type: prompt
    org.apache.shardingsphere/reference: inspect_metadata
    org.apache.shardingsphere/argument: schema
    org.apache.shardingsphere/prefix: pub
    org.apache.shardingsphere/match-strategy: contains_fallback
    org.apache.shardingsphere/context-arguments: {}
    org.apache.shardingsphere/candidate-count: 0
    org.apache.shardingsphere/matched-candidate-count: 0
    org.apache.shardingsphere/returned-candidate-count: 0
    org.apache.shardingsphere/continuation-mode: none
    org.apache.shardingsphere/missing-context-arguments:
      - database
    org.apache.shardingsphere/diagnostic: missing_context
    org.apache.shardingsphere/recovery:
      response_mode: recovery
      recovery_category: missing_context
      category: missing_context
      diagnostic: missing_context
      requested_token: pub
      missing_fields:
        - database
      parent_resource_uri: shardingsphere://databases
    org.apache.shardingsphere/next-actions:
      - order: 1
        type: resource_read
        title: Read resource
        requires_user_approval: false
        reason: Read the nearest metadata resource before retrying this completion.
        resource_uri: shardingsphere://databases
    org.apache.shardingsphere/ranking-policy:
      - exact-prefix-match
      - contains-fallback-when-prefix-has-no-match
      - recent-plan-first-for-plan_id
      - case-insensitive-lexical
    org.apache.shardingsphere/value-details: []
