response_mode: catalog
model_first_summary:
  official_discovery_methods:
    tools: tools/list
    resources: resources/list
    resource_templates: resources/templates/list
    prompts: prompts/list
    completions: completion/complete
  catalog_resource_role: "shardingsphere://capabilities is a ShardingSphere domain catalog resource, not the MCP protocol discovery source."
  safe_first_resource: shardingsphere://capabilities
  metadata_rule:
    first_resource: shardingsphere://databases
    search_tool: database_gateway_search_metadata
    detail_rule: Read the returned resource.uri when the list or search response points to a detail resource.
  sql_tool_selection:
    read_only:
      tool: database_gateway_execute_query
      statement_rule: Use for one SELECT or EXPLAIN ANALYZE statement.
    side_effecting:
      tool: database_gateway_execute_update
      first_mode: preview
      execute_requires: approved_by_user=true
  side_effect_rule: Never execute side effects before preview and explicit user approval.
  workflow_rule:
    planning_tools:
      - database_gateway_plan_encrypt_rule
      - database_gateway_plan_mask_rule
    preview_tool:
      tool: database_gateway_apply_workflow
      execution_mode: preview
    execute_tool:
      tool: database_gateway_apply_workflow
      execution_mode: review-then-execute
      execute_requires: approved_by_user=true
    validate_tool: database_gateway_validate_workflow
  completion_rule: Use MCP completion for missing database, schema, table, column, index, or sequence values before guessing identifiers.
  recovery_rule: Follow structured recovery.next_actions before inventing a replacement call.
model_contract:
  public_surface_source: "Official MCP discovery methods: tools/list, resources/list, resources/templates/list, prompts/list, completion/complete."
  official_discovery_methods:
    tools: tools/list
    resources: resources/list
    resource_templates: resources/templates/list
    prompts: prompts/list
    completions: completion/complete
  safe_first_resource: shardingsphere://capabilities
  metadata_first_resource: shardingsphere://databases
  sql_tool_selection:
    read_only: Use database_gateway_execute_query for one SELECT or EXPLAIN ANALYZE statement.
    side_effecting: Use database_gateway_execute_update with execution_mode=preview before asking for user approval.
  workflow_session_rule: Reuse the current-session plan_id returned by a planning tool; re-plan when the plan is unavailable.
  side_effect_rule: Preview before side effects and continue only after explicit user approval with approved_by_user=true.
  next_action_rule: "Use canonical next_actions fields: type, tool_name, resource_uri, arguments, and requires_user_approval."
  detail_resource_rule: Read each resource payload_contract before assuming detail fields.
  recovery_rule: When a call fails with recovery.next_actions, follow those structured actions before inventing a new call.
surface_summary:
  first_protocol_methods:
    tools: tools/list
    resources: resources/list
    resource_templates: resources/templates/list
    prompts: prompts/list
    completions: completion/complete
  catalog_resource: shardingsphere://capabilities
  metadata_resource: shardingsphere://databases
  metadata_search_tool: database_gateway_search_metadata
  read_only_sql_tool: database_gateway_execute_query
  side_effect_sql_tool: database_gateway_execute_update
  workflow_tools:
    - database_gateway_apply_workflow
    - database_gateway_validate_workflow
  approval_rule: Preview first and continue only after explicit user approval when requires_user_approval is true.
  completion_rule: Use local completion hints on fields, prompts, and resources before guessing identifiers.
field_naming_contract:
  protocol_methods:
    - tools/list
    - resources/list
    - resources/templates/list
    - prompts/list
    - completion/complete
  catalog_fields:
    - supportedResources
    - supportedTools
    - resourceTemplates
    - completionTargets
    - resourceNavigation
    - protocolAvailability
  payload_fields: ShardingSphere-owned structured payload fields use snake_case.
  descriptor_fields: Descriptor-derived MCP schema fields keep the protocol or JSON Schema field names required by MCP clients.
  alias_rule: Do not assume camelCase and snake_case variants are aliases unless the same descriptor explicitly documents both.
  cleanup_rule: Prefer one canonical ShardingSphere payload field over parallel compatibility aliases.
next_action_contract:
  - type: resource_read
    required_fields:
      - order
      - type
      - title
      - resource_uri
      - requires_user_approval
    optional_fields:
      - reason
      - depends_on
    description: Read an MCP resource before choosing another call.
  - type: tool_call
    required_fields:
      - order
      - type
      - title
      - tool_name
      - arguments
      - requires_user_approval
    optional_fields:
      - reason
      - depends_on
    description: Call another MCP tool with server-suggested arguments.
  - type: completion
    required_fields:
      - order
      - type
      - title
      - reference_type
      - reference
      - argument_name
      - context_arguments
      - requires_user_approval
    optional_fields:
      - argument_prefix
      - missing_context_arguments
      - resume_target_type
      - resume_target
      - resume_arguments
      - reason
      - depends_on
    description: Use MCP completion for one argument before retrying.
  - type: ask_user
    required_fields:
      - order
      - type
      - title
      - question
      - requires_user_approval
    optional_fields:
      - required_inputs
      - reason
      - depends_on
    description: Ask the user for missing input or approval.
  - type: terminal
    required_fields:
      - order
      - type
      - title
      - requires_user_approval
    optional_fields:
      - reason
      - depends_on
    description: Stop the current MCP flow and report the result.
common_flows:
  - flow_id: inspect_metadata
    steps:
      - resources/list
      - resources/templates/list
      - read_resource shardingsphere://databases
      - call_tool database_gateway_search_metadata
      - read_resource returned resource.uri
    stop_condition: Stop when the requested metadata detail resource is read.
    referenced_tools:
      - database_gateway_search_metadata
    referenced_resources:
      - shardingsphere://databases
  - flow_id: read_only_sql
    steps:
      - read_resource shardingsphere://databases/{database}/capabilities
      - call_tool database_gateway_execute_query
    stop_condition: Use one SELECT or EXPLAIN ANALYZE statement and stop after the result is reported.
    referenced_tools:
      - database_gateway_execute_query
    referenced_resources:
      - shardingsphere://databases/{database}/capabilities
  - flow_id: side_effecting_sql
    steps:
      - call_tool database_gateway_execute_update execution_mode=preview
      - ask_user approved_by_user
      - call_tool database_gateway_execute_update execution_mode=execute approved_by_user=true
    stop_condition: Never execute until the previewed SQL and side-effect scope are approved by the user.
    referenced_tools:
      - database_gateway_execute_update
    referenced_resources: []
  - flow_id: workflow_plan_apply_validate
    steps:
      - call_tool descriptor-backed feature planning tool
      - call_tool database_gateway_apply_workflow execution_mode=preview
      - ask_user approved_by_user
      - call_tool database_gateway_apply_workflow review-then-execute approved_by_user=true
      - call_tool database_gateway_validate_workflow
    stop_condition: Reuse the same current-session plan_id and stop after validation succeeds.
    referenced_tools:
      - database_gateway_apply_workflow
      - database_gateway_validate_workflow
    referenced_resources: []
  - flow_id: recover_from_error
    steps:
      - follow recovery.next_actions
      - prefer official discovery methods when surface information is needed
      - read_resource shardingsphere://capabilities only when the server suggests the catalog resource
      - ask_user only when uncertain
    stop_condition: Do not invent replacement calls while structured recovery actions are present.
    referenced_tools: []
    referenced_resources:
      - shardingsphere://capabilities
