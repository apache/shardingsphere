transport:
  type: STDIO

runtimeDatabases:
  # Configure this entry before startup.
  # Replace logic_db, JDBC URL, username, and password with your ShardingSphere-Proxy logical database.
  logic_db:
    databaseType: MySQL
    jdbcUrl: "jdbc:mysql://127.0.0.1:3307/logic_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC"
    username: "proxy_user"
    password: "proxy_password"
    driverClassName: com.mysql.cj.jdbc.Driver
