# Building with jdk11 and running tests with jdk8,
# see https://github.com/apache/shardingsphere/blob/master/.github/workflows/ci.yml

variables:
  JDK_BUILD_IMAGE: registry.red-soft.biz:5000/jdk/temurin-11-jdk
  JDK_TEST_IMAGE: registry.red-soft.biz:5000/jdk/temurin-8-jdk
  RELEASEHUB_CLIENT_IMAGE: registry.red-soft.biz:5000/utils/red-release-manager/client:master
  M2_SETTINGSFILE: ${CI_PROJECT_DIR}/ci/settings.xml
  CI_URL: ${CI_PROJECT_URL}/pipelines/${CI_PIPELINE_ID}
  BUILD_TYPE: commit
  MAVEN_OPTS: "-Dhttp.keepAlive=false -Dmaven.wagon.http.pool=false -Dmaven.wagon.http.retryHandler.class=standard -Dmaven.wagon.http.retryHandler.count=3 -Dspotless.apply.skip=true"

stages:
  - prepare
  - build
  - test
  - deploy

workflow:
  rules:
    - if: $CI_COMMIT_BRANCH == "master" && $CI_COMMIT_TAG
      when: always
    - if: $CI_PIPELINE_SOURCE == "web"
    - if: $CI_COMMIT_TAG

######
# Templates
######
.build-proxy-native-template:
  image: docker
  services:
    - name: docker:dind
      entrypoint: [ "dockerd-entrypoint.sh" ]
      command: [ "--insecure-registry", "registry.red-soft.biz:5000", "--registry-mirror", "http://registry-mirror.red-soft.biz:6000" ]
  parallel:
    matrix:
      - TYPE: [ "mostly", "dynamic"] # 'static' is currently not compiling
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_BUILD_TOKEN" "$DOCKER_ENV_CI_REGISTRY"
  dependencies:
    - build_environment
  variables:
    DOCKERFILES: "distribution/proxy-native"
    OUT_IMAGE: registry.red-soft.biz:5000/red-sharding/proxy-native:${PROJECT_VERSION}-${TYPE}



######
# Preparation
######

build_environment:
  tags: ["docker", "linux", "x86_64"]
  stage: prepare
  image: $JDK_BUILD_IMAGE
  script:
    - apt update && DEBIAN_FRONTEND=noninteractive apt install -y libxml2-utils m4
    - PROJECT_VERSION=$(xmllint --xpath "/*[local-name()='project']/*[local-name()='version']/text()" pom.xml)
    - echo PROJECT_VERSION=${PROJECT_VERSION} >> build.env
    - m4 -DRSHRD_VERSION=${PROJECT_VERSION} ci/artifacts.m4 >> ci/artifacts
  artifacts:
    reports:
      dotenv: build.env
    paths:
      - ci/artifacts


######
# Building
######
proxy-native-docker:
  extends: .build-proxy-native-template
  stage: build
  script:
    - docker build . -f ${DOCKERFILES}/Dockerfile-linux-${TYPE} --build-arg PROJECT_VERSION=${PROJECT_VERSION} -t ${OUT_IMAGE}
    - docker push ${OUT_IMAGE}
    - docker rmi ${OUT_IMAGE}
    #- echo ${OUT_IMAGE} >> ci/docker-containers-${PROJECT_VERSION}.txt
  #artifacts:
  #  paths:
  #    - ci/docker-containers-${PROJECT_VERSION}.txt

java11:
  tags: ["docker", "linux", "x86_64"]
  stage: build
  image: $JDK_BUILD_IMAGE
  variables:
    ARTIFACTS_DIR: ${CI_PROJECT_DIR}/${PROJECT_VERSION}
  script:
    - ./mvnw -s ${M2_SETTINGSFILE} clean package -Prelease,db-firebird -T1C -DskipTests -Djacoco.skip=true -Dcheckstyle.skip=true -Drat.skip=true -Dmaven.javadoc.skip=true -B
    - mkdir -pv ${ARTIFACTS_DIR}
    - cp -v distribution/{jdbc,proxy,agent}/target/*.{tar.gz,tar.gz.sha512} ${ARTIFACTS_DIR}
    # Package command: .\mvnw.cmd clean package -P release,db-firebird -D skipTests -f pom.xml
  artifacts:
    paths:
      - ${ARTIFACTS_DIR}
  dependencies:
    - build_environment

######
# Testing
######
java8:
  tags: ["docker", "linux", "x86_64"]
  stage: test
  #rules:
    #- if: $CI_COMMIT_BRANCH == "master"
  image: $JDK_TEST_IMAGE
  dependencies:
    - java11
  script:
    - ./mvnw -s ${M2_SETTINGSFILE} install -T1C -B -ntp -fae
    #- ./mvnw -s ${M2_SETTINGSFILE} test -P release,db-firebird -f pom.xml
  allow_failure: true

######
# Deploying
######
# Auth key for release hub is pulled from group envvars
release_hub:
  stage: deploy
  tags: ["docker", "x86_64", "linux"]
  image: $RELEASEHUB_CLIENT_IMAGE
  script:
    - relmanager_client deploy rshrd ${PROJECT_VERSION} --artifacts ci/artifacts # TODO--ci-url ${CI_URL} --context ${BUILD_TYPE}
  only:
    variables:
      - $RELEASE_HUB_KEY