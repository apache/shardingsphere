# Building with jdk11 and running tests with jdk8,
# see https://github.com/apache/shardingsphere/blob/master/.github/workflows/ci.yml

variables:
  JDK_BUILD_IMAGE: registry.red-soft.biz:5000/jdk/temurin-11-jdk
  JDK_TEST_IMAGE: registry.red-soft.biz:5000/jdk/temurin-8-jdk
  RELEASEHUB_CLIENT_IMAGE: registry.red-soft.biz:5000/utils/red-release-manager/client:master
  M2_DIR: /root/.m2
  MAVEN_OPTS: "-Dhttp.keepAlive=false -Dmaven.wagon.http.pool=false -Dmaven.wagon.http.retryHandler.class=standard -Dmaven.wagon.http.retryHandler.count=3 -Dspotless.apply.skip=true"

stages:
  - prepare
  - build
  - test
  - deploy


workflow:
  rules:
    - if: $CI_COMMIT_BRANCH == "master"
      when: always
    - if: $CI_PIPELINE_SOURCE == "push"

prepare_build_env:
  tags: ["docker", "linux", "x86_64"]
  stage: prepare
  image: $JDK_BUILD_IMAGE
  script:
    - if [ ! -d ${M2_DIR} ]; then mkdir -pv ${M2_DIR}; fi
    - cp ${CI_PROJECT_DIR}/ci/settings.xml ~/.m2
    - apt update && DEBIAN_FRONTEND=noninteractive apt install -y libxml2-utils
    - echo PROJECT_VERSION=$(xmllint --xpath "/*[local-name()='project']/*[local-name()='version']/text()" pom.xml) >> build.env
  artifacts:
    paths:
      - ${CI_PROJECT_ROOT}/${PROJECT_VERSION}
    reports:
      dotenv: build.env


build_java11:
  tags: ["docker", "linux", "x86_64"]
  stage: build
  image: $JDK_BUILD_IMAGE
  script:
    - ./mvnw clean install -Prelease -T1C -DskipTests -Djacoco.skip=true -Dcheckstyle.skip=true -Drat.skip=true -Dmaven.javadoc.skip=true -B
    - mkdir -pv ${CI_PROJECT_ROOT}/${PROJECT_VERSION} #/{jdbc,proxy,agent}
    - cp -v distribution/{jdbc,proxy,agent}/target/*.{tar.gz,tar.gz.sha512} ${CI_PROJECT_ROOT}/${PROJECT_VERSION}
  cache:
    paths:
      - ${M2_DIR}
  artifacts:
    paths:
      - ${CI_PROJECT_ROOT}/${PROJECT_VERSION}
  dependencies:
    - prepare_build_env

test_java8:
  tags: ["docker", "linux", "x86_64"]
  stage: test
  image: $JDK_TEST_IMAGE
  cache:
    paths:
      - ${M2_DIR}
  dependencies:
    - build_java11
  script:
    - ./mvnw install -T1C -B -ntp -fae


# relhub deploy example:
# http://git.red-soft.biz/red-database/red-database/-/blob/master/.gitlab-ci.yml#L779

# TODO: add release hub key (client pulls it from system envvars)
deploy_to_release_hub:
  stage: deploy
  tags: ["docker", "x86_64", "linux"]
  image: $RELEASEHUB_CLIENT_IMAGE
  script:
    - printf ${PROJECT_VERSION}