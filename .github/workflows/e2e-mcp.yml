name: E2E - MCP

on:
  pull_request:
    branches: [ master ]
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
    paths:
      - '.github/workflows/e2e-mcp.yml'
      - '.github/workflows/resources/actions/download-e2e-artifacts/**'
      - '.github/workflows/resources/actions/setup-build-environment/**'
      - '.github/workflows/resources/actions/upload-e2e-artifacts/**'
      - 'pom.xml'
      - 'database/connector/**'
      - 'distribution/mcp/**'
      - 'mcp/**'
      - 'test/e2e/pom.xml'
      - 'test/e2e/env/**'
      - 'test/e2e/mcp/**'
  schedule:
    - cron: '0 19 * * 1-5'
  workflow_dispatch:

concurrency:
  group: e2e-mcp-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  MAVEN_OPTS: -Dhttp.keepAlive=false -Dmaven.wagon.http.pool=false -Dmaven.wagon.http.retryHandler.class=standard -Dmaven.wagon.http.retryHandler.count=3 -Dspotless.apply.skip=true
  MCP_DISTRIBUTION_IMAGE: apache/shardingsphere-mcp-e2e:local

jobs:
  e2e-mcp-build-images:
    name: E2E - MCP Build Images
    if: github.repository == 'apache/shardingsphere'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6.0.1
      - uses: ./.github/workflows/resources/actions/setup-build-environment
        with:
          java-version: '21'
          cache-suffix: 'e2e-mcp'
          cache-save-enabled: 'false'
          enable-docker-setup: 'true'
      - name: Check Docker Environment
        run: |
          docker version
          docker system df
      - name: Build MCP E2E Test Dependencies and Distribution
        run: ./mvnw -pl test/e2e/mcp,distribution/mcp -am install -DskipTests -DskipITs -Dspotless.skip=true -B -ntp
      - name: Run MCP E2E Harness Tests
        run: ./mvnw -pl test/e2e/mcp test -DskipITs -Dspotless.skip=true -Dtest='*Test,!*E2ETest' -Dsurefire.failIfNoSpecifiedTests=true -T1C -B -ntp
      - name: Build MCP Distribution Image
        run: |
          docker build \
            --platform "$(docker version --format '{{.Server.Os}}/{{.Server.Arch}}')" \
            -f distribution/mcp/Dockerfile \
            -t "${{ env.MCP_DISTRIBUTION_IMAGE }}" \
            distribution/mcp/target
      - name: Package MCP Distribution Home
        shell: bash
        run: |
          set -euo pipefail
          artifact_dir="${RUNNER_TEMP}/mcp-e2e-build-artifacts"
          mkdir -p "${artifact_dir}"
          distribution_home="$(find distribution/mcp/target -maxdepth 1 -type d -name 'apache-shardingsphere-mcp-*' | head -n 1)"
          if [[ -z "${distribution_home}" ]]; then
            echo "Packaged MCP distribution was not found." 1>&2
            exit 1
          fi
          tar -czf "${artifact_dir}/mcp-distribution-home.tar.gz" -C distribution/mcp/target "$(basename "${distribution_home}")"
      - name: Upload MCP E2E Build Artifacts
        uses: ./.github/workflows/resources/actions/upload-e2e-artifacts
        with:
          artifact-name: mcp-e2e-build-artifacts
          artifact-dir: ${{ runner.temp }}/mcp-e2e-build-artifacts
          docker-images: |
            ${{ env.MCP_DISTRIBUTION_IMAGE }}=mcp-distribution-image.tar

  e2e-mcp-build-llm-image:
    name: E2E - MCP Build LLM Image
    if: github.repository == 'apache/shardingsphere'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6.0.1
      - name: Check Docker Environment
        run: |
          docker version
          docker system df
      - name: Build MCP LLM Runtime Image
        id: mcp-llm-runtime-image
        shell: bash
        run: |
          set -euo pipefail
          build_script="test/e2e/mcp/src/test/resources/docker/llm-runtime/build-local.sh"
          image_tag="$(sh "${build_script}" --print | sed -n 's/^image_tag=//p')"
          if [[ -z "${image_tag}" || "${image_tag}" == *$'\n'* ]]; then
            echo "MCP LLM build script must print exactly one non-empty image_tag." >&2
            exit 1
          fi
          printf 'image_tag=%s\n' "${image_tag}" >> "${GITHUB_OUTPUT}"
          sh "${build_script}"
      - name: Upload MCP LLM Runtime Image
        uses: ./.github/workflows/resources/actions/upload-e2e-artifacts
        with:
          artifact-name: mcp-e2e-llm-runtime-image
          artifact-dir: ${{ runner.temp }}/mcp-e2e-llm-runtime-artifacts
          include-maven-repository: 'false'
          docker-images: |
            ${{ steps.mcp-llm-runtime-image.outputs.image_tag }}=mcp-llm-runtime-image.tar

  e2e-mcp-core:
    name: E2E - MCP Core
    if: github.repository == 'apache/shardingsphere'
    needs: e2e-mcp-build-images
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6.0.1
      - uses: ./.github/workflows/resources/actions/setup-build-environment
        with:
          java-version: '21'
          cache-suffix: 'e2e-mcp'
          cache-save-enabled: 'false'
          enable-docker-setup: 'true'
      - name: Download MCP E2E Build Artifacts
        uses: ./.github/workflows/resources/actions/download-e2e-artifacts
        with:
          artifact-name: mcp-e2e-build-artifacts
          artifact-dir: ${{ runner.temp }}/mcp-e2e-build-artifacts
          docker-image-archives: mcp-distribution-image.tar
      - name: Restore MCP Distribution Home
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p distribution/mcp/target
          tar -xzf "${RUNNER_TEMP}/mcp-e2e-build-artifacts/mcp-distribution-home.tar.gz" -C distribution/mcp/target
      - name: Run MCP Core E2E
        shell: bash
        run: |
          set -euo pipefail
          ./mvnw -pl test/e2e/mcp test -DskipITs -Dspotless.skip=true \
            -Dtest='*E2ETest' \
            -DexcludedGroups=llm-e2e \
            -Dsurefire.failIfNoSpecifiedTests=true \
            -De2e.run.type=DOCKER \
            -Dmcp.e2e.container.image="${{ env.MCP_DISTRIBUTION_IMAGE }}" \
            -B -ntp
      - name: Upload MCP Core E2E Artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: e2e-mcp-core-${{ github.run_id }}-${{ github.run_attempt }}
          path: test/e2e/mcp/target/surefire-reports
          if-no-files-found: warn

  e2e-mcp-conformance:
    name: E2E - MCP Conformance
    if: github.repository == 'apache/shardingsphere'
    needs: e2e-mcp-build-images
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6.0.1
      - name: Download MCP E2E Build Artifacts
        uses: ./.github/workflows/resources/actions/download-e2e-artifacts
        with:
          artifact-name: mcp-e2e-build-artifacts
          artifact-dir: ${{ runner.temp }}/mcp-e2e-build-artifacts
          restore-maven-repository: 'false'
          docker-image-archives: mcp-distribution-image.tar
      - name: Checkout Fixed MCP Conformance Source
        uses: actions/checkout@v6.0.1
        with:
          repository: modelcontextprotocol/conformance
          ref: 21a9a2febd7100d7c17ac1021ee7f2ed9f66a1e0
          path: .mcp-conformance
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: .mcp-conformance/package-lock.json
      - name: Build Fixed MCP Conformance Runner
        working-directory: .mcp-conformance
        run: |
          npm ci
          npm run build
      - name: Run Applicable MCP 2025-11-25 Server Scenarios
        shell: bash
        run: |
          set -euo pipefail
          container_name="shardingsphere-mcp-conformance"
          cleanup() {
            docker logs "${container_name}" >"${RUNNER_TEMP}/mcp-conformance-server.log" 2>&1 || true
            docker rm -f "${container_name}" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT
          docker run --rm -d --name "${container_name}" --network host \
            -e SHARDINGSPHERE_MCP_CONFIG=/opt/shardingsphere-mcp/conf/mcp-http.yaml \
            "${MCP_DISTRIBUTION_IMAGE}"
          for ignored in {1..60}; do
            if curl --silent --output /dev/null --request POST http://127.0.0.1:18088/mcp; then
              break
            fi
            sleep 1
          done
          curl --silent --output /dev/null --request POST http://127.0.0.1:18088/mcp
          results_root="${RUNNER_TEMP}/mcp-conformance-results"
          mkdir -p "${results_root}"
          available_scenarios="$(
            node .mcp-conformance/dist/index.js list --server --spec-version 2025-11-25 \
              | sed -nE 's/^[[:space:]]+- ([^ ]+).*/\1/p'
          )"
          scenario_count=0
          while IFS= read -r scenario; do
            [[ -z "${scenario}" || "${scenario}" == \#* ]] && continue
            scenario_count=$((scenario_count + 1))
            if ! grep -Fxq -- "${scenario}" <<< "${available_scenarios}"; then
              echo "MCP conformance scenario '${scenario}' is unavailable for protocol version 2025-11-25." >&2
              exit 1
            fi
            node .mcp-conformance/dist/index.js server \
              --url http://127.0.0.1:18088/mcp \
              --scenario "${scenario}" \
              --output-dir "${results_root}/${scenario}"
            checks_file="$(find "${results_root}/${scenario}" -type f -name checks.json -print -quit 2>/dev/null || true)"
            if [[ -z "${checks_file}" ]] || ! jq -e 'type == "array" and length > 0' "${checks_file}" >/dev/null; then
              echo "MCP conformance scenario '${scenario}' produced no checks." >&2
              exit 1
            fi
          done < test/e2e/mcp/src/test/resources/conformance/server-scenarios.txt
          if [[ "${scenario_count}" -eq 0 ]]; then
            echo "No MCP conformance scenarios were selected." >&2
            exit 1
          fi
      - name: Upload MCP Conformance Artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: e2e-mcp-conformance-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            ${{ runner.temp }}/mcp-conformance-results
            ${{ runner.temp }}/mcp-conformance-server.log
          if-no-files-found: warn

  e2e-mcp-llm:
    name: E2E - MCP LLM - ${{ matrix.suite-id }}
    if: github.repository == 'apache/shardingsphere'
    needs: [ e2e-mcp-build-images, e2e-mcp-build-llm-image ]
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        include:
          - suite-id: smoke
            test-class: LLMSmokeE2ETest
          - suite-id: usability-core
            test-class: LLMUsabilitySuiteE2ETest
            test-property: mcp.e2e.llm.usability-suite=core
          - suite-id: usability-extended
            test-class: LLMUsabilitySuiteE2ETest
            test-property: mcp.e2e.llm.usability-suite=extended
          - suite-id: builder-first
            test-class: MCPBuilderEvaluationE2ETest
            test-property: mcp.e2e.llm.builder-case-group=first
          - suite-id: builder-second
            test-class: MCPBuilderEvaluationE2ETest
            test-property: mcp.e2e.llm.builder-case-group=second
    steps:
      - uses: actions/checkout@v6.0.1
      - uses: ./.github/workflows/resources/actions/setup-build-environment
        with:
          java-version: '21'
          cache-suffix: 'e2e-mcp'
          cache-save-enabled: 'false'
          enable-docker-setup: 'true'
      - name: Download MCP E2E Build Artifacts
        uses: ./.github/workflows/resources/actions/download-e2e-artifacts
        with:
          artifact-name: mcp-e2e-build-artifacts
          artifact-dir: ${{ runner.temp }}/mcp-e2e-build-artifacts
          load-docker-image: 'false'
      - name: Download MCP LLM Runtime Image
        uses: ./.github/workflows/resources/actions/download-e2e-artifacts
        with:
          artifact-name: mcp-e2e-llm-runtime-image
          artifact-dir: ${{ runner.temp }}/mcp-e2e-llm-runtime-artifacts
          restore-maven-repository: 'false'
          docker-image-archives: mcp-llm-runtime-image.tar
      - name: Run MCP LLM E2E
        shell: bash
        env:
          MCP_LLM_TEST_PROPERTY: ${{ matrix.test-property }}
        run: |
          set -euo pipefail
          test_property_args=()
          if [[ -n "${MCP_LLM_TEST_PROPERTY}" ]]; then
            test_property_args+=("-D${MCP_LLM_TEST_PROPERTY}")
          fi
          ./mvnw -pl test/e2e/mcp test -DskipITs -Dspotless.skip=true \
            -Dtest='${{ matrix.test-class }}' \
            "${test_property_args[@]}" \
            -Dgroups=llm-e2e \
            -Dsurefire.failIfNoSpecifiedTests=true \
            -De2e.run.type=DOCKER \
            -Dmcp.llm.ready-timeout-seconds=900 \
            -Dmcp.llm.request-timeout-seconds=600 \
            -Dmcp.llm.artifact-root="${{ github.workspace }}/test/e2e/mcp/target/llm-e2e" \
            -Dmcp.llm.run-id=gha-${{ github.run_id }}-${{ github.run_attempt }}-${{ matrix.suite-id }} \
            -B -ntp
      - name: Upload MCP LLM E2E Artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: e2e-mcp-llm-${{ matrix.suite-id }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            test/e2e/mcp/target/llm-e2e
            test/e2e/mcp/target/surefire-reports
          if-no-files-found: warn
