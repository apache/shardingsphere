name: MCP - Build

on:
  release:
    types: [ published ]
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version tag, for example 5.5.4'
        required: true
        type: string

concurrency:
  group: mcp-build-${{ github.event_name }}-${{ github.event_name == 'release' && github.event.release.tag_name || inputs.version }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  MAVEN_OPTS: -Dhttp.keepAlive=false -Dmaven.wagon.http.pool=false -Dmaven.wagon.http.retryHandler.class=standard -Dmaven.wagon.http.retryHandler.count=3 -Dspotless.apply.skip=true
  MCP_IMAGE: ghcr.io/apache/shardingsphere-mcp
  MCP_SERVER_NAME: io.github.apache/shardingsphere-mcp

jobs:
  global-environment:
    name: Import Global Environment
    uses: ./.github/workflows/required-reusable.yml

  mcp-build:
    name: MCP - Build
    if: github.repository == 'apache/shardingsphere'
    needs: global-environment
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      packages: write
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6.0.1
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.version }}
      - uses: ./.github/workflows/resources/actions/setup-build-environment
        with:
          java-version: '17'
          cache-prefix: ${{ needs.global-environment.outputs.GLOBAL_CACHE_PREFIX }}
          cache-suffix: 'mcp-release'
          enable-docker-setup: 'true'
      - name: Resolve Release Version
        id: release-version
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ github.event_name == 'release' && github.event.release.tag_name || inputs.version }}"
          if ! printf '%s' "${VERSION}" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$'; then
            echo "Unsupported MCP release version: ${VERSION}" 1>&2
            exit 1
          fi
          if printf '%s' "${VERSION}" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            TAGS="${{ env.MCP_IMAGE }}:${VERSION},${{ env.MCP_IMAGE }}:latest"
          else
            TAGS="${{ env.MCP_IMAGE }}:${VERSION}"
          fi
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "identifier=${{ env.MCP_IMAGE }}:${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "tags=${TAGS}" >> "${GITHUB_OUTPUT}"
      - name: Run JDK 17 Subchain Tests
        run: ./mvnw -pl mcp,test/e2e/mcp -am test -DskipITs -Dspotless.skip=true -Dsurefire.failIfNoSpecifiedTests=false -B -ntp
      - name: Package JDK 17 Subchain Distribution
        run: ./mvnw -pl distribution/mcp -am -DskipTests package -B -ntp
      - name: Run MCP Distribution Smoke
        shell: bash
        run: |
          set -euo pipefail
          DISTRIBUTION_HOME=$(find distribution/mcp/target -maxdepth 1 -type d -name 'apache-shardingsphere-mcp-*' | head -n 1)
          if [[ -z "${DISTRIBUTION_HOME}" ]]; then
            echo "Packaged MCP distribution was not found." 1>&2
            exit 1
          fi
          ./mvnw -pl test/e2e/mcp test -DskipITs -Dspotless.skip=true \
            -Dtest=PackagedDistributionSmokeE2ETest \
            -Dsurefire.failIfNoSpecifiedTests=true \
            -Dmcp.distribution.smoke.enabled=true \
            -Dmcp.distribution.home="${DISTRIBUTION_HOME}" \
            -B -ntp
      - name: Prepare MCP Registry Metadata
        shell: bash
        run: |
          set -euo pipefail
          python3 .github/workflows/resources/scripts/prepare-mcp-server-json.py \
            --version "${{ steps.release-version.outputs.version }}" \
            --identifier "${{ steps.release-version.outputs.identifier }}"
      - name: Login Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Push MCP Docker Image
        uses: docker/build-push-action@v6
        with:
          context: distribution/mcp/target
          file: distribution/mcp/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.release-version.outputs.tags }}
          build-args: |
            MCP_SERVER_NAME=${{ env.MCP_SERVER_NAME }}
            MCP_IMAGE_VERSION=${{ steps.release-version.outputs.version }}
            MCP_SOURCE_URL=https://github.com/apache/shardingsphere
      - name: Install MCP Publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher
      - name: Authenticate to MCP Registry
        working-directory: mcp
        run: ../mcp-publisher login github-oidc
      - name: Publish Server to MCP Registry
        working-directory: mcp
        run: ../mcp-publisher publish
