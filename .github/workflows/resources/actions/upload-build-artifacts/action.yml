name: 'Upload Build Artifacts'
description: 'Package and upload ShardingSphere build artifacts'

inputs:
  artifact-name:
    description: 'Name of the artifact'
    required: false
    default: 'shardingsphere-build'
  retention-days:
    description: 'Artifact retention days'
    required: false
    default: '1'

runs:
  using: composite
  steps:
    - name: Package shardingsphere Maven Repository
      shell: bash
      run: |
        tar -czf /tmp/maven-repo-output.tar.gz -C ~/.m2/repository org/apache/shardingsphere
    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.artifact-name }}-${{ github.run_id }}
        path: |
          /tmp/maven-repo-output.tar.gz
        retention-days: ${{ inputs.retention-days }}
