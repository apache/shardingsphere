name: 'Download Build Artifacts'
description: 'Download and restore ShardingSphere build artifacts'

inputs:
  artifact-name:
    description: 'Name of the artifact'
    required: false
    default: 'shardingsphere-build'

runs:
  using: composite
  steps:
    - name: Download Build Artifacts
      uses: actions/download-artifact@v4
      with:
        name: ${{ inputs.artifact-name }}-${{ github.run_id }}
        path: /tmp/
    - name: Restore shardingsphere Maven Repository
      shell: bash
      run: |
        mkdir -p ~/.m2/repository
        tar -xzf /tmp/maven-repo-output.tar.gz -C ~/.m2/repository
