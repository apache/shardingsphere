name: Release - MCP

on:
  release:
    types: [ published ]
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version tag, for example 5.5.4'
        required: true
        type: string

concurrency:
  group: release-mcp-${{ github.event_name }}-${{ github.event_name == 'release' && github.event.release.tag_name || inputs.version }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  MAVEN_OPTS: -Dhttp.keepAlive=false -Dmaven.wagon.http.pool=false -Dmaven.wagon.http.retryHandler.class=standard -Dmaven.wagon.http.retryHandler.count=3 -Dspotless.apply.skip=true
  MCP_IMAGE: ghcr.io/apache/shardingsphere-mcp
  MCP_PUBLISHER_VERSION: v1.7.9
  MCP_SERVER_NAME: io.github.apache/shardingsphere-mcp

jobs:
  global-environment:
    name: Import Global Environment
    uses: ./.github/workflows/required-reusable.yml

  release-mcp:
    name: Release - MCP
    if: github.repository == 'apache/shardingsphere'
    needs: global-environment
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      packages: write
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6.0.1
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.version }}
      - uses: ./.github/workflows/resources/actions/setup-build-environment
        with:
          java-version: '21'
          cache-prefix: ${{ needs.global-environment.outputs.GLOBAL_CACHE_PREFIX }}
          cache-suffix: 'release-mcp'
          enable-docker-setup: 'true'
      - name: Resolve Release Version
        id: release-version
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ github.event_name == 'release' && github.event.release.tag_name || inputs.version }}"
          if ! printf '%s' "${VERSION}" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$'; then
            echo "Unsupported MCP release version: ${VERSION}" 1>&2
            exit 1
          fi
          if printf '%s' "${VERSION}" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            TAGS="${{ env.MCP_IMAGE }}:${VERSION},${{ env.MCP_IMAGE }}:latest"
          else
            TAGS="${{ env.MCP_IMAGE }}:${VERSION}"
          fi
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "identifier=${{ env.MCP_IMAGE }}:${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "tags=${TAGS}" >> "${GITHUB_OUTPUT}"
      - name: Run and Install MCP JDK 21 Subchain Tests
        run: ./mvnw -pl mcp,test/e2e/mcp -am install -DskipITs -Dspotless.skip=true -Dsurefire.failIfNoSpecifiedTests=false -B -ntp
      - name: Package MCP Distribution
        run: ./mvnw -pl distribution/mcp -DskipTests package -B -ntp
      - name: Build Local MCP Docker Image
        run: docker build -f distribution/mcp/Dockerfile -t shardingsphere-mcp-release:local distribution/mcp/target
      - name: Run MCP Distribution E2E
        shell: bash
        run: |
          set -euo pipefail
          DISTRIBUTION_HOME=$(find distribution/mcp/target -maxdepth 1 -type d -name 'apache-shardingsphere-mcp-*' | head -n 1)
          if [[ -z "${DISTRIBUTION_HOME}" ]]; then
            echo "Packaged MCP distribution was not found." 1>&2
            exit 1
          fi
          DISTRIBUTION_HOME=$(cd "${DISTRIBUTION_HOME}" && pwd)
          ./mvnw -pl test/e2e/mcp test -DskipITs -Dspotless.skip=true \
            -Dtest=PackagedDistributionE2ETest \
            -Dsurefire.failIfNoSpecifiedTests=true \
            -De2e.run.type=DOCKER \
            -Dmcp.e2e.container.image=shardingsphere-mcp-release:local \
            -Dmcp.distribution.home="${DISTRIBUTION_HOME}" \
            -B -ntp
      - name: Prepare MCP Registry Metadata
        shell: bash
        run: |
          set -euo pipefail
          ./mvnw -pl mcp/registry -DskipTests -DskipITs -Dspotless.skip=true \
            -Dexec.mainClass=org.apache.shardingsphere.mcp.registry.MCPRegistryMetadataCommand \
            -Dexec.args="--version ${{ steps.release-version.outputs.version }} --identifier ${{ steps.release-version.outputs.identifier }} --dockerfile-path distribution/mcp/Dockerfile" \
            compile exec:java -B -ntp
      - name: Login Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Push MCP Docker Image
        id: push-image
        uses: docker/build-push-action@v6
        with:
          context: distribution/mcp/target
          file: distribution/mcp/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.release-version.outputs.tags }}
          build-args: |
            MCP_SERVER_NAME=${{ env.MCP_SERVER_NAME }}
            MCP_IMAGE_VERSION=${{ steps.release-version.outputs.version }}
            MCP_SOURCE_URL=https://github.com/apache/shardingsphere
      - name: Validate Published MCP Image Manifest
        shell: bash
        run: |
          set -euo pipefail
          IMAGE_REF="${{ env.MCP_IMAGE }}@${{ steps.push-image.outputs.digest }}"
          docker buildx imagetools inspect "${IMAGE_REF}" | tee "${RUNNER_TEMP}/mcp-image-manifest.txt"
          grep -q 'linux/amd64' "${RUNNER_TEMP}/mcp-image-manifest.txt"
          grep -q 'linux/arm64' "${RUNNER_TEMP}/mcp-image-manifest.txt"
      - name: Pull Published MCP Docker Image
        run: docker pull "${{ env.MCP_IMAGE }}@${{ steps.push-image.outputs.digest }}"
      - name: Run Published MCP Image E2E
        shell: bash
        run: |
          set -euo pipefail
          ./mvnw -pl test/e2e/mcp test -DskipITs -Dspotless.skip=true \
            -Dtest=PackagedDistributionE2ETest#assertLaunchContainerOverHttp+assertLaunchContainerOverStdio \
            -Dsurefire.failIfNoSpecifiedTests=true \
            -De2e.run.type=DOCKER \
            -Dmcp.e2e.container.image="${{ env.MCP_IMAGE }}@${{ steps.push-image.outputs.digest }}" \
            -B -ntp
      - name: Install MCP Publisher
        shell: bash
        run: |
          set -euo pipefail
          case "$(uname -m)" in
            x86_64 | amd64)
              MCP_PUBLISHER_ARCHIVE="mcp-publisher_linux_amd64.tar.gz"
              ;;
            aarch64 | arm64)
              MCP_PUBLISHER_ARCHIVE="mcp-publisher_linux_arm64.tar.gz"
              ;;
            *)
              echo "Unsupported MCP Publisher architecture: $(uname -m)" 1>&2
              exit 1
              ;;
          esac
          MCP_PUBLISHER_CHECKSUMS="registry_${MCP_PUBLISHER_VERSION#v}_checksums.txt"
          curl -fsSL --retry 3 --output "${MCP_PUBLISHER_ARCHIVE}" \
            "https://github.com/modelcontextprotocol/registry/releases/download/${MCP_PUBLISHER_VERSION}/${MCP_PUBLISHER_ARCHIVE}"
          curl -fsSL --retry 3 --output "${MCP_PUBLISHER_CHECKSUMS}" \
            "https://github.com/modelcontextprotocol/registry/releases/download/${MCP_PUBLISHER_VERSION}/${MCP_PUBLISHER_CHECKSUMS}"
          awk -v archive="${MCP_PUBLISHER_ARCHIVE}" '$2 == archive {print; found = 1} END {exit found ? 0 : 1}' \
            "${MCP_PUBLISHER_CHECKSUMS}" > "${MCP_PUBLISHER_ARCHIVE}.sha256"
          sha256sum -c "${MCP_PUBLISHER_ARCHIVE}.sha256"
          tar xzf "${MCP_PUBLISHER_ARCHIVE}" mcp-publisher
      - name: Authenticate to MCP Registry
        working-directory: mcp
        run: ../mcp-publisher login github-oidc
      - name: Publish Server to MCP Registry
        working-directory: mcp
        run: ../mcp-publisher publish
      - name: Report MCP Release Evidence
        run: |
          echo "MCP version: ${{ steps.release-version.outputs.version }}"
          echo "MCP image tags: ${{ steps.release-version.outputs.tags }}"
          echo "MCP image digest: ${{ steps.push-image.outputs.digest }}"
          echo "MCP server identifier: ${{ env.MCP_SERVER_NAME }}"
