resources:
  - uriPattern: shardingsphere://legacy/resource
    name: legacy_resource
    title: Legacy Resource
    description: "Legacy uriPattern resource descriptor compatibility."
    mimeType: application/json
    resourceKind: detail

tools:
  - name: plan_encrypt_rule
    title: Plan Encrypt Rule
    description: "Plan a test encrypt workflow descriptor without executing changes."
    fields:
      - name: plan_id
        required: false
        valueDefinition:
          type: STRING
          description: "Optional existing workflow plan identifier."
      - name: database
        required: false
        valueDefinition:
          type: STRING
          description: "Logical database name."
      - name: schema
        required: false
        valueDefinition:
          type: STRING
          description: "Optional schema name."
      - name: table
        required: false
        valueDefinition:
          type: STRING
          description: "Logical table name."
      - name: column
        required: false
        valueDefinition:
          type: STRING
          description: "Logical column name."
      - name: operation_type
        required: false
        valueDefinition:
          type: STRING
          description: "Lifecycle operation."
          enumValues:
            - create
            - alter
            - drop
      - name: natural_language_intent
        required: false
        valueDefinition:
          type: STRING
          description: "Natural language user request."
      - name: structured_intent_evidence
        required: false
        valueDefinition:
          type: OBJECT
          description: "Structured intent evidence."
          additionalProperties: false
          objectProperties:
            - name: field_semantics
              required: false
              valueDefinition:
                type: STRING
                description: "Field semantics."
      - name: delivery_mode
        required: false
        valueDefinition:
          type: STRING
          description: "Delivery mode."
          enumValues:
            - all-at-once
            - step-by-step
      - name: execution_mode
        required: false
        valueDefinition:
          type: STRING
          description: "Execution mode."
          enumValues:
            - review-then-execute
            - manual-only
      - name: algorithm_type
        required: false
        valueDefinition:
          type: STRING
          description: "Algorithm type."
      - name: user_overrides
        required: false
        valueDefinition:
          type: OBJECT
          description: "User overrides."
          additionalProperties: false
          objectProperties:
            - name: algorithm_type
              required: false
              valueDefinition:
                type: STRING
                description: "Algorithm type override."
    outputSchema:
      type: object
      properties:
        response_mode:
          type: string
          description: "Machine-readable response mode for planning or terminal workflow states."
        plan_id:
          type: string
          description: "Workflow plan identifier for apply_workflow and validate_workflow."
        workflow_kind:
          type: string
          description: "Workflow kind resolved by the planner."
        status:
          type: string
          description: "Stable workflow status, such as clarifying, planned, or failed."
        missing_required_inputs:
          type: array
          description: "Inputs still required before the plan can be completed."
        resources_to_read:
          type: array
          description: "Typed resources the model should read before retrying."
        review_focus:
          type: object
          description: "Compact planning review focus."
        next_actions:
          type: array
          description: "Ordered structured model-facing recommendations for the next call or user question."
          items:
            type: object
            properties:
              order:
                type: integer
                description: "1-based action order."
              type:
                type: string
                description: "Canonical action type such as tool_call, resource_read, ask_user, completion, or terminal."
              title:
                type: string
                description: "Short model-facing action title."
              requires_user_approval:
                type: boolean
                description: "Whether the next action requires user approval."
              reason:
                type: string
                description: "Why the model should take this action."
      examples:
        - response_mode: planning
          plan_id: encrypt-rule-20260505-001
          workflow_kind: encrypt.rule
          status: planned
          missing_required_inputs: []
          resources_to_read: []
          review_focus: {}
          next_actions:
            - order: 1
              type: tool_call
              title: Call apply_workflow
              reason: Preview generated workflow artifacts.
              requires_user_approval: false
    annotations:
      title: Plan Encrypt Rule
      readOnlyHint: true
      destructiveHint: false
      idempotentHint: false
      openWorldHint: true
      returnDirect: false
