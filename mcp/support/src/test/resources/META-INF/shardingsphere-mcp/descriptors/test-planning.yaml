tools:
  - name: plan_encrypt_rule
    title: Plan Encrypt Rule
    description: "Plan a test encrypt workflow descriptor without executing changes."
    fields:
      - name: plan_id
        required: false
        valueDefinition:
          type: STRING
          description: "Optional existing workflow plan identifier."
      - name: database
        required: false
        valueDefinition:
          type: STRING
          description: "Logical database name."
      - name: schema
        required: false
        valueDefinition:
          type: STRING
          description: "Optional schema name."
      - name: table
        required: false
        valueDefinition:
          type: STRING
          description: "Logical table name."
      - name: column
        required: false
        valueDefinition:
          type: STRING
          description: "Logical column name."
      - name: operation_type
        required: false
        valueDefinition:
          type: STRING
          description: "Lifecycle operation."
          enumValues:
            - create
            - alter
            - drop
      - name: natural_language_intent
        required: false
        valueDefinition:
          type: STRING
          description: "Natural language user request."
      - name: structured_intent_evidence
        required: false
        valueDefinition:
          type: OBJECT
          description: "Structured intent evidence."
          additionalProperties: false
          objectProperties:
            - name: field_semantics
              required: false
              valueDefinition:
                type: STRING
                description: "Field semantics."
      - name: delivery_mode
        required: false
        valueDefinition:
          type: STRING
          description: "Delivery mode."
          enumValues:
            - all-at-once
            - step-by-step
      - name: execution_mode
        required: false
        valueDefinition:
          type: STRING
          description: "Execution mode."
          enumValues:
            - auto-execute
            - review-then-execute
            - manual-only
      - name: algorithm_type
        required: false
        valueDefinition:
          type: STRING
          description: "Algorithm type."
      - name: user_overrides
        required: false
        valueDefinition:
          type: OBJECT
          description: "User overrides."
          additionalProperties: false
          objectProperties:
            - name: algorithm_type
              required: false
              valueDefinition:
                type: STRING
                description: "Algorithm type override."
