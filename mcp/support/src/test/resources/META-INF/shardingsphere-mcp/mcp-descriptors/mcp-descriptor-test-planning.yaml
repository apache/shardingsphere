resources:
  - uri: shardingsphere://workflow/test-resource
    name: workflow_test_resource
    title: Workflow Test Resource
    description: "Workflow descriptor resource used by descriptor catalog loader tests."
    mimeType: application/json
    shardingSphereMetadata:
      resourceKind: detail

tools:
  - name: database_gateway_plan_encrypt_rule
    title: Plan Encrypt Rule
    description: "Plan a test encrypt workflow descriptor without executing changes."
    inputSchema:
      type: object
      properties:
        plan_id:
          type: string
          description: "Optional existing workflow plan identifier."
        database:
          type: string
          description: "Logical database name."
        schema:
          type: string
          description: "Optional schema name."
        table:
          type: string
          description: "Logical table name."
        column:
          type: string
          description: "Logical column name."
        operation_type:
          type: string
          description: "Lifecycle operation."
          enum:
            - create
            - alter
            - drop
        natural_language_intent:
          type: string
          description: "Natural language user request."
        structured_intent_evidence:
          type: object
          description: "Structured intent evidence."
          properties:
            field_semantics:
              type: string
              description: "Field semantics."
          required: []
          additionalProperties: false
        delivery_mode:
          type: string
          description: "Delivery mode."
          enum:
            - all-at-once
            - step-by-step
        execution_mode:
          type: string
          description: "Execution mode."
          enum:
            - review-then-execute
            - manual-only
        algorithm_type:
          type: string
          description: "Algorithm type."
      required: []
      additionalProperties: false
    outputSchema:
      type: object
      properties:
        response_mode:
          type: string
          description: "Machine-readable response mode for planning or terminal workflow states."
        plan_id:
          type: string
          description: "Workflow plan identifier for database_gateway_apply_workflow and database_gateway_validate_workflow."
        workflow_kind:
          type: string
          description: "Workflow kind resolved by the planner."
        status:
          type: string
          description: "Stable workflow status, such as clarifying, planned, or failed."
        missing_required_inputs:
          type: array
          description: "Inputs still required before the plan can be completed."
        clarification_questions:
          type: array
          description: "Structured questions for missing workflow inputs."
        elicitation_support:
          type: object
          description: "Evaluated MCP elicitation capability and selected fallback interaction."
        fallback_reason:
          type: string
          description: "Machine-readable reason explaining why planning needs fallback interaction."
        issues:
          type: array
          description: "Warnings, conflicts, and validation issues found during planning."
        global_steps:
          type: array
          description: "Workflow review and execution steps."
        current_step:
          type: string
          description: "Current workflow step."
        algorithm_recommendations:
          type: array
          description: "Recommended algorithms and ranking reasons."
        property_requirements:
          type: array
          description: "Required and optional algorithm properties."
        validation_strategy:
          type: object
          description: "Validation strategy generated by the planner."
        delivery_mode:
          type: string
          description: "Planner delivery mode used for user interaction."
        execution_mode:
          type: string
          description: "Preferred later apply mode captured by the plan."
        intent_inference:
          type: object
          description: "Resolved operation type, inferred values, unresolved fields, and reasoning notes."
        argument_provenance:
          type: object
          description: "Source of important workflow arguments."
        review_focus:
          type: object
          description: "Compact planning review focus."
        proxy_topology_hint:
          type: object
          description: "Proxy metadata view expected by this workflow."
        distsql_artifacts:
          type: array
          description: "Rule DistSQL artifacts generated for review before applying the workflow."
        resources_to_read:
          type: array
          description: "Typed resources the model should read before retrying."
        next_actions:
          type: array
          description: "Ordered structured model-facing recommendations for the next call or user question."
          items:
            type: object
            properties:
              order:
                type: integer
                description: "1-based action order."
              type:
                type: string
                description: "Canonical action type such as tool_call, resource_read, ask_user, completion, or terminal."
              title:
                type: string
                description: "Short model-facing action title."
              reason:
                type: string
                description: "Why the model should take this action."
      examples:
        - response_mode: planning
          plan_id: encrypt-rule-20260505-001
          workflow_kind: encrypt.rule
          status: planned
          missing_required_inputs: []
          clarification_questions: []
          elicitation_support: {}
          fallback_reason: ""
          issues: []
          global_steps: []
          current_step: review
          algorithm_recommendations: []
          property_requirements: []
          validation_strategy: {}
          delivery_mode: all-at-once
          execution_mode: review-then-execute
          intent_inference: {}
          argument_provenance: {}
          resources_to_read: []
          review_focus: {}
          proxy_topology_hint: {}
          distsql_artifacts: []
          next_actions:
            - order: 1
              type: tool_call
              title: Call database_gateway_apply_workflow
              tool_name: database_gateway_apply_workflow
              arguments: {}
              reason: Preview generated workflow artifacts.
    annotations:
      title: Plan Encrypt Rule
      readOnlyHint: false
      destructiveHint: false
      idempotentHint: false
      openWorldHint: true
    runtime:
      workflowRole: plan
    meta:
      org.apache.shardingsphere/workflow-kind: encrypt.rule
      org.apache.shardingsphere/artifact-categories:
        - rule_distsql
      org.apache.shardingsphere/side-effect-scope:
        - rule-metadata
      org.apache.shardingsphere/related-resource-uris:
        - shardingsphere://workflow/test-resource
      org.apache.shardingsphere/follow-up-tools:
        - database_gateway_apply_workflow
