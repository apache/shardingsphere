prompts:
  - name: inspect_metadata
    title: Inspect Metadata
    description: "Guide the model to inspect ShardingSphere logical metadata by reading capability and metadata resources before choosing search_metadata or detail resources."
    templateResource: META-INF/shardingsphere-mcp/prompts/inspect-metadata.md
    arguments:
      - name: database
        title: Logical Database
        description: "Optional ShardingSphere logical database name to inspect."
        required: false
      - name: schema
        title: Schema
        description: "Optional schema or namespace to inspect inside the logical database."
        required: false
      - name: query
        title: Search Query
        description: "Optional object name fragment, table name, column name, or user-provided metadata target."
        required: false
    meta:
      relatedTools:
        - search_metadata
      relatedResources:
        - shardingsphere://capabilities
        - shardingsphere://databases
      stopConditions:
        - "Stop after returning resolved metadata paths or after identifying the exact resource/tool to call next."
        - "Stop without SQL execution when the user only asked to inspect metadata."
      askUserConditions:
        - "Ask the user for the logical database when multiple databases match and no safe default is visible."
        - "Ask the user to choose an object when search results remain ambiguous after metadata lookup."
  - name: safe_sql_execution
    title: Safe SQL Execution
    description: "Guide the model to choose execute_query for read-only SQL and execute_update preview before any side-effecting SQL execution."
    templateResource: META-INF/shardingsphere-mcp/prompts/safe-sql-execution.md
    arguments:
      - name: database
        title: Logical Database
        description: "ShardingSphere logical database that provides the SQL execution boundary."
        required: true
      - name: schema
        title: Schema
        description: "Optional schema or namespace for unqualified object names."
        required: false
      - name: sql_intent
        title: SQL Intent
        description: "User-facing intent or SQL draft to classify before choosing an execution tool."
        required: true
    meta:
      relatedTools:
        - execute_query
        - execute_update
      relatedResources:
        - shardingsphere://databases/{database}/capabilities
      stopConditions:
        - "Stop after execute_query returns the requested read-only result."
        - "Stop after execute_update preview until the user approves the reviewed side effects."
      askUserConditions:
        - "Ask before execute_update execution when the preview has not been approved."
        - "Ask when the SQL intent cannot be classified as read-only or side-effecting."
  - name: recover_workflow
    title: Recover Workflow
    description: "Guide the model to recover a failed or stale ShardingSphere workflow by checking the current-session plan_id and re-planning when the plan is unavailable."
    templateResource: META-INF/shardingsphere-mcp/prompts/recover-workflow.md
    arguments:
      - name: plan_id
        title: Workflow Plan ID
        description: "Current-session workflow plan identifier returned by a planning tool."
        required: false
      - name: failure_summary
        title: Failure Summary
        description: "Optional error payload or user-provided symptom to use during recovery."
        required: false
    meta:
      relatedTools:
        - apply_workflow
        - validate_workflow
        - plan_encrypt_rule
        - plan_mask_rule
      stopConditions:
        - "Stop after validate_workflow confirms the current plan or after a replacement plan is created."
        - "Stop when the plan_id is unavailable and the matching planning tool needs fresh user inputs."
      askUserConditions:
        - "Ask which workflow kind to re-plan when the failure summary does not identify encrypt or mask."
        - "Ask before applying recovered artifacts that would change runtime state."

completionTargets:
  - referenceType: prompt
    reference: inspect_metadata
    arguments:
      - database
      - schema
      - table
      - column
      - index
      - sequence
    maxValues: 50
  - referenceType: prompt
    reference: safe_sql_execution
    arguments:
      - database
      - schema
      - table
      - column
    maxValues: 50
  - referenceType: prompt
    reference: recover_workflow
    arguments:
      - plan_id
    maxValues: 50
resourceNavigation:
  - from: apply_workflow
    to: validate_workflow
    requiredArguments:
      - plan_id
    carriedArguments:
      - plan_id
    description: "Validate runtime state after previewing or applying workflow artifacts."
  - from: recover_workflow
    to: validate_workflow
    requiredArguments:
      - plan_id
    carriedArguments:
      - plan_id
    description: "Validate a current-session workflow when recovery starts from an existing plan."

tools:
  - name: apply_workflow
    title: Apply Workflow
    description: "Preview or apply a previously planned ShardingSphere MCP workflow. Use execution_mode=preview before side effects unless the user has already reviewed and approved the plan."
    fields:
      - name: plan_id
        required: true
        valueDefinition:
          type: STRING
          description: "Workflow plan identifier returned by a planning tool."
      - name: execution_mode
        required: true
        valueDefinition:
          type: STRING
          description: "Required safety gate. Use preview to inspect generated side effects without applying artifacts, or use an execution mode approved by the user."
          enumValues:
            - preview
            - review-then-execute
            - manual-only
      - name: approved_steps
        required: false
        valueDefinition:
          type: ARRAY
          description: "Optional exact step names copied from the plan response when only part of the workflow should be applied."
          itemDefinition:
            type: STRING
            description: "Workflow step name or artifact step from the plan response."
    outputSchema:
      type: object
      properties:
        plan_id:
          type: string
          description: "Workflow plan identifier that was applied."
        execution_mode:
          type: string
          description: "Execution mode used by the apply call."
        applied_artifacts:
          type: array
          description: "Artifacts or steps executed by the server."
        preview_artifacts:
          type: array
          description: "Artifacts that would be applied when execution_mode=preview."
        would_apply:
          type: boolean
          description: "False when execution_mode=preview, proving workflow artifacts were not applied."
        skipped_artifacts:
          type: array
          description: "Artifacts intentionally skipped by policy or approval."
        manual_artifacts:
          type: array
          description: "Artifacts returned for manual execution."
        manual_artifact_package:
          type: object
          description: "Manual-only artifact package returned when execution_mode=manual-only; contains generated DDL, DistSQL, index plan, and algorithm properties needed for operator execution."
        recommended_next_tool:
          type: string
          description: "Usually validate_workflow after a successful apply."
        next_actions:
          type: array
          description: "Ordered model-facing recommendations after applying or exporting workflow artifacts."
        requires_user_approval:
          type: boolean
          description: "Whether the next manual or retry action requires user approval."
      examples:
        - plan_id: encrypt-rule-20260505-001
          execution_mode: preview
          applied_artifacts: []
          preview_artifacts: []
          would_apply: false
          skipped_artifacts: []
          manual_artifacts: []
          recommended_next_tool: validate_workflow
          next_actions:
            - action_kind: ask_user
              reason: Ask the user to approve the previewed artifacts before execution.
              requires_user_approval: true
          requires_user_approval: true
    annotations:
      title: Apply Workflow
      readOnlyHint: false
      destructiveHint: true
      idempotentHint: false
      openWorldHint: true
      returnDirect: false
    meta:
      workflowRole: apply
      sideEffectScope:
        - rule-metadata
        - physical-structure
        - physical-data
      requiresUserApproval: true
      followUpTools:
        - validate_workflow
  - name: validate_workflow
    title: Validate Workflow
    description: "Validate a planned or applied workflow against visible metadata and generated artifacts. Use after planning for review, and after apply_workflow to confirm the runtime state."
    fields:
      - name: plan_id
        required: true
        valueDefinition:
          type: STRING
          description: "Workflow plan identifier returned by a planning tool."
    outputSchema:
      type: object
      properties:
        plan_id:
          type: string
          description: "Workflow plan identifier that was validated."
        status:
          type: string
          description: "Validation status such as passed, warning, or failed."
        sections:
          type: array
          description: "Validation sections with findings and evidence."
        mismatches:
          type: array
          description: "Differences between planned artifacts and runtime metadata."
        recommended_recovery:
          type: string
          description: "Suggested next action when validation fails."
        next_actions:
          type: array
          description: "Ordered model-facing recommendations after validation."
        recommended_next_tool:
          type: string
          description: "Preferred follow-up planning tool when validation fails."
        requires_user_approval:
          type: boolean
          description: "Whether the next action requires user approval."
      examples:
        - plan_id: encrypt-rule-20260505-001
          status: passed
          sections: []
          mismatches: []
          recommended_recovery: ""
          next_actions:
            - action_kind: stop
              reason: Validation passed.
              requires_user_approval: false
          requires_user_approval: false
    annotations:
      title: Validate Workflow
      readOnlyHint: true
      destructiveHint: false
      idempotentHint: true
      openWorldHint: true
      returnDirect: false
    meta:
      workflowRole: validate
      relatedTools:
        - apply_workflow
