resources:
  - uriTemplate: shardingsphere://workflows/{plan_id}
    name: workflow-plan
    title: Workflow Plan
    description: "Read one current in-memory workflow plan by plan_id. Use after planning tools to review status, clarification questions, artifacts, and next actions."
    mimeType: application/json
    parameters:
      - name: plan_id
        title: Plan ID
        description: "Workflow plan_id returned by a planning tool in the current MCP runtime."
        required: true
        scope: workflow-plan
    resourceKind: detail
    objectScope: workflow-plan
    relatedTools:
      - validate_workflow
      - apply_workflow

prompts:
  - name: inspect_metadata
    title: Inspect Metadata
    description: "Guide the model to inspect ShardingSphere logical metadata by reading capability and metadata resources before choosing search_metadata or detail resources."
    templateResource: META-INF/shardingsphere-mcp/prompts/inspect-metadata.md
    arguments:
      - name: database
        title: Logical Database
        description: "Optional ShardingSphere logical database name to inspect."
        required: false
      - name: schema
        title: Schema
        description: "Optional schema or namespace to inspect inside the logical database."
        required: false
      - name: query
        title: Search Query
        description: "Optional object name fragment, table name, column name, or user-provided metadata target."
        required: false
    meta:
      relatedTools:
        - search_metadata
      relatedResources:
        - shardingsphere://capabilities
        - shardingsphere://databases
      stopConditions:
        - "Stop after returning resolved metadata paths or after identifying the exact resource/tool to call next."
        - "Stop without SQL execution when the user only asked to inspect metadata."
      askUserConditions:
        - "Ask the user for the logical database when multiple databases match and no safe default is visible."
        - "Ask the user to choose an object when search results remain ambiguous after metadata lookup."
  - name: safe_sql_execution
    title: Safe SQL Execution
    description: "Guide the model to choose execute_query for read-only SQL and execute_update preview before any side-effecting SQL execution."
    templateResource: META-INF/shardingsphere-mcp/prompts/safe-sql-execution.md
    arguments:
      - name: database
        title: Logical Database
        description: "ShardingSphere logical database that provides the SQL execution boundary."
        required: true
      - name: schema
        title: Schema
        description: "Optional schema or namespace for unqualified object names."
        required: false
      - name: sql_intent
        title: SQL Intent
        description: "User-facing intent or SQL draft to classify before choosing an execution tool."
        required: true
    meta:
      relatedTools:
        - execute_query
        - execute_update
      relatedResources:
        - shardingsphere://databases/{database}/capabilities
      stopConditions:
        - "Stop after execute_query returns the requested read-only result."
        - "Stop after execute_update preview until the user approves the reviewed side effects."
      askUserConditions:
        - "Ask before execute_update execution when the preview has not been approved."
        - "Ask when the SQL intent cannot be classified as read-only or side-effecting."
  - name: recover_workflow
    title: Recover Workflow
    description: "Guide the model to recover a failed or stale ShardingSphere workflow by checking the current-session plan_id and re-planning when the plan is unavailable."
    templateResource: META-INF/shardingsphere-mcp/prompts/recover-workflow.md
    arguments:
      - name: plan_id
        title: Workflow Plan ID
        description: "Current-session workflow plan identifier returned by a planning tool."
        required: false
      - name: failure_summary
        title: Failure Summary
        description: "Optional error payload or user-provided symptom to use during recovery."
        required: false
    meta:
      relatedTools:
        - apply_workflow
        - validate_workflow
        - plan_encrypt_rule
        - plan_mask_rule
      stopConditions:
        - "Stop after validate_workflow confirms the current plan or after a replacement plan is created."
        - "Stop when the plan_id is unavailable and the matching planning tool needs fresh user inputs."
      askUserConditions:
        - "Ask which workflow kind to re-plan when the failure summary does not identify encrypt or mask."
        - "Ask before applying recovered artifacts that would change runtime state."

completionTargets:
  - referenceType: prompt
    reference: inspect_metadata
    arguments:
      - database
      - schema
      - table
      - column
      - index
      - sequence
    maxValues: 50
  - referenceType: prompt
    reference: safe_sql_execution
    arguments:
      - database
      - schema
      - table
      - column
    maxValues: 50
  - referenceType: prompt
    reference: recover_workflow
    arguments:
      - plan_id
    maxValues: 50
  - referenceType: resource
    reference: shardingsphere://workflows/{plan_id}
    arguments:
      - plan_id
    maxValues: 50
resourceNavigation:
  - from: apply_workflow
    to: validate_workflow
    requiredArguments:
      - plan_id
    carriedArguments:
      - plan_id
    description: "Validate runtime state after previewing or applying workflow artifacts."
  - from: recover_workflow
    to: validate_workflow
    requiredArguments:
      - plan_id
    carriedArguments:
      - plan_id
    description: "Validate a current-session workflow when recovery starts from an existing plan."

tools:
  - name: apply_workflow
    title: Apply Workflow
    description: "Preview or apply a previously planned ShardingSphere MCP workflow. Use execution_mode=preview before side effects unless the user has already reviewed and approved the plan."
    fields:
      - name: plan_id
        required: true
        valueDefinition:
          type: STRING
          description: "Workflow plan identifier returned by a planning tool."
      - name: execution_mode
        required: true
        valueDefinition:
          type: STRING
          description: "Required safety gate. Use preview to inspect generated side effects without applying artifacts, or use an execution mode approved by the user."
          enumValues:
            - preview
            - review-then-execute
            - manual-only
      - name: approved_steps
        required: false
        valueDefinition:
          type: ARRAY
          description: "Optional execution filter, not an approval token. Omit to apply every artifact after user approval, or pass only visible preview_artifacts.approval_step values."
          itemDefinition:
            type: STRING
            description: "Allowed workflow artifact step: ddl, index_ddl, or rule_distsql."
            enumValues:
              - ddl
              - index_ddl
              - rule_distsql
    outputSchema:
      type: object
      properties:
        response_mode:
          type: string
          description: "Stable response mode marker: preview, executed, manual_only, or terminal."
          enum:
            - preview
            - executed
            - manual_only
            - terminal
        plan_id:
          type: string
          description: "Workflow plan identifier that was applied."
        execution_mode:
          type: string
          description: "Execution mode used by the apply call."
        status:
          type: string
          description: "Apply status such as preview, completed, failed, or awaiting-manual-execution."
        issues:
          type: array
          description: "Workflow issues reported while checking or applying artifacts."
          items:
            type: object
            properties:
              code:
                type: string
                description: "Stable workflow issue code."
              severity:
                type: string
                description: "Issue severity."
              stage:
                type: string
                description: "Workflow stage that reported the issue."
              message:
                type: string
                description: "Human-readable issue message."
              user_action:
                type: string
                description: "Suggested user action."
              retryable:
                type: boolean
                description: "Whether the workflow can be retried after correction."
              details:
                type: object
                description: "Issue-specific details."
        step_results:
          type: array
          description: "Per-artifact execution, skipped, or failed results."
          items:
            type: object
            properties:
              artifact_type:
                type: string
                description: "Artifact type such as add-column, create-index, or rule-dist-sql."
              status:
                type: string
                description: "Artifact execution status."
              sql:
                type: string
                description: "Artifact SQL or DistSQL."
        executed_ddl:
          type: array
          description: "DDL statements executed by the server."
        executed_distsql:
          type: array
          description: "DistSQL statements executed by the server."
        applied_artifacts:
          type: array
          description: "Artifacts or steps executed by the server."
        preview_artifacts:
          type: array
          description: "Artifacts that would be applied when execution_mode=preview."
          items:
            type: object
            properties:
              approval_step:
                type: string
                description: "Step value that can be copied into approved_steps after user approval."
              artifact_type:
                type: string
                description: "Artifact type that would be applied."
              sql:
                type: string
                description: "Artifact SQL or DistSQL that would be applied."
              side_effect_scope:
                type: string
                description: "Side-effect scope such as physical-structure or rule-metadata."
        review_focus:
          type: object
          description: "Compact preview review focus: artifact categories, side-effect scope, manual-only mode, and approval requirement."
        would_apply:
          type: boolean
          description: "False when execution_mode=preview, proving workflow artifacts were not applied."
        approval_summary:
          type: string
          description: "Preview-only natural-language summary that confirms workflow artifacts were not applied."
        approval_question:
          type: string
          description: "Preview-only approval question the model can ask before applying artifacts."
        skipped_artifacts:
          type: array
          description: "Artifacts intentionally skipped by policy or approval."
        manual_artifacts:
          type: array
          description: "Artifacts returned for manual execution."
        manual_artifact_package:
          type: object
          description: "Manual-only artifact package returned when execution_mode=manual-only; contains generated DDL, DistSQL, index plan, and algorithm properties needed for operator execution."
        manual_artifact_summary:
          type: object
          description: "Manual-only compact artifact summary with counts, external execution requirement, confirmation requirement, and validate_workflow arguments."
        manual_follow_up:
          type: object
          description: "Manual-only confirmation contract to satisfy before validate_workflow is called."
        argument_provenance:
          type: object
          description: "Source of reusable apply arguments, such as server_generated or server_defaulted."
        next_actions:
          type: array
          description: "Ordered model-facing recommendations after applying or exporting workflow artifacts."
          items:
            type: object
            properties:
              order:
                type: integer
                description: "1-based action order."
              type:
                type: string
                description: "Canonical action type such as tool_call, resource_read, ask_user, completion, or terminal."
              title:
                type: string
                description: "Short model-facing action title."
              requires_user_approval:
                type: boolean
                description: "Whether the next action requires user approval."
              tool_name:
                type: string
                description: "Canonical tool name when type is tool_call."
              arguments:
                type: object
                description: "Canonical arguments to provide to the target tool."
              reason:
                type: string
                description: "Why the model should take the action."
              required_inputs:
                type: array
                description: "User inputs required when type is ask_user."
              depends_on:
                type: array
                description: "Action order values that must complete before this action."
        requires_user_approval:
          type: boolean
          description: "Whether the next manual or retry action requires user approval."
      examples:
        - response_mode: preview
          plan_id: encrypt-rule-20260505-001
          execution_mode: preview
          applied_artifacts: []
          preview_artifacts: []
          would_apply: false
          approval_summary: Previewed 0 workflow artifacts. Nothing has been applied.
          approval_question: No workflow artifacts are available to apply. Do you want to continue reviewing this workflow?
          skipped_artifacts: []
          manual_artifacts: []
          next_actions:
            - order: 1
              type: ask_user
              title: Ask user for approval
              question: Ask the user to approve the previewed artifacts before execution.
              reason: Ask the user to approve the previewed artifacts before execution.
              requires_user_approval: true
          requires_user_approval: true
    annotations:
      title: Apply Workflow
      readOnlyHint: false
      destructiveHint: true
      idempotentHint: false
      openWorldHint: true
      returnDirect: false
    meta:
      workflowRole: apply
      sideEffectScope:
        - rule-metadata
        - physical-structure
        - physical-data
      requiresUserApproval: true
      followUpTools:
        - validate_workflow
  - name: validate_workflow
    title: Validate Workflow
    description: "Validate a planned or applied workflow against visible metadata and generated artifacts. Use after planning for review, and after apply_workflow to confirm the runtime state."
    fields:
      - name: plan_id
        required: true
        valueDefinition:
          type: STRING
          description: "Workflow plan identifier returned by a planning tool."
    outputSchema:
      type: object
      properties:
        response_mode:
          type: string
          description: "Stable response mode marker for validation responses."
          enum:
            - validation
            - terminal
        plan_id:
          type: string
          description: "Workflow plan identifier that was validated."
        status:
          type: string
          description: "Validation status such as passed, warning, or failed."
        overall_status:
          type: string
          description: "Overall validation report status copied from the validation report."
        issues:
          type: array
          description: "Validation issues raised from mismatches."
          items:
            type: object
            properties:
              code:
                type: string
                description: "Stable validation issue code."
              severity:
                type: string
                description: "Issue severity."
              stage:
                type: string
                description: "Workflow stage that reported the issue."
              message:
                type: string
                description: "Human-readable issue message."
              user_action:
                type: string
                description: "Suggested user action."
              retryable:
                type: boolean
                description: "Whether the workflow can be retried after correction."
              details:
                type: object
                description: "Issue-specific details."
        sections:
          type: array
          description: "Validation sections with findings and evidence."
          items:
            type: object
            properties:
              layer:
                type: string
                description: "Validation layer such as ddl, rule, logical_metadata, or sql_executability."
              status:
                type: string
                description: "Validation section status."
              evidence:
                description: "Evidence used by the validation section."
              details:
                description: "Validation details or failure message."
        mismatches:
          type: array
          description: "Differences between planned artifacts and runtime metadata."
          items:
            type: object
            properties:
              code:
                type: string
                description: "Stable mismatch code."
              layer:
                type: string
                description: "Layer where the mismatch was detected."
              expected:
                type: string
                description: "Expected planned value."
              actual:
                type: string
                description: "Observed runtime value."
              impact:
                type: string
                description: "Impact of the mismatch."
              suggested_next_action:
                type: string
                description: "Suggested next action for the mismatch."
        recommended_recovery:
          type: string
          description: "Suggested next action when validation fails."
        next_actions:
          type: array
          description: "Ordered model-facing recommendations after validation."
          items:
            type: object
            properties:
              order:
                type: integer
                description: "1-based action order."
              type:
                type: string
                description: "Canonical action type such as tool_call, resource_read, ask_user, completion, or terminal."
              title:
                type: string
                description: "Short model-facing action title."
              requires_user_approval:
                type: boolean
                description: "Whether the next action requires user approval."
              tool_name:
                type: string
                description: "Canonical tool name when type is tool_call."
              arguments:
                type: object
                description: "Canonical arguments to provide to the target tool."
              reason:
                type: string
                description: "Why the model should take the action."
              required_inputs:
                type: array
                description: "User inputs required when type is ask_user."
              depends_on:
                type: array
                description: "Action order values that must complete before this action."
        requires_user_approval:
          type: boolean
          description: "Whether the next action requires user approval."
      examples:
        - response_mode: validation
          plan_id: encrypt-rule-20260505-001
          status: passed
          sections: []
          mismatches: []
          recommended_recovery: ""
          next_actions:
            - order: 1
              type: terminal
              title: Stop
              reason: Validation passed. Report the confirmed workflow result to the user.
              requires_user_approval: false
          requires_user_approval: false
    annotations:
      title: Validate Workflow
      readOnlyHint: true
      destructiveHint: false
      idempotentHint: true
      openWorldHint: true
      returnDirect: false
    meta:
      workflowRole: validate
      relatedTools:
        - apply_workflow
