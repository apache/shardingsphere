resources:
  - uri: shardingsphere://capabilities
    name: server-capability-catalog
    title: ShardingSphere MCP Capability Catalog
    description: >
      Generated ShardingSphere domain catalog for resources, resource templates, tools, prompts, completions, workflow relationships,
      side-effect notes, and navigation hints. Use official MCP discovery methods for protocol surface discovery.
    mimeType: application/json
    annotations:
      audience:
        - assistant
      priority: 1.0
    shardingSphereMetadata:
      resourceKind: capability-catalog
      useBefore:
        - inspecting ShardingSphere catalog metadata
        - planning multi-step workflows
  - uri: shardingsphere://runtime
    name: runtime-status
    title: Runtime Status
    description: "Read the current MCP runtime status, active transport, secret-free database capability summary, and first resources to inspect before choosing tools."
    mimeType: application/json
    annotations:
      audience:
        - assistant
      priority: 0.9
    shardingSphereMetadata:
      resourceKind: detail
      objectScope: runtime
      relatedResources:
        - shardingsphere://capabilities
        - shardingsphere://databases
  - uri: shardingsphere://databases
    name: logical-databases
    title: Logical Databases
    description: "List ShardingSphere logical databases visible to the current MCP runtime. Read this before choosing a database argument for metadata, SQL, or workflow tools."
    mimeType: application/json
    shardingSphereMetadata:
      resourceKind: list
      objectScope: logical-database
      relatedTools:
        - database_gateway_search_metadata
        - database_gateway_execute_query
resourceTemplates:
  - uriTemplate: shardingsphere://databases/{database}
    name: logical-database-detail
    title: Logical Database Detail
    description: "Read one ShardingSphere logical database entry and its visible metadata summary. Use this when a user names a database and the model needs to confirm it exists."
    mimeType: application/json
    shardingSphereMetadata:
      uriVariables:
        - name: database
          title: Logical Database
          description: "ShardingSphere logical database name, not a physical storage unit name."
          required: true
          scope: logical-database
      resourceKind: detail
      objectScope: logical-database
  - uriTemplate: shardingsphere://databases/{database}/capabilities
    name: database-capabilities
    title: Database Capabilities
    description: "Read statement, transaction, schema, and metadata-object capabilities for one logical database. Use before executing SQL or deciding whether EXPLAIN ANALYZE is available."
    mimeType: application/json
    shardingSphereMetadata:
      uriVariables:
        - name: database
          title: Logical Database
          description: "ShardingSphere logical database whose SQL and metadata capabilities should be inspected."
          required: true
          scope: logical-database
      resourceKind: detail
      relatedTools:
        - database_gateway_execute_query
        - database_gateway_execute_update
  - uriTemplate: shardingsphere://databases/{database}/storage-units
    name: storage-units
    title: Storage Units
    description: "List Proxy-visible storage units in one ShardingSphere logical database. Use this before planning rules that require storage unit names."
    mimeType: application/json
    shardingSphereMetadata:
      uriVariables:
        - name: database
          title: Logical Database
          description: "ShardingSphere logical database whose storage units should be inspected."
          required: true
          scope: logical-database
      resourceKind: list
      objectScope: storage_unit
      relatedTools:
        - database_gateway_search_metadata
  - uriTemplate: shardingsphere://databases/{database}/storage-units/{storageUnit}
    name: storage-unit-detail
    title: Storage Unit Detail
    description: "Read one Proxy-visible storage unit without exposing secret connection properties. Use this to confirm host, port, type, and pool settings."
    mimeType: application/json
    shardingSphereMetadata:
      uriVariables:
        - name: database
          title: Logical Database
          description: "ShardingSphere logical database that owns the storage unit."
          required: true
          scope: logical-database
        - name: storageUnit
          title: Storage Unit
          description: "Proxy storage unit name returned by SHOW STORAGE UNITS."
          required: true
          scope: storage_unit
      resourceKind: detail
      objectScope: storage_unit
      relatedTools:
        - database_gateway_search_metadata
  - uriTemplate: shardingsphere://databases/{database}/storage-units/{storageUnit}/used-by-rules
    name: storage-unit-used-by-rules
    title: Storage Unit Used By Rules
    description: "List rule type and rule name rows that currently reference one storage unit."
    mimeType: application/json
    shardingSphereMetadata:
      uriVariables:
        - name: database
          title: Logical Database
          description: "ShardingSphere logical database that owns the storage unit."
          required: true
          scope: logical-database
        - name: storageUnit
          title: Storage Unit
          description: "Proxy storage unit name whose rule usage should be inspected."
          required: true
          scope: storage_unit
      resourceKind: list
      objectScope: storage_unit
  - uriTemplate: shardingsphere://databases/{database}/single-tables
    name: single-tables
    title: Single Tables
    description: "List single table to storage unit mappings in one ShardingSphere logical database."
    mimeType: application/json
    shardingSphereMetadata:
      uriVariables:
        - name: database
          title: Logical Database
          description: "ShardingSphere logical database whose single table mappings should be inspected."
          required: true
          scope: logical-database
      resourceKind: list
      objectScope: single_table
  - uriTemplate: shardingsphere://databases/{database}/single-tables/{table}
    name: single-table-detail
    title: Single Table Detail
    description: "Read the storage unit mapping for one single table."
    mimeType: application/json
    shardingSphereMetadata:
      uriVariables:
        - name: database
          title: Logical Database
          description: "ShardingSphere logical database that owns the single table."
          required: true
          scope: logical-database
        - name: table
          title: Single Table
          description: "Single table name returned by SHOW SINGLE TABLES."
          required: true
          scope: single_table
      resourceKind: detail
      objectScope: single_table
  - uriTemplate: shardingsphere://databases/{database}/single-table/default-storage-unit
    name: default-single-table-storage-unit
    title: Default Single Table Storage Unit
    description: "Read the default storage unit used for new single tables in one ShardingSphere logical database."
    mimeType: application/json
    shardingSphereMetadata:
      uriVariables:
        - name: database
          title: Logical Database
          description: "ShardingSphere logical database whose default single table storage unit should be inspected."
          required: true
          scope: logical-database
      resourceKind: detail
      objectScope: single_table
  - uriTemplate: shardingsphere://databases/{database}/schemas
    name: schemas
    title: Schemas
    description: "List schemas or namespaces visible inside one ShardingSphere logical database. Use this to fill schema arguments for metadata and SQL context."
    mimeType: application/json
    shardingSphereMetadata:
      uriVariables:
        - name: database
          title: Logical Database
          description: "ShardingSphere logical database that owns the schema namespace."
          required: true
          scope: logical-database
      resourceKind: list
      objectScope: schema
  - uriTemplate: shardingsphere://databases/{database}/schemas/{schema}
    name: schema-detail
    title: Schema Detail
    description: "Read one schema or namespace inside a logical database. Use this before listing tables, views, sequences, or indexes under that schema."
    mimeType: application/json
    shardingSphereMetadata:
      uriVariables:
        - name: database
          title: Logical Database
          description: "ShardingSphere logical database that owns the schema."
          required: true
          scope: logical-database
        - name: schema
          title: Schema
          description: "Database-native schema or namespace visible through ShardingSphere."
          required: true
          scope: schema
      resourceKind: detail
      objectScope: schema
  - uriTemplate: shardingsphere://databases/{database}/schemas/{schema}/sequences
    name: sequences
    title: Sequences
    description: "List sequences in a schema. Use this when SQL or workflow planning needs sequence object names visible through ShardingSphere."
    mimeType: application/json
    shardingSphereMetadata:
      uriVariables:
        - name: database
          title: Logical Database
          description: "ShardingSphere logical database that owns the schema."
          required: true
          scope: logical-database
        - name: schema
          title: Schema
          description: "Database-native schema or namespace that contains sequences."
          required: true
          scope: schema
      resourceKind: list
      objectScope: sequence
  - uriTemplate: shardingsphere://databases/{database}/schemas/{schema}/sequences/{sequence}
    name: sequence-detail
    title: Sequence Detail
    description: "Read one sequence definition visible through ShardingSphere. Use this when SQL generation or review needs a concrete sequence object."
    mimeType: application/json
    shardingSphereMetadata:
      uriVariables:
        - name: database
          title: Logical Database
          description: "ShardingSphere logical database that owns the schema."
          required: true
          scope: logical-database
        - name: schema
          title: Schema
          description: "Database-native schema or namespace that contains the sequence."
          required: true
          scope: schema
        - name: sequence
          title: Sequence
          description: "Database-native sequence object name."
          required: true
          scope: sequence
      resourceKind: detail
      objectScope: sequence
  - uriTemplate: shardingsphere://databases/{database}/schemas/{schema}/tables
    name: tables
    title: Tables
    description: "List logical tables in a schema. Read this before planning encrypt or mask rules when the table name is uncertain."
    mimeType: application/json
    shardingSphereMetadata:
      uriVariables:
        - name: database
          title: Logical Database
          description: "ShardingSphere logical database that owns the schema."
          required: true
          scope: logical-database
        - name: schema
          title: Schema
          description: "Schema or namespace that contains logical tables."
          required: true
          scope: schema
      resourceKind: list
      objectScope: logical-table
      relatedTools:
        - database_gateway_plan_encrypt_rule
        - database_gateway_plan_mask_rule
  - uriTemplate: shardingsphere://databases/{database}/schemas/{schema}/tables/{table}
    name: table-detail
    title: Table Detail
    description: "Read one logical table definition, including table-level metadata visible through ShardingSphere. Use this before column-level planning."
    mimeType: application/json
    shardingSphereMetadata:
      uriVariables:
        - name: database
          title: Logical Database
          description: "ShardingSphere logical database that owns the table."
          required: true
          scope: logical-database
        - name: schema
          title: Schema
          description: "Schema or namespace that contains the logical table."
          required: true
          scope: schema
        - name: table
          title: Logical Table
          description: "ShardingSphere logical table name, not a physical table shard."
          required: true
          scope: logical-table
      resourceKind: detail
      objectScope: logical-table
      relatedTools:
        - database_gateway_plan_encrypt_rule
        - database_gateway_plan_mask_rule
  - uriTemplate: shardingsphere://databases/{database}/schemas/{schema}/tables/{table}/columns
    name: table-columns
    title: Table Columns
    description: "List columns for one logical table. Read this before planning encrypt or mask rules for a column, or before writing SQL that references columns."
    mimeType: application/json
    shardingSphereMetadata:
      uriVariables:
        - name: database
          title: Logical Database
          description: "ShardingSphere logical database that owns the table."
          required: true
          scope: logical-database
        - name: schema
          title: Schema
          description: "Schema or namespace that contains the logical table."
          required: true
          scope: schema
        - name: table
          title: Logical Table
          description: "ShardingSphere logical table name whose columns should be listed."
          required: true
          scope: logical-table
      resourceKind: list
      objectScope: column
      relatedTools:
        - database_gateway_plan_encrypt_rule
        - database_gateway_plan_mask_rule
  - uriTemplate: shardingsphere://databases/{database}/schemas/{schema}/tables/{table}/columns/{column}
    name: table-column-detail
    title: Table Column Detail
    description: "Read one logical table column, including type and nullability metadata visible through ShardingSphere. Use this before column-level rule planning."
    mimeType: application/json
    shardingSphereMetadata:
      uriVariables:
        - name: database
          title: Logical Database
          description: "ShardingSphere logical database that owns the table."
          required: true
          scope: logical-database
        - name: schema
          title: Schema
          description: "Schema or namespace that contains the logical table."
          required: true
          scope: schema
        - name: table
          title: Logical Table
          description: "ShardingSphere logical table name that owns the column."
          required: true
          scope: logical-table
        - name: column
          title: Column
          description: "Logical column name visible through ShardingSphere."
          required: true
          scope: column
      resourceKind: detail
      objectScope: column
      relatedTools:
        - database_gateway_plan_encrypt_rule
        - database_gateway_plan_mask_rule
  - uriTemplate: shardingsphere://databases/{database}/schemas/{schema}/tables/{table}/indexes
    name: table-indexes
    title: Table Indexes
    description: "List indexes for one logical table. Use this before planning assisted-query encryption or reviewing DDL that may create or reuse indexes."
    mimeType: application/json
    shardingSphereMetadata:
      uriVariables:
        - name: database
          title: Logical Database
          description: "ShardingSphere logical database that owns the table."
          required: true
          scope: logical-database
        - name: schema
          title: Schema
          description: "Schema or namespace that contains the logical table."
          required: true
          scope: schema
        - name: table
          title: Logical Table
          description: "ShardingSphere logical table name whose indexes should be listed."
          required: true
          scope: logical-table
      resourceKind: list
      objectScope: index
      relatedTools:
        - database_gateway_plan_encrypt_rule
  - uriTemplate: shardingsphere://databases/{database}/schemas/{schema}/tables/{table}/indexes/{index}
    name: table-index-detail
    title: Table Index Detail
    description: "Read one index definition for a logical table. Use this when a plan must preserve or create a specific index."
    mimeType: application/json
    shardingSphereMetadata:
      uriVariables:
        - name: database
          title: Logical Database
          description: "ShardingSphere logical database that owns the table."
          required: true
          scope: logical-database
        - name: schema
          title: Schema
          description: "Schema or namespace that contains the logical table."
          required: true
          scope: schema
        - name: table
          title: Logical Table
          description: "ShardingSphere logical table name that owns the index."
          required: true
          scope: logical-table
        - name: index
          title: Index
          description: "Database-native index name visible for the logical table."
          required: true
          scope: index
      resourceKind: detail
      objectScope: index
  - uriTemplate: shardingsphere://databases/{database}/schemas/{schema}/views
    name: views
    title: Views
    description: "List views in a schema. Use this when SQL generation or metadata search must distinguish views from logical tables."
    mimeType: application/json
    shardingSphereMetadata:
      uriVariables:
        - name: database
          title: Logical Database
          description: "ShardingSphere logical database that owns the schema."
          required: true
          scope: logical-database
        - name: schema
          title: Schema
          description: "Schema or namespace that contains views."
          required: true
          scope: schema
      resourceKind: list
      objectScope: view
  - uriTemplate: shardingsphere://databases/{database}/schemas/{schema}/views/{view}
    name: view-detail
    title: View Detail
    description: "Read one view definition visible through ShardingSphere. Use this before writing SQL that references a view."
    mimeType: application/json
    shardingSphereMetadata:
      uriVariables:
        - name: database
          title: Logical Database
          description: "ShardingSphere logical database that owns the schema."
          required: true
          scope: logical-database
        - name: schema
          title: Schema
          description: "Schema or namespace that contains the view."
          required: true
          scope: schema
        - name: view
          title: View
          description: "Database view name visible through ShardingSphere."
          required: true
          scope: view
      resourceKind: detail
      objectScope: view
  - uriTemplate: shardingsphere://databases/{database}/schemas/{schema}/views/{view}/columns
    name: view-columns
    title: View Columns
    description: "List columns exposed by one view. Use this before writing SQL that projects or filters view columns."
    mimeType: application/json
    shardingSphereMetadata:
      uriVariables:
        - name: database
          title: Logical Database
          description: "ShardingSphere logical database that owns the schema."
          required: true
          scope: logical-database
        - name: schema
          title: Schema
          description: "Schema or namespace that contains the view."
          required: true
          scope: schema
        - name: view
          title: View
          description: "Database view name whose columns should be listed."
          required: true
          scope: view
      resourceKind: list
      objectScope: column
  - uriTemplate: shardingsphere://databases/{database}/schemas/{schema}/views/{view}/columns/{column}
    name: view-column-detail
    title: View Column Detail
    description: "Read one view column definition visible through ShardingSphere. Use this when SQL should reference a specific view column."
    mimeType: application/json
    shardingSphereMetadata:
      uriVariables:
        - name: database
          title: Logical Database
          description: "ShardingSphere logical database that owns the schema."
          required: true
          scope: logical-database
        - name: schema
          title: Schema
          description: "Schema or namespace that contains the view."
          required: true
          scope: schema
        - name: view
          title: View
          description: "Database view name that owns the column."
          required: true
          scope: view
        - name: column
          title: Column
          description: "View column name visible through ShardingSphere."
          required: true
          scope: column
      resourceKind: detail
      objectScope: column
