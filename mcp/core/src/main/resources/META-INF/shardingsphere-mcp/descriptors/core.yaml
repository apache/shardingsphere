resources:
  - uriPattern: shardingsphere://capabilities
    name: server-capability-catalog
    title: ShardingSphere MCP Capability Catalog
    description: "Generated model-facing catalog for ShardingSphere MCP resources, resource templates, tools, prompts, completions, workflow relationships, side-effect notes, and navigation hints."
    mimeType: application/json
    annotations:
      audience:
        - assistant
      priority: 1.0
    meta:
      kind: capability-catalog
      useBefore:
        - choosing tools
        - planning multi-step workflows
  - uriPattern: shardingsphere://runtime
    name: runtime-status
    title: Runtime Status
    description: "Read the current MCP runtime status, configured logical database count, and first resources to inspect before choosing tools."
    mimeType: application/json
    annotations:
      audience:
        - assistant
      priority: 0.9
    meta:
      resourceKind: detail
      objectScope: runtime
      relatedResources:
        - shardingsphere://capabilities
        - shardingsphere://databases
  - uriPattern: shardingsphere://workflows/{plan_id}
    name: workflow-plan
    title: Workflow Plan
    description: "Read one current in-memory workflow plan by plan_id. Use after planning tools to review status, clarification questions, artifacts, and next actions."
    mimeType: application/json
    parameters:
      - name: plan_id
        title: Plan ID
        description: "Workflow plan_id returned by a planning tool in the current MCP runtime."
        required: true
        scope: workflow-plan
    meta:
      resourceKind: detail
      objectScope: workflow-plan
      relatedTools:
        - validate_workflow
        - apply_workflow
  - uriPattern: shardingsphere://databases
    name: logical-databases
    title: Logical Databases
    description: "List ShardingSphere logical databases visible to the current MCP runtime. Read this before choosing a database argument for metadata, SQL, or workflow tools."
    mimeType: application/json
    meta:
      resourceKind: list
      objectScope: logical-database
      relatedTools:
        - search_metadata
        - execute_query
  - uriPattern: shardingsphere://databases/{database}
    name: logical-database-detail
    title: Logical Database Detail
    description: "Read one ShardingSphere logical database entry and its visible metadata summary. Use this when a user names a database and the model needs to confirm it exists."
    mimeType: application/json
    parameters:
      - name: database
        title: Logical Database
        description: "ShardingSphere logical database name, not a physical storage unit name."
        required: true
        scope: logical-database
    meta:
      resourceKind: detail
      objectScope: logical-database
  - uriPattern: shardingsphere://databases/{database}/capabilities
    name: database-capabilities
    title: Database Capabilities
    description: "Read statement, transaction, schema, and metadata-object capabilities for one logical database. Use before executing SQL or deciding whether EXPLAIN ANALYZE is available."
    mimeType: application/json
    parameters:
      - name: database
        title: Logical Database
        description: "ShardingSphere logical database whose SQL and metadata capabilities should be inspected."
        required: true
        scope: logical-database
    meta:
      resourceKind: detail
      relatedTools:
        - execute_query
        - execute_update
  - uriPattern: shardingsphere://databases/{database}/schemas
    name: schemas
    title: Schemas
    description: "List schemas or namespaces visible inside one ShardingSphere logical database. Use this to fill schema arguments for metadata and SQL context."
    mimeType: application/json
    parameters:
      - name: database
        title: Logical Database
        description: "ShardingSphere logical database that owns the schema namespace."
        required: true
        scope: logical-database
    meta:
      resourceKind: list
      objectScope: schema
  - uriPattern: shardingsphere://databases/{database}/schemas/{schema}
    name: schema-detail
    title: Schema Detail
    description: "Read one schema or namespace inside a logical database. Use this before listing tables, views, sequences, or indexes under that schema."
    mimeType: application/json
    parameters:
      - name: database
        title: Logical Database
        description: "ShardingSphere logical database that owns the schema."
        required: true
        scope: logical-database
      - name: schema
        title: Schema
        description: "Database-native schema or namespace visible through ShardingSphere."
        required: true
        scope: schema
    meta:
      resourceKind: detail
      objectScope: schema
  - uriPattern: shardingsphere://databases/{database}/schemas/{schema}/sequences
    name: sequences
    title: Sequences
    description: "List sequences in a schema. Use this when SQL or workflow planning needs sequence object names visible through ShardingSphere."
    mimeType: application/json
    parameters:
      - name: database
        title: Logical Database
        description: "ShardingSphere logical database that owns the schema."
        required: true
        scope: logical-database
      - name: schema
        title: Schema
        description: "Database-native schema or namespace that contains sequences."
        required: true
        scope: schema
    meta:
      resourceKind: list
      objectScope: sequence
  - uriPattern: shardingsphere://databases/{database}/schemas/{schema}/sequences/{sequence}
    name: sequence-detail
    title: Sequence Detail
    description: "Read one sequence definition visible through ShardingSphere. Use this when SQL generation or review needs a concrete sequence object."
    mimeType: application/json
    parameters:
      - name: database
        title: Logical Database
        description: "ShardingSphere logical database that owns the schema."
        required: true
        scope: logical-database
      - name: schema
        title: Schema
        description: "Database-native schema or namespace that contains the sequence."
        required: true
        scope: schema
      - name: sequence
        title: Sequence
        description: "Database-native sequence object name."
        required: true
        scope: sequence
    meta:
      resourceKind: detail
      objectScope: sequence
  - uriPattern: shardingsphere://databases/{database}/schemas/{schema}/tables
    name: tables
    title: Tables
    description: "List logical tables in a schema. Read this before planning encrypt or mask rules when the table name is uncertain."
    mimeType: application/json
    parameters:
      - name: database
        title: Logical Database
        description: "ShardingSphere logical database that owns the schema."
        required: true
        scope: logical-database
      - name: schema
        title: Schema
        description: "Schema or namespace that contains logical tables."
        required: true
        scope: schema
    meta:
      resourceKind: list
      objectScope: logical-table
      relatedTools:
        - plan_encrypt_rule
        - plan_mask_rule
  - uriPattern: shardingsphere://databases/{database}/schemas/{schema}/tables/{table}
    name: table-detail
    title: Table Detail
    description: "Read one logical table definition, including table-level metadata visible through ShardingSphere. Use this before column-level planning."
    mimeType: application/json
    parameters:
      - name: database
        title: Logical Database
        description: "ShardingSphere logical database that owns the table."
        required: true
        scope: logical-database
      - name: schema
        title: Schema
        description: "Schema or namespace that contains the logical table."
        required: true
        scope: schema
      - name: table
        title: Logical Table
        description: "ShardingSphere logical table name, not a physical table shard."
        required: true
        scope: logical-table
    meta:
      resourceKind: detail
      objectScope: logical-table
      relatedTools:
        - plan_encrypt_rule
        - plan_mask_rule
  - uriPattern: shardingsphere://databases/{database}/schemas/{schema}/tables/{table}/columns
    name: table-columns
    title: Table Columns
    description: "List columns for one logical table. Read this before planning encrypt or mask rules for a column, or before writing SQL that references columns."
    mimeType: application/json
    parameters:
      - name: database
        title: Logical Database
        description: "ShardingSphere logical database that owns the table."
        required: true
        scope: logical-database
      - name: schema
        title: Schema
        description: "Schema or namespace that contains the logical table."
        required: true
        scope: schema
      - name: table
        title: Logical Table
        description: "ShardingSphere logical table name whose columns should be listed."
        required: true
        scope: logical-table
    meta:
      resourceKind: list
      objectScope: column
      relatedTools:
        - plan_encrypt_rule
        - plan_mask_rule
  - uriPattern: shardingsphere://databases/{database}/schemas/{schema}/tables/{table}/columns/{column}
    name: table-column-detail
    title: Table Column Detail
    description: "Read one logical table column, including type and nullability metadata visible through ShardingSphere. Use this before column-level rule planning."
    mimeType: application/json
    parameters:
      - name: database
        title: Logical Database
        description: "ShardingSphere logical database that owns the table."
        required: true
        scope: logical-database
      - name: schema
        title: Schema
        description: "Schema or namespace that contains the logical table."
        required: true
        scope: schema
      - name: table
        title: Logical Table
        description: "ShardingSphere logical table name that owns the column."
        required: true
        scope: logical-table
      - name: column
        title: Column
        description: "Logical column name visible through ShardingSphere."
        required: true
        scope: column
    meta:
      resourceKind: detail
      objectScope: column
      relatedTools:
        - plan_encrypt_rule
        - plan_mask_rule
  - uriPattern: shardingsphere://databases/{database}/schemas/{schema}/tables/{table}/indexes
    name: table-indexes
    title: Table Indexes
    description: "List indexes for one logical table. Use this before planning assisted-query encryption or reviewing DDL that may create or reuse indexes."
    mimeType: application/json
    parameters:
      - name: database
        title: Logical Database
        description: "ShardingSphere logical database that owns the table."
        required: true
        scope: logical-database
      - name: schema
        title: Schema
        description: "Schema or namespace that contains the logical table."
        required: true
        scope: schema
      - name: table
        title: Logical Table
        description: "ShardingSphere logical table name whose indexes should be listed."
        required: true
        scope: logical-table
    meta:
      resourceKind: list
      objectScope: index
      relatedTools:
        - plan_encrypt_rule
  - uriPattern: shardingsphere://databases/{database}/schemas/{schema}/tables/{table}/indexes/{index}
    name: table-index-detail
    title: Table Index Detail
    description: "Read one index definition for a logical table. Use this when a plan must preserve or create a specific index."
    mimeType: application/json
    parameters:
      - name: database
        title: Logical Database
        description: "ShardingSphere logical database that owns the table."
        required: true
        scope: logical-database
      - name: schema
        title: Schema
        description: "Schema or namespace that contains the logical table."
        required: true
        scope: schema
      - name: table
        title: Logical Table
        description: "ShardingSphere logical table name that owns the index."
        required: true
        scope: logical-table
      - name: index
        title: Index
        description: "Database-native index name visible for the logical table."
        required: true
        scope: index
    meta:
      resourceKind: detail
      objectScope: index
  - uriPattern: shardingsphere://databases/{database}/schemas/{schema}/views
    name: views
    title: Views
    description: "List views in a schema. Use this when SQL generation or metadata search must distinguish views from logical tables."
    mimeType: application/json
    parameters:
      - name: database
        title: Logical Database
        description: "ShardingSphere logical database that owns the schema."
        required: true
        scope: logical-database
      - name: schema
        title: Schema
        description: "Schema or namespace that contains views."
        required: true
        scope: schema
    meta:
      resourceKind: list
      objectScope: view
  - uriPattern: shardingsphere://databases/{database}/schemas/{schema}/views/{view}
    name: view-detail
    title: View Detail
    description: "Read one view definition visible through ShardingSphere. Use this before writing SQL that references a view."
    mimeType: application/json
    parameters:
      - name: database
        title: Logical Database
        description: "ShardingSphere logical database that owns the schema."
        required: true
        scope: logical-database
      - name: schema
        title: Schema
        description: "Schema or namespace that contains the view."
        required: true
        scope: schema
      - name: view
        title: View
        description: "Database view name visible through ShardingSphere."
        required: true
        scope: view
    meta:
      resourceKind: detail
      objectScope: view
  - uriPattern: shardingsphere://databases/{database}/schemas/{schema}/views/{view}/columns
    name: view-columns
    title: View Columns
    description: "List columns exposed by one view. Use this before writing SQL that projects or filters view columns."
    mimeType: application/json
    parameters:
      - name: database
        title: Logical Database
        description: "ShardingSphere logical database that owns the schema."
        required: true
        scope: logical-database
      - name: schema
        title: Schema
        description: "Schema or namespace that contains the view."
        required: true
        scope: schema
      - name: view
        title: View
        description: "Database view name whose columns should be listed."
        required: true
        scope: view
    meta:
      resourceKind: list
      objectScope: column
  - uriPattern: shardingsphere://databases/{database}/schemas/{schema}/views/{view}/columns/{column}
    name: view-column-detail
    title: View Column Detail
    description: "Read one view column definition visible through ShardingSphere. Use this when SQL should reference a specific view column."
    mimeType: application/json
    parameters:
      - name: database
        title: Logical Database
        description: "ShardingSphere logical database that owns the schema."
        required: true
        scope: logical-database
      - name: schema
        title: Schema
        description: "Schema or namespace that contains the view."
        required: true
        scope: schema
      - name: view
        title: View
        description: "Database view name that owns the column."
        required: true
        scope: view
      - name: column
        title: Column
        description: "View column name visible through ShardingSphere."
        required: true
        scope: column
    meta:
      resourceKind: detail
      objectScope: column
completionTargets:
  - referenceType: resource
    reference: shardingsphere://databases/{database}
    arguments:
      - database
    maxValues: 50
  - referenceType: resource
    reference: shardingsphere://databases/{database}/schemas
    arguments:
      - database
    maxValues: 50
  - referenceType: resource
    reference: shardingsphere://databases/{database}/schemas/{schema}/tables
    arguments:
      - database
      - schema
    maxValues: 50
  - referenceType: resource
    reference: shardingsphere://databases/{database}/schemas/{schema}/tables/{table}/columns
    arguments:
      - database
      - schema
      - table
    maxValues: 50
  - referenceType: resource
    reference: shardingsphere://databases/{database}/schemas/{schema}/tables/{table}/indexes
    arguments:
      - database
      - schema
      - table
    maxValues: 50
  - referenceType: resource
    reference: shardingsphere://databases/{database}/schemas/{schema}/sequences
    arguments:
      - database
      - schema
    maxValues: 50
resourceNavigation:
  - from: shardingsphere://capabilities
    to: shardingsphere://runtime
    requiredArguments: []
    carriedArguments: []
    description: "Read current runtime status when availability or configured database scope is unclear."
  - from: shardingsphere://capabilities
    to: shardingsphere://databases
    requiredArguments: []
    carriedArguments: []
    description: "Read logical databases before choosing a database argument."
  - from: shardingsphere://capabilities
    to: search_metadata
    requiredArguments: []
    carriedArguments: []
    description: "Use metadata search when the target object name or object type is uncertain."
  - from: shardingsphere://databases/{database}
    to: shardingsphere://databases/{database}/schemas
    requiredArguments:
      - database
    carriedArguments:
      - database
    description: "List schemas after choosing a logical database."
  - from: shardingsphere://databases/{database}/schemas/{schema}
    to: shardingsphere://databases/{database}/schemas/{schema}/tables
    requiredArguments:
      - database
      - schema
    carriedArguments:
      - database
      - schema
    description: "List logical tables after choosing a schema."
  - from: shardingsphere://databases/{database}/schemas/{schema}
    to: shardingsphere://databases/{database}/schemas/{schema}/views
    requiredArguments:
      - database
      - schema
    carriedArguments:
      - database
      - schema
    description: "List logical views after choosing a schema."
  - from: shardingsphere://databases/{database}/schemas/{schema}
    to: shardingsphere://databases/{database}/schemas/{schema}/sequences
    requiredArguments:
      - database
      - schema
    carriedArguments:
      - database
      - schema
    description: "Read sequences when sequence metadata is supported."
  - from: shardingsphere://databases/{database}/schemas/{schema}/tables/{table}
    to: shardingsphere://databases/{database}/schemas/{schema}/tables/{table}/columns
    requiredArguments:
      - database
      - schema
      - table
    carriedArguments:
      - database
      - schema
      - table
    description: "Read columns after choosing a logical table."
  - from: shardingsphere://databases/{database}/schemas/{schema}/tables/{table}
    to: shardingsphere://databases/{database}/schemas/{schema}/tables/{table}/indexes
    requiredArguments:
      - database
      - schema
      - table
    carriedArguments:
      - database
      - schema
      - table
    description: "Read indexes when index metadata is supported."
  - from: shardingsphere://databases/{database}/schemas/{schema}/views/{view}
    to: shardingsphere://databases/{database}/schemas/{schema}/views/{view}/columns
    requiredArguments:
      - database
      - schema
      - view
    carriedArguments:
      - database
      - schema
      - view
    description: "Read view columns after choosing a logical view."
tools:
  - name: search_metadata
    title: Search Metadata
    description: >-
      Search ShardingSphere logical metadata by name and object type. Use this to find databases, schemas, tables, columns, indexes, views,
      or sequences before calling detail resources or planning tools.
    fields:
      - name: database
        required: false
        valueDefinition:
          type: STRING
          description: "Optional ShardingSphere logical database name used to narrow the search."
      - name: schema
        required: false
        valueDefinition:
          type: STRING
          description: "Optional schema or namespace used to narrow table, view, column, index, and sequence search."
      - name: query
        required: false
        valueDefinition:
          type: STRING
          description: "Optional name fragment or exact object name. Blank query lists metadata inside the narrowed database/schema/object_types scope."
      - name: object_types
        required: false
        valueDefinition:
          type: ARRAY
          description: "Optional object-type filter. Omit it when the user intent does not identify a specific metadata object kind."
          itemDefinition:
            type: STRING
            description: "Allowed metadata object type."
            enumValues:
              - database
              - schema
              - table
              - view
              - column
              - index
              - sequence
      - name: page_size
        required: false
        valueDefinition:
          type: INTEGER
          description: "Requested page size for search results. Omit for default 100. Accepted range is 1 to 500."
      - name: page_token
        required: false
        valueDefinition:
          type: STRING
          description: "Non-negative pagination offset token returned by a previous search_metadata call."
    outputSchema:
      type: object
      properties:
        items:
          type: array
          description: "Matched metadata objects with logical path fields, object type, and direct resource navigation hints when derivable."
          items:
            type: object
            description: "One metadata search hit."
            properties:
              database:
                type: string
                description: "ShardingSphere logical database that owns the metadata object."
              schema:
                type: string
                description: "Schema or namespace for schema-scoped metadata objects."
              objectType:
                type: string
                description: "Matched metadata object type: database, schema, table, view, column, index, or sequence."
              table:
                type: string
                description: "Parent logical table for table, table column, and index hits."
              view:
                type: string
                description: "Parent logical view for view and view column hits."
              name:
                type: string
                description: "Matched metadata object name."
              resource_uri:
                type: string
                description: "Direct resources/read URI for this hit when the metadata names map safely to a descriptor resource pattern."
              parent_resource_uri:
                type: string
                description: "Nearest list resource URI that contains this hit when derivable."
              next_resource_uris:
                type: array
                description: "Likely child or detail resource URIs to read next from this hit."
                items:
                  type: string
              derivation_status:
                type: string
                description: "URI derivation status, either derived or not_safe_to_derive."
              derivation_reason:
                type: string
                description: "Reason resource_uri could not be safely derived."
              match_kind:
                type: string
                description: "Best query match kind for this hit: all, exact, prefix, or contains."
              matched_fields:
                type: array
                description: "Metadata fields that matched the query using match_kind."
                items:
                  type: string
              matched_value:
                type: string
                description: "First metadata value that matched the query."
        count:
          type: integer
          description: "Number of items returned in this page."
        next_page_token:
          type: string
          description: "Opaque token for the next result page when more items exist."
        has_more:
          type: boolean
          description: "Whether another page is available and next_page_token should be used."
        search_context:
          type: object
          description: "Applied search scope, query, object types, page size, and page offset used for this page."
        empty_reason:
          type: string
          description: "Reason no metadata hits were returned, such as no_matches_for_query or no_metadata_in_scope."
        next_actions:
          type: array
          description: "Structured follow-up actions for an empty search result."
      examples:
        - items:
            - database: logic_db
              schema: public
              objectType: table
              table: orders
              name: orders
              resource_uri: shardingsphere://databases/logic_db/schemas/public/tables/orders
              parent_resource_uri: shardingsphere://databases/logic_db/schemas/public/tables
              next_resource_uris:
                - shardingsphere://databases/logic_db/schemas/public/tables/orders/columns
              derivation_status: derived
              match_kind: exact
              matched_fields:
                - name
              matched_value: orders
          count: 1
          has_more: false
          search_context:
            query: orders
            database: logic_db
            database_scope: single_database
            schema: public
            object_types:
              - table
            page_size: 100
            page_offset: 0
    annotations:
      title: Search Metadata
      readOnlyHint: true
      destructiveHint: false
      idempotentHint: true
      openWorldHint: true
      returnDirect: false
    meta:
      relatedResources:
        - shardingsphere://databases
        - shardingsphere://databases/{database}/schemas
  - name: execute_query
    title: Execute Read-Only SQL
    description: >-
      Execute exactly one read-only SELECT or EXPLAIN ANALYZE statement against a ShardingSphere logical database. Use for inspection only;
      DML, DDL, DCL, transaction control, and savepoints are rejected.
    fields:
      - name: database
        required: true
        valueDefinition:
          type: STRING
          description: "ShardingSphere logical database name that provides the execution boundary."
      - name: schema
        required: false
        valueDefinition:
          type: STRING
          description: "Optional schema or namespace hint for unqualified object names."
      - name: sql
        required: true
        valueDefinition:
          type: STRING
          description: "One SELECT or EXPLAIN ANALYZE statement. Do not include multiple statements or mutating SQL."
      - name: max_rows
        required: false
        valueDefinition:
          type: INTEGER
          description: "Optional maximum number of rows to return. Omit or use zero for default 100. Accepted range is 0 to 5000."
      - name: timeout_ms
        required: false
        valueDefinition:
          type: INTEGER
          description: "Optional execution timeout in milliseconds. Omit or use zero for no explicit timeout. Accepted range is 0 to 300000."
    outputSchema:
      type: object
      properties:
        result_kind:
          type: string
          description: "Result kind. execute_query returns result_set for row results."
          enum:
            - result_set
        statement_class:
          type: string
          description: "Statement class: query or explain_analyze."
          enum:
            - query
            - explain_analyze
        statement_type:
          type: string
          description: "Database statement type reported by the execution classifier."
        status:
          type: string
          description: "Execution status returned by the server."
        normalized_sql:
          type: string
          description: "Classifier-normalized SQL executed by the server."
        columns:
          type: array
          description: "Returned column definitions."
        rows:
          type: array
          description: "Returned result rows."
        returned_row_count:
          type: integer
          description: "Number of result rows returned in this payload."
        applied_max_rows:
          type: integer
          description: "Applied max_rows argument after defaulting and bounds enforcement."
        applied_timeout_ms:
          type: integer
          description: "Applied timeout_ms argument; zero means the request used the server default."
        truncated:
          type: boolean
          description: "Whether rows were truncated by max_rows or server limits."
        next_actions:
          type: array
          description: "Ordered structured model-facing recommendations after SQL execution."
      examples:
        - result_kind: result_set
          statement_class: query
          statement_type: SELECT
          status: OK
          columns: []
          rows: []
          returned_row_count: 0
          applied_max_rows: 10
          applied_timeout_ms: 0
          truncated: false
          next_actions:
            - action_kind: stop
              reason: Return the result rows to the user.
              requires_user_approval: false
    annotations:
      title: Execute Read-Only SQL
      readOnlyHint: true
      destructiveHint: false
      idempotentHint: true
      openWorldHint: true
      returnDirect: false
    meta:
      relatedResources:
        - shardingsphere://databases/{database}/capabilities
        - shardingsphere://databases/{database}/schemas
      rejectedStatementClasses:
        - DML
        - DDL
        - DCL
        - TRANSACTION_CONTROL
        - SAVEPOINT
  - name: execute_update
    title: Execute Update SQL
    description: >-
      Execute or preview exactly one supported SQL statement that may mutate data, metadata, rules, or transaction state.
      Use execution_mode=preview first when the user has not explicitly approved side effects.
    fields:
      - name: database
        required: true
        valueDefinition:
          type: STRING
          description: "ShardingSphere logical database name that provides the execution boundary."
      - name: schema
        required: false
        valueDefinition:
          type: STRING
          description: "Optional schema or namespace hint for unqualified object names."
      - name: sql
        required: true
        valueDefinition:
          type: STRING
          description: "One SQL statement. The server contract rejects banned commands and multiple statements."
      - name: execution_mode
        required: true
        valueDefinition:
          type: STRING
          description: "Required safety gate. Use preview to classify side effects without execution, or execute only after explicit user approval of the preview."
          enumValues:
            - execute
            - preview
      - name: max_rows
        required: false
        valueDefinition:
          type: INTEGER
          description: "Optional maximum row count when the statement returns rows, for example dialect-specific RETURNING. Omit or use zero for default 100. Accepted range is 0 to 5000."
      - name: timeout_ms
        required: false
        valueDefinition:
          type: INTEGER
          description: "Optional execution timeout in milliseconds. Omit or use zero for no explicit timeout. Accepted range is 0 to 300000."
    outputSchema:
      type: object
      properties:
        result_kind:
          type: string
          description: "Result kind: preview, result_set, update_count, or statement_ack."
          enum:
            - preview
            - result_set
            - update_count
            - statement_ack
        statement_class:
          type: string
          description: "Statement class such as dml, ddl, dcl, transaction_control, or savepoint."
          enum:
            - dml
            - ddl
            - dcl
            - transaction_control
            - savepoint
        statement_type:
          type: string
          description: "Database statement type reported by the execution classifier or preview."
        execution_mode:
          type: string
          description: "Execution mode used by the call; preview means the statement was not executed."
        status:
          type: string
          description: "Execution or preview status returned by the server."
        normalized_sql:
          type: string
          description: "Classifier-normalized SQL returned by preview or recovery paths."
        affected_rows:
          type: integer
          description: "Affected row count when the database reports one."
        message:
          type: string
          description: "Execution message for statements without row results."
        returned_row_count:
          type: integer
          description: "Number of rows returned when result_kind is result_set."
        applied_max_rows:
          type: integer
          description: "Applied max_rows argument for executed SQL after defaulting and bounds enforcement."
        applied_timeout_ms:
          type: integer
          description: "Applied timeout_ms argument for executed SQL; zero means the request used the server default."
        would_execute:
          type: boolean
          description: "False when execution_mode=preview, proving the SQL was classified but not executed."
        side_effect_scope:
          type: array
          description: "Preview-only side-effect categories such as physical-data, physical-structure, privilege-metadata, or transaction-state."
        target_object:
          type: string
          description: "Preview-only target object name when the classifier can identify one."
        savepoint:
          type: string
          description: "Preview-only savepoint name when the classifier can identify one."
        requires_user_approval:
          type: boolean
          description: "Whether continuing from this response requires explicit user approval."
        approval_guidance:
          type: string
          description: "Preview-only user approval guidance before execution."
        approval_summary:
          type: string
          description: "Preview-only natural-language summary that confirms the statement was not executed."
        approval_question:
          type: string
          description: "Preview-only approval question the model can ask before execution."
        suggested_arguments:
          type: object
          description: "Preview-only arguments to reuse when the user approves execution."
        argument_provenance:
          type: object
          description: "Source of suggested argument values, such as user_provided, server_normalized, or server_suggested."
        read_resources_first:
          type: array
          description: "Resource URIs to read before retrying when metadata context is missing."
        ask_user_when_uncertain:
          type: boolean
          description: "Whether the model should ask the user before continuing."
        next_actions:
          type: array
          description: "Ordered structured model-facing recommendations after preview or execution."
        truncated:
          type: boolean
          description: "Whether returned rows were truncated."
      examples:
        - result_kind: preview
          execution_mode: preview
          statement_class: dml
          statement_type: UPDATE
          status: AWAITING_APPROVAL
          would_execute: false
          approval_summary: Previewed UPDATE statement with side-effect scope physical-data. It has not been executed.
          approval_question: Do you approve executing this UPDATE statement with side-effect scope physical-data?
          suggested_arguments:
            execution_mode: execute
          next_actions:
            - action_kind: ask_user
              reason: Ask the user to approve the previewed side effects before execution.
              requires_user_approval: true
    annotations:
      title: Execute Update SQL
      readOnlyHint: false
      destructiveHint: true
      idempotentHint: false
      openWorldHint: true
      returnDirect: false
    meta:
      relatedResources:
        - shardingsphere://databases/{database}/capabilities
      sideEffectScope:
        - physical-data
        - physical-structure
        - privilege-metadata
        - transaction-state
      requiresUserApproval: true
