resources:
  - uri: shardingsphere://features/readwrite-splitting/load-balance-algorithm-plugins
    name: readwrite-splitting-load-balance-algorithm-plugins
    title: Readwrite-Splitting Load-Balance Algorithm Plugins
    description: "List load-balance algorithm plugins visible from the current ShardingSphere runtime and include built-in property guidance for common algorithms."
    mimeType: application/json
    meta:
      org.apache.shardingsphere/runtime-visibility: ShardingSphere-Proxy
    shardingSphereMetadata:
      resourceKind: list
      objectScope: algorithm
      feature: readwrite-splitting
      relatedTools:
        - database_gateway_plan_readwrite_splitting_rule
resourceTemplates:
  - uriTemplate: shardingsphere://features/readwrite-splitting/databases/{database}/rules
    name: readwrite-splitting-rules
    title: Readwrite-Splitting Rules
    description: "List readwrite-splitting rules for one ShardingSphere logical database. Read this before creating, altering, dropping, or validating rule configuration."
    mimeType: application/json
    shardingSphereMetadata:
      uriVariables:
        - name: database
          title: Logical Database
          description: "ShardingSphere logical database whose readwrite-splitting rules should be inspected."
          required: true
          scope: logical-database
      resourceKind: list
      objectScope: rule
      feature: readwrite-splitting
      relatedTools:
        - database_gateway_plan_readwrite_splitting_rule
        - database_gateway_validate_workflow
  - uriTemplate: shardingsphere://features/readwrite-splitting/databases/{database}/rules/{rule}
    name: readwrite-splitting-rule
    title: Readwrite-Splitting Rule
    description: "Read one readwrite-splitting rule by name through DistSQL-visible rule state."
    mimeType: application/json
    shardingSphereMetadata:
      uriVariables:
        - name: database
          title: Logical Database
          description: "ShardingSphere logical database that owns the readwrite-splitting rule."
          required: true
          scope: logical-database
        - name: rule
          title: Rule Name
          description: "Readwrite-splitting rule name."
          required: true
          scope: logical-rule
      resourceKind: rule
      feature: readwrite-splitting
      relatedTools:
        - database_gateway_plan_readwrite_splitting_rule
        - database_gateway_validate_workflow
  - uriTemplate: shardingsphere://features/readwrite-splitting/databases/{database}/status
    name: readwrite-splitting-status
    title: Readwrite-Splitting Status
    description: "List read storage-unit status rows for all readwrite-splitting rules in one logical database."
    mimeType: application/json
    shardingSphereMetadata:
      uriVariables:
        - name: database
          title: Logical Database
          description: "ShardingSphere logical database whose readwrite-splitting status should be inspected."
          required: true
          scope: logical-database
      resourceKind: list
      objectScope: rule
      feature: readwrite-splitting
      relatedTools:
        - database_gateway_plan_readwrite_splitting_status
        - database_gateway_validate_workflow
  - uriTemplate: shardingsphere://features/readwrite-splitting/databases/{database}/rules/{rule}/status
    name: readwrite-splitting-rule-status
    title: Readwrite-Splitting Rule Status
    description: "List read storage-unit status rows for one readwrite-splitting rule."
    mimeType: application/json
    shardingSphereMetadata:
      uriVariables:
        - name: database
          title: Logical Database
          description: "ShardingSphere logical database that owns the readwrite-splitting rule."
          required: true
          scope: logical-database
        - name: rule
          title: Rule Name
          description: "Readwrite-splitting rule name."
          required: true
          scope: logical-rule
      resourceKind: list
      objectScope: rule
      feature: readwrite-splitting
      relatedTools:
        - database_gateway_plan_readwrite_splitting_status
        - database_gateway_validate_workflow
  - uriTemplate: shardingsphere://features/readwrite-splitting/databases/{database}/rule-count
    name: readwrite-splitting-rule-count
    title: Readwrite-Splitting Rule Count
    description: "Count readwrite-splitting rules for one ShardingSphere logical database through DistSQL-visible rule state."
    mimeType: application/json
    shardingSphereMetadata:
      uriVariables:
        - name: database
          title: Logical Database
          description: "ShardingSphere logical database whose readwrite-splitting rule count should be inspected."
          required: true
          scope: logical-database
      resourceKind: list
      objectScope: rule
      feature: readwrite-splitting
      relatedTools:
        - database_gateway_plan_readwrite_splitting_rule
        - database_gateway_validate_workflow
prompts:
  - name: plan_readwrite_splitting_rule
    title: Plan Readwrite-Splitting Rule
    description: "Guide the model to plan a ShardingSphere readwrite-splitting rule by reading existing rules and load-balance algorithm plugins first."
    binding:
      templateResource: META-INF/shardingsphere-mcp/prompts/plan-readwrite-splitting-rule.md
    arguments:
      - name: database
        title: Logical Database
        description: "ShardingSphere logical database that owns the readwrite-splitting rule."
        required: false
      - name: rule
        title: Rule Name
        description: "Readwrite-splitting rule name."
        required: false
      - name: operation_type
        title: Operation Type
        description: "Rule lifecycle operation: create, alter, or drop."
        required: false
      - name: write_storage_unit
        title: Write Storage Unit
        description: "Existing write storage unit name for create or alter operations."
        required: false
      - name: read_storage_units
        title: Read Storage Units
        description: "Comma-separated existing read storage unit names for create or alter operations."
        required: false
      - name: transactional_read_query_strategy
        title: Transactional Read Query Strategy
        description: "Transactional read query strategy required by readwrite-splitting DistSQL."
        required: false
      - name: load_balancer_type
        title: Load Balancer Type
        description: "Optional load-balance algorithm type."
        required: false
      - name: plan_id
        title: Workflow Plan ID
        description: "Existing current-session workflow plan identifier used only to continue a readwrite-splitting rule plan. Omit when starting a new plan; never use placeholder values such as `plan_id`."
        required: false
    meta:
      org.apache.shardingsphere/related-tools:
        - database_gateway_plan_readwrite_splitting_rule
        - database_gateway_apply_workflow
        - database_gateway_validate_workflow
      org.apache.shardingsphere/related-resource-uris:
        - shardingsphere://features/readwrite-splitting/databases/{database}/rules
        - shardingsphere://features/readwrite-splitting/load-balance-algorithm-plugins
      org.apache.shardingsphere/stop-conditions:
        - "Stop after database_gateway_plan_readwrite_splitting_rule returns a planned workflow with plan_id and reviewable artifacts."
        - "Stop after a clarifying response lists missing inputs instead of guessing storage units."
      org.apache.shardingsphere/ask-user-conditions:
        - "Ask when database, rule name, storage unit names, strategy, or algorithm properties are unclear."
        - "Ask before applying generated readwrite-splitting rule DistSQL that changes runtime state."
  - name: plan_readwrite_splitting_status
    title: Plan Readwrite-Splitting Status
    description: "Guide the model to plan a Cluster-mode readwrite-splitting storage-unit enable or disable workflow by reading current status first."
    binding:
      templateResource: META-INF/shardingsphere-mcp/prompts/plan-readwrite-splitting-status.md
    arguments:
      - name: database
        title: Logical Database
        description: "ShardingSphere logical database that owns the readwrite-splitting rule."
        required: false
      - name: rule
        title: Rule Name
        description: "Readwrite-splitting rule name."
        required: false
      - name: storage_unit
        title: Storage Unit
        description: "Existing read storage unit whose status should be enabled or disabled."
        required: false
      - name: target_status
        title: Target Status
        description: "Target status: enable or disable."
        required: false
      - name: plan_id
        title: Workflow Plan ID
        description: "Existing current-session workflow plan identifier used only to continue a readwrite-splitting status plan. Omit when starting a new plan; never use placeholder values such as `plan_id`."
        required: false
    meta:
      org.apache.shardingsphere/related-tools:
        - database_gateway_plan_readwrite_splitting_status
        - database_gateway_apply_workflow
        - database_gateway_validate_workflow
      org.apache.shardingsphere/related-resource-uris:
        - shardingsphere://features/readwrite-splitting/databases/{database}/rules/{rule}/status
        - shardingsphere://features/readwrite-splitting/databases/{database}/status
      org.apache.shardingsphere/stop-conditions:
        - "Stop after database_gateway_plan_readwrite_splitting_status returns a planned workflow with plan_id and reviewable artifacts."
        - "Stop after a clarifying response lists missing inputs instead of guessing storage unit status."
        - "Stop and report the Cluster-mode requirement after a failed plan returns WF-MODE-002; do not call apply or repeat the planning tool."
      org.apache.shardingsphere/ask-user-conditions:
        - "Ask when database, rule name, read storage unit, or target status is unclear."
        - "Ask before applying generated readwrite-splitting status DistSQL that changes runtime state."
completionTargets:
  - referenceType: prompt
    reference: plan_readwrite_splitting_rule
    arguments:
      - database
      - write_storage_unit
      - load_balancer_type
      - plan_id
    maxValues: 50
  - referenceType: prompt
    reference: plan_readwrite_splitting_status
    arguments:
      - database
      - storage_unit
      - plan_id
    maxValues: 50
resourceNavigation:
  - from: shardingsphere://features/readwrite-splitting/databases/{database}/rules
    to: database_gateway_plan_readwrite_splitting_rule
    requiredArguments:
      - database
    carriedArguments:
      - database
    description: "Preserve existing readwrite-splitting rules when planning changes."
  - from: shardingsphere://features/readwrite-splitting/databases/{database}/rules/{rule}
    to: database_gateway_plan_readwrite_splitting_rule
    requiredArguments:
      - database
      - rule
    carriedArguments:
      - database
      - rule
    description: "Use the current rule row before planning create, alter, or drop."
  - from: shardingsphere://features/readwrite-splitting/databases/{database}/status
    to: database_gateway_plan_readwrite_splitting_status
    requiredArguments:
      - database
    carriedArguments:
      - database
    description: "Inspect current read storage-unit status before planning status changes."
  - from: shardingsphere://features/readwrite-splitting/databases/{database}/rules/{rule}/status
    to: database_gateway_plan_readwrite_splitting_status
    requiredArguments:
      - database
      - rule
    carriedArguments:
      - database
      - rule
    description: "Use current rule-specific status rows before planning enable or disable."
  - from: shardingsphere://features/readwrite-splitting/load-balance-algorithm-plugins
    to: database_gateway_plan_readwrite_splitting_rule
    requiredArguments: []
    carriedArguments:
      - load_balancer_type
    description: "Choose an available load-balance algorithm before planning create or alter."
  - from: database_gateway_plan_readwrite_splitting_rule
    to: shardingsphere://workflows/{plan_id}
    requiredArguments:
      - plan_id
    carriedArguments:
      - plan_id
    description: "Read the persisted workflow plan after planning readwrite-splitting rule changes."
  - from: database_gateway_plan_readwrite_splitting_rule
    to: database_gateway_apply_workflow
    requiredArguments:
      - plan_id
    carriedArguments:
      - plan_id
    description: "Apply the reviewed readwrite-splitting rule workflow after user approval."
  - from: database_gateway_plan_readwrite_splitting_status
    to: shardingsphere://workflows/{plan_id}
    requiredArguments:
      - plan_id
    carriedArguments:
      - plan_id
    description: "Read the persisted workflow plan after planning readwrite-splitting status changes."
  - from: database_gateway_plan_readwrite_splitting_status
    to: database_gateway_apply_workflow
    requiredArguments:
      - plan_id
    carriedArguments:
      - plan_id
    description: "Apply the reviewed readwrite-splitting status workflow after user approval."
tools:
  - name: database_gateway_plan_readwrite_splitting_rule
    title: Plan Readwrite-Splitting Rule
    description: >-
      Plan a ShardingSphere readwrite-splitting rule workflow. This tool creates reviewable rule DistSQL artifacts
      but does not execute them; use database_gateway_apply_workflow only after user review.
    inputSchema:
      type: object
      properties:
        plan_id:
          type: string
          description: "Existing workflow plan identifier used only to continue the same readwrite.rule workflow kind. Omit when starting a new plan; never use placeholder values such as `plan_id`."
        database:
          type: string
          description: "ShardingSphere logical database that owns the readwrite-splitting rule."
        rule:
          type: string
          description: "Readwrite-splitting rule name."
        operation_type:
          type: string
          description: "Readwrite-splitting rule lifecycle operation."
          enum:
            - create
            - alter
            - drop
        write_storage_unit:
          type: string
          description: "Existing write storage unit name for create or alter operations."
        read_storage_units:
          type: string
          description: "Comma-separated existing read storage unit names for create or alter operations."
        transactional_read_query_strategy:
          type: string
          description: "Transactional read query strategy required by readwrite-splitting DistSQL."
        load_balancer_type:
          type: string
          description: "Optional load-balance algorithm type."
        load_balancer_properties:
          type: object
          description: "Optional load-balance algorithm properties."
          additionalProperties:
            type: string
        natural_language_intent:
          type: string
          description: "User request in natural language, used to infer create, alter, or drop when operation_type is absent."
        structured_intent_evidence:
          type: object
          description: "Readwrite-splitting structured intent extracted from the user request."
          properties:
            rule:
              type: string
              description: "Inferred rule name."
            write_storage_unit:
              type: string
              description: "Inferred write storage unit."
            read_storage_units:
              type: string
              description: "Inferred comma-separated read storage units."
            transactional_read_query_strategy:
              type: string
              description: "Inferred transactional read query strategy."
            load_balancer_type:
              type: string
              description: "Inferred load-balance algorithm type."
            load_balancer_properties:
              type: object
              description: "Inferred load-balance algorithm properties."
              additionalProperties:
                type: string
          required: []
          additionalProperties: false
        delivery_mode:
          type: string
          description: "Whether the plan should return all artifacts at once or guide the user step by step."
          enum:
            - all-at-once
            - step-by-step
        execution_mode:
          type: string
          description: "Preferred final mode for later database_gateway_apply_workflow."
          enum:
            - review-then-execute
            - manual-only
      required: []
      additionalProperties: false
    outputSchema: &workflowPlanOutputSchema
      type: object
      properties:
        response_mode:
          type: string
          description: "Stable response mode marker for workflow planning, or terminal when planning cannot continue."
          enum:
            - planning
            - terminal
        summary:
          type: string
          description: "Short model-facing workflow planning summary."
        plan_id:
          type: string
          description: "Workflow plan identifier for database_gateway_apply_workflow and database_gateway_validate_workflow."
        workflow_kind:
          type: string
          description: "Workflow kind resolved by the planner."
        status:
          type: string
          description: "Stable workflow status, such as clarifying, planned, or failed."
        missing_required_inputs:
          type: array
          description: "Inputs still required before the plan can be completed."
        clarification_questions:
          type: array
          description: "Structured questions for missing workflow inputs."
        elicitation_support:
          type: object
          description: "Evaluated MCP elicitation capability and the selected interaction path when automatic form continuation cannot be used."
        fallback_reason:
          type: string
          description: "Machine-readable reason explaining why the planner returned structured fallback instead of automatic form continuation."
        issues:
          type: array
          description: "Warnings, conflicts, and validation issues found during planning."
        global_steps:
          type: array
          description: "Workflow review and execution steps."
        current_step:
          type: string
          description: "Current workflow step."
        algorithm_recommendations:
          type: array
          description: "Recommended readwrite-splitting algorithms and ranking reasons."
        property_requirements:
          type: array
          description: "Required and optional algorithm properties for selected readwrite-splitting algorithms."
        validation_strategy:
          type: object
          description: "Validation strategy generated by the planner."
        delivery_mode:
          type: string
          description: "Planner delivery mode used for user interaction."
        execution_mode:
          type: string
          description: "Preferred later apply mode captured by the plan."
        intent_inference:
          type: object
          description: "Resolved intent fields, inferred values, unresolved fields, and reasoning notes."
        argument_provenance:
          type: object
          description: "Source of important workflow arguments, such as user-provided, inferred, or server-defaulted values."
        review_focus:
          type: object
          description: "Compact planning review focus: artifact categories, side-effect scope, manual-only mode, and next review action."
        proxy_topology_hint:
          type: object
          description: "Proxy metadata view expected by this workflow and safe recovery guidance when runtime metadata looks inconsistent."
        resources_to_read:
          type: array
          description: "Resources the model should read before retrying or validating the plan."
        next_actions:
          type: array
          description: "Ordered next actions for the model or user."
          items:
            type: object
            properties:
              order:
                type: integer
                description: "1-based action order."
              type:
                type: string
                description: "Canonical action type such as tool_call, resource_read, ask_user, completion, or terminal."
              title:
                type: string
                description: "Short model-facing action title."
              tool_name:
                type: string
                description: "Canonical tool name when type is tool_call."
              resource_uri:
                type: string
                description: "Canonical resource URI when type is resource_read."
              arguments:
                type: object
                description: "Canonical arguments to provide to the target tool."
              reason:
                type: string
                description: "Why the model should take this action."
              required_inputs:
                type: array
                description: "User inputs needed before continuing."
        distsql_artifacts:
          type: array
          description: "Generated readwrite-splitting rule DistSQL artifacts for review."
      required:
        - response_mode
        - plan_id
        - workflow_kind
        - status
        - missing_required_inputs
        - resources_to_read
        - next_actions
      additionalProperties: true
      examples:
        - response_mode: planning
          summary: Workflow plan `readwrite-rule-20260606-001` for readwrite.rule is ready for preview.
          plan_id: readwrite-rule-20260606-001
          status: planned
          workflow_kind: readwrite.rule
          missing_required_inputs: []
          clarification_questions: []
          issues: []
          global_steps: []
          current_step: review
          algorithm_recommendations: []
          property_requirements: []
          validation_strategy: {}
          delivery_mode: all-at-once
          execution_mode: review-then-execute
          intent_inference: {}
          resources_to_read:
            - uri: shardingsphere://features/readwrite-splitting/databases/logic_db/rules
              resource_kind: rule
              purpose: inspect_detail
              reason: Inspect current readwrite-splitting rules before planning changes.
              source_field: resources_to_read
          distsql_artifacts:
            - operation_type: create
              artifact_type: rule_distsql
              sql: CREATE READWRITE_SPLITTING RULE `readwrite_ds` (WRITE_STORAGE_UNIT=`ds_write`, READ_STORAGE_UNITS(`ds_read_0`), TRANSACTIONAL_READ_QUERY_STRATEGY='DYNAMIC')
          next_actions:
            - order: 1
              type: tool_call
              title: Call database_gateway_apply_workflow
              tool_name: database_gateway_apply_workflow
              arguments:
                plan_id: readwrite-rule-20260606-001
                execution_mode: preview
              reason: Preview generated readwrite-splitting DistSQL artifacts.
    annotations:
      title: Plan Readwrite-Splitting Rule
      readOnlyHint: false
      destructiveHint: false
      idempotentHint: false
      openWorldHint: false
    runtime:
      workflowRole: plan
    meta:
      org.apache.shardingsphere/workflow-kind: readwrite.rule
      org.apache.shardingsphere/artifact-categories:
        - rule_distsql
      org.apache.shardingsphere/side-effect-scope:
        - rule-metadata
      org.apache.shardingsphere/related-resource-uris:
        - shardingsphere://features/readwrite-splitting/databases/{database}/rules
        - shardingsphere://features/readwrite-splitting/databases/{database}/rule-count
        - shardingsphere://features/readwrite-splitting/load-balance-algorithm-plugins
      org.apache.shardingsphere/follow-up-tools:
        - database_gateway_apply_workflow
        - database_gateway_validate_workflow
  - name: database_gateway_plan_readwrite_splitting_status
    title: Plan Readwrite-Splitting Status
    description: >-
      Plan a ShardingSphere readwrite-splitting read storage-unit enable or disable workflow. The current Proxy must run in Cluster mode;
      otherwise this tool returns a failed plan without DistSQL artifacts. It does not execute generated artifacts;
      use database_gateway_apply_workflow only after user review.
    inputSchema:
      type: object
      properties:
        plan_id:
          type: string
          description: "Existing workflow plan identifier used only to continue the same readwrite.status workflow kind. Omit when starting a new plan; never use placeholder values such as `plan_id`."
        database:
          type: string
          description: "ShardingSphere logical database that owns the readwrite-splitting rule."
        rule:
          type: string
          description: "Readwrite-splitting rule name."
        storage_unit:
          type: string
          description: "Existing read storage unit whose status should be enabled or disabled."
        target_status:
          type: string
          description: "Target status operation."
          enum:
            - enable
            - disable
        natural_language_intent:
          type: string
          description: "User request in natural language, used to infer enable or disable when target_status is absent."
        structured_intent_evidence:
          type: object
          description: "Readwrite-splitting status structured intent extracted from the user request."
          properties:
            rule:
              type: string
              description: "Inferred rule name."
            storage_unit:
              type: string
              description: "Inferred read storage unit."
            target_status:
              type: string
              description: "Inferred target status."
          required: []
          additionalProperties: false
        delivery_mode:
          type: string
          description: "Whether the plan should return all artifacts at once or guide the user step by step."
          enum:
            - all-at-once
            - step-by-step
        execution_mode:
          type: string
          description: "Preferred final mode for later database_gateway_apply_workflow."
          enum:
            - review-then-execute
            - manual-only
      required: []
      additionalProperties: false
    outputSchema:
      <<: *workflowPlanOutputSchema
      examples:
        - response_mode: planning
          summary: Workflow plan `readwrite-status-20260606-001` for readwrite.status is ready for preview.
          plan_id: readwrite-status-20260606-001
          status: planned
          workflow_kind: readwrite.status
          missing_required_inputs: []
          clarification_questions: []
          issues: []
          global_steps: []
          current_step: review
          algorithm_recommendations: []
          property_requirements: []
          validation_strategy: {}
          delivery_mode: all-at-once
          execution_mode: review-then-execute
          intent_inference: {}
          resources_to_read:
            - uri: shardingsphere://features/readwrite-splitting/databases/logic_db/rules/readwrite_ds/status
              resource_kind: rule
              purpose: inspect_detail
              reason: Inspect current readwrite-splitting status before planning changes.
              source_field: resources_to_read
          distsql_artifacts:
            - target_status: enable
              artifact_type: rule_distsql
              sql: ALTER READWRITE_SPLITTING RULE `readwrite_ds` ENABLE `ds_read_0` FROM `logic_db`
          next_actions:
            - order: 1
              type: tool_call
              title: Call database_gateway_apply_workflow
              tool_name: database_gateway_apply_workflow
              arguments:
                plan_id: readwrite-status-20260606-001
                execution_mode: preview
              reason: Preview generated readwrite-splitting status DistSQL artifacts.
    annotations:
      title: Plan Readwrite-Splitting Status
      readOnlyHint: false
      destructiveHint: false
      idempotentHint: false
      openWorldHint: false
    runtime:
      workflowRole: plan
    meta:
      org.apache.shardingsphere/workflow-kind: readwrite.status
      org.apache.shardingsphere/artifact-categories:
        - rule_distsql
      org.apache.shardingsphere/side-effect-scope:
        - rule-metadata
      org.apache.shardingsphere/related-resource-uris:
        - shardingsphere://features/readwrite-splitting/databases/{database}/status
        - shardingsphere://features/readwrite-splitting/databases/{database}/rules/{rule}/status
      org.apache.shardingsphere/follow-up-tools:
        - database_gateway_apply_workflow
        - database_gateway_validate_workflow
