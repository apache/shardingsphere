tools:
  - name: database_gateway_plan_sharding_table_rule
    title: Plan Sharding Table Rule
    description: "Plan reviewable sharding table rule DistSQL without executing it. Use this before raw SQL for natural-language requests to create or drop database/table sharding rules."
    inputSchema:
      type: object
      properties:
        plan_id: {type: string, description: "Existing workflow plan id for continuing the same sharding.table.rule workflow kind. Omit for a new plan; never use placeholder values such as `plan_id`."}
        database: {type: string, description: "Logical database."}
        table: {type: string, description: "Logical table."}
        column: {type: string, description: "Sharding column for standard or storage_units auto-table rules. Omit for complex, hint, or none strategies."}
        operation_type: {type: string, description: "create or drop.", enum: [create, drop]}
        data_nodes: {type: string, description: "Explicit data nodes expression. Mutually exclusive with storage_units."}
        storage_units: {type: string, description: "Comma-separated storage units for a standard auto-table rule. Mutually exclusive with data_nodes."}
        strategy_type: {type: string, description: "Strategy shape: standard uses column, complex uses sharding_columns, hint uses neither, and none omits algorithm inputs.", enum: [standard, complex, hint, none]}
        sharding_columns: {type: string, description: "Comma-separated sharding columns used only by a complex strategy."}
        algorithm_type: {type: string, description: "Sharding algorithm type for standard, complex, hint, or storage_units auto-table rules. Omit for none."}
        algorithm_properties: {type: object, description: "Properties for algorithm_type. Omit for strategy_type none.", additionalProperties: {type: string}}
        key_generate_column: {type: string, description: "Key generate column. Required whenever key_generator, key_generator_type, or key_generator_properties is provided."}
        key_generator: {type: string, description: "Existing named key generator. Mutually exclusive with key_generator_type and key_generator_properties."}
        key_generator_type: {type: string, description: "Inline key generator type used only when key_generator is omitted."}
        key_generator_properties: {type: object, description: "Inline key generator properties used only with key_generator_type and without key_generator.", additionalProperties: {type: string}}
        auditors: {type: string, description: "Comma-separated auditor algorithm types. Required when allow_hint_disable is provided."}
        allow_hint_disable: {type: string, description: "Whether the configured audit strategy allows hint disable. Requires auditors.", enum: ["true", "false"]}
        natural_language_intent: {type: string, description: "Original user request."}
        structured_intent_evidence: {type: object, description: "Structured intent extracted by the model.", additionalProperties: true}
        delivery_mode: {type: string, description: "Planner delivery mode.", enum: [all-at-once, step-by-step]}
        execution_mode: {type: string, description: "Preferred later apply mode.", enum: [review-then-execute, manual-only]}
      required: []
      additionalProperties: false
    outputSchema: &workflowPlanOutputSchema
      type: object
      properties:
        response_mode: {type: string, description: "Stable response mode marker for workflow planning, or terminal when planning cannot continue.", enum: [planning, terminal]}
        summary: {type: string, description: "Short model-facing workflow planning summary."}
        plan_id: {type: string, description: "Workflow plan identifier for database_gateway_apply_workflow and database_gateway_validate_workflow."}
        workflow_kind: {type: string, description: "Workflow kind resolved by the planner."}
        status: {type: string, description: "Stable workflow status, such as clarifying, planned, or failed."}
        missing_required_inputs: {type: array, description: "Inputs still required before the plan can be completed.", items: {type: string}}
        clarification_questions: {type: array, description: "Structured questions for missing workflow inputs.", items: {type: object}}
        elicitation_support: {type: object, description: "Evaluated MCP elicitation capability and the selected interaction path when automatic form continuation cannot be used."}
        fallback_reason: {type: string, description: "Machine-readable reason explaining why the planner returned structured fallback instead of automatic form continuation."}
        issues: {type: array, description: "Warnings, conflicts, and validation issues found during planning."}
        global_steps: {type: array, description: "Workflow review and execution steps."}
        current_step: {type: string, description: "Current workflow step."}
        algorithm_recommendations: {type: array, description: "Recommended sharding algorithms and ranking reasons."}
        property_requirements: {type: array, description: "Required and optional algorithm properties for selected sharding algorithms."}
        validation_strategy: {type: object, description: "Validation strategy generated by the planner."}
        delivery_mode: {type: string, description: "Planner delivery mode used for user interaction."}
        execution_mode: {type: string, description: "Preferred later apply mode captured by the plan."}
        intent_inference: {type: object, description: "Resolved operation type, inferred values, unresolved fields, and reasoning notes."}
        argument_provenance: {type: object, description: "Source of important workflow arguments, such as user-provided, inferred, or server-defaulted values."}
        review_focus: {type: object, description: "Compact planning review focus: artifact categories, side-effect scope, manual-only mode, and next review action."}
        proxy_topology_hint: {type: object, description: "Proxy metadata view expected by this workflow and safe recovery guidance when runtime metadata looks inconsistent."}
        distsql_artifacts: {type: array, description: "Generated sharding DistSQL artifacts for review.", items: {type: object}}
        resources_to_read: {type: array, description: "Resources the model should read before retrying or validating the plan.", items: {type: object}}
        next_actions:
          type: array
          description: "Ordered next actions for the model or user."
          items:
            type: object
            properties:
              order: {type: integer, description: "1-based action order."}
              type: {type: string, description: "Canonical action type such as tool_call, resource_read, ask_user, completion, or terminal."}
              title: {type: string, description: "Short model-facing action title."}
              tool_name: {type: string, description: "Canonical tool name when type is tool_call."}
              resource_uri: {type: string, description: "Canonical resource URI when type is resource_read."}
              arguments: {type: object, description: "Canonical arguments to provide to the target tool."}
              reason: {type: string, description: "Why the model should take this action."}
              required_inputs: {type: array, description: "User inputs needed before continuing."}
      required:
        - response_mode
        - plan_id
        - workflow_kind
        - status
        - missing_required_inputs
        - resources_to_read
        - next_actions
      additionalProperties: true
      examples:
        - response_mode: planning
          summary: Workflow plan `sharding-table-rule-20260606-001` for sharding.table.rule is ready for preview.
          plan_id: sharding-table-rule-20260606-001
          workflow_kind: sharding.table.rule
          status: planned
          missing_required_inputs: []
          resources_to_read: []
          next_actions:
            - order: 1
              type: tool_call
              title: Call database_gateway_apply_workflow
              tool_name: database_gateway_apply_workflow
              arguments:
                plan_id: sharding-table-rule-20260606-001
                execution_mode: preview
              reason: Preview generated sharding DistSQL artifacts.
    annotations:
      title: Plan Sharding Table Rule
      destructiveHint: false
      idempotentHint: false
      openWorldHint: false
      readOnlyHint: false
    runtime: &planningRuntime
      workflowRole: plan
    meta:
      org.apache.shardingsphere/workflow-kind: sharding.table.rule
      org.apache.shardingsphere/artifact-categories:
        - rule_distsql
      org.apache.shardingsphere/side-effect-scope:
        - rule-metadata
      org.apache.shardingsphere/related-resource-uris:
        - shardingsphere://features/sharding/algorithm-plugins
        - shardingsphere://features/sharding/key-generate-algorithm-plugins
        - shardingsphere://features/sharding/databases/{database}/table-rules
        - shardingsphere://features/sharding/databases/{database}/table-nodes
        - shardingsphere://features/sharding/databases/{database}/tables/{table}/table-rule
