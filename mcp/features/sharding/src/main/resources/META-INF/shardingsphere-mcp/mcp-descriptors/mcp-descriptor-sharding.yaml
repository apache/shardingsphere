resources:
  - uri: shardingsphere://features/sharding/algorithm-plugins
    name: sharding-algorithm-plugins
    title: Sharding Algorithm Plugins
    description: "List sharding algorithm plugins visible from the current ShardingSphere runtime."
    mimeType: application/json
    meta:
      org.apache.shardingsphere/runtime-visibility: ShardingSphere-Proxy
    shardingSphereMetadata:
      resourceKind: list
      objectScope: algorithm
      feature: sharding
      relatedTools:
        - database_gateway_plan_sharding_table_rule
        - database_gateway_plan_sharding_default_strategy
  - uri: shardingsphere://features/sharding/key-generate-algorithm-plugins
    name: sharding-key-generate-algorithm-plugins
    title: Sharding Key Generate Algorithm Plugins
    description: "List key generate algorithm plugins visible from the current ShardingSphere runtime."
    mimeType: application/json
    meta:
      org.apache.shardingsphere/runtime-visibility: ShardingSphere-Proxy
    shardingSphereMetadata:
      resourceKind: list
      objectScope: algorithm
      feature: sharding
      relatedTools:
        - database_gateway_plan_sharding_key_generator
        - database_gateway_plan_sharding_key_generate_strategy
resourceTemplates:
  - uriTemplate: shardingsphere://features/sharding/databases/{database}/algorithms
    name: sharding-algorithms
    title: Sharding Algorithms
    description: "List configured sharding algorithms for one logical database."
    mimeType: application/json
    shardingSphereMetadata: &databaseListMetadata
      uriVariables:
        - name: database
          title: Logical Database
          description: "ShardingSphere logical database."
          required: true
          scope: logical-database
      resourceKind: list
      objectScope: rule
      feature: sharding
      relatedTools:
        - database_gateway_plan_sharding_table_rule
        - database_gateway_plan_sharding_default_strategy
        - database_gateway_plan_sharding_rule_component_cleanup
        - database_gateway_validate_workflow
  - uriTemplate: shardingsphere://features/sharding/databases/{database}/table-rules
    name: sharding-table-rules
    title: Sharding Table Rules
    description: "List sharding table rules for one logical database."
    mimeType: application/json
    shardingSphereMetadata:
      <<: *databaseListMetadata
      relatedTools:
        - database_gateway_plan_sharding_table_rule
        - database_gateway_validate_workflow
  - uriTemplate: shardingsphere://features/sharding/databases/{database}/tables/{table}/table-rule
    name: sharding-table-rule
    title: Sharding Table Rule
    description: "Read one sharding table rule by logical table name."
    mimeType: application/json
    shardingSphereMetadata: &databaseTableMetadata
      uriVariables:
        - name: database
          title: Logical Database
          description: "ShardingSphere logical database."
          required: true
          scope: logical-database
        - name: table
          title: Logical Table
          description: "Logical table name."
          required: true
          scope: logical-table
      resourceKind: rule
      feature: sharding
      relatedTools:
        - database_gateway_plan_sharding_table_rule
        - database_gateway_validate_workflow
  - uriTemplate: shardingsphere://features/sharding/databases/{database}/table-nodes
    name: sharding-table-nodes
    title: Sharding Table Nodes
    description: "List DistSQL-visible actual data nodes for sharding tables."
    mimeType: application/json
    shardingSphereMetadata:
      <<: *databaseListMetadata
      relatedTools:
        - database_gateway_plan_sharding_table_rule
  - uriTemplate: shardingsphere://features/sharding/databases/{database}/tables/{table}/nodes
    name: sharding-table-node
    title: Sharding Table Node
    description: "Read DistSQL-visible actual data nodes for one sharding table."
    mimeType: application/json
    shardingSphereMetadata:
      <<: *databaseTableMetadata
      relatedTools:
        - database_gateway_plan_sharding_table_rule
  - uriTemplate: shardingsphere://features/sharding/databases/{database}/table-reference-rules
    name: sharding-table-reference-rules
    title: Sharding Table Reference Rules
    description: "List sharding table reference rules for one logical database."
    mimeType: application/json
    shardingSphereMetadata:
      <<: *databaseListMetadata
      relatedTools:
        - database_gateway_plan_sharding_table_reference_rule
        - database_gateway_validate_workflow
  - uriTemplate: shardingsphere://features/sharding/databases/{database}/table-reference-rules/{rule}
    name: sharding-table-reference-rule
    title: Sharding Table Reference Rule
    description: "Read one sharding table reference rule."
    mimeType: application/json
    shardingSphereMetadata:
      uriVariables:
        - name: database
          title: Logical Database
          description: "ShardingSphere logical database."
          required: true
          scope: logical-database
        - name: rule
          title: Rule Name
          description: "Logical rule name."
          required: true
          scope: logical-rule
      resourceKind: rule
      feature: sharding
      relatedTools:
        - database_gateway_plan_sharding_table_reference_rule
        - database_gateway_validate_workflow
  - uriTemplate: shardingsphere://features/sharding/databases/{database}/default-strategy
    name: sharding-default-strategy
    title: Default Sharding Strategy
    description: "Read default database and table sharding strategies."
    mimeType: application/json
    shardingSphereMetadata:
      <<: *databaseListMetadata
      relatedTools:
        - database_gateway_plan_sharding_default_strategy
        - database_gateway_validate_workflow
  - uriTemplate: shardingsphere://features/sharding/databases/{database}/key-generators
    name: sharding-key-generators
    title: Sharding Key Generators
    description: "List configured sharding key generators."
    mimeType: application/json
    shardingSphereMetadata:
      <<: *databaseListMetadata
      relatedTools:
        - database_gateway_plan_sharding_key_generator
        - database_gateway_plan_sharding_key_generate_strategy
        - database_gateway_plan_sharding_rule_component_cleanup
  - uriTemplate: shardingsphere://features/sharding/databases/{database}/key-generators/{keyGenerator}
    name: sharding-key-generator
    title: Sharding Key Generator
    description: "Read one configured sharding key generator."
    mimeType: application/json
    shardingSphereMetadata: &databaseKeyGeneratorMetadata
      uriVariables:
        - name: database
          title: Logical Database
          description: "ShardingSphere logical database."
          required: true
          scope: logical-database
        - name: keyGenerator
          title: Key Generator
          description: "Sharding key generator name."
          required: true
          scope: logical-rule
      resourceKind: rule
      feature: sharding
      relatedTools:
        - database_gateway_plan_sharding_key_generator
        - database_gateway_validate_workflow
  - uriTemplate: shardingsphere://features/sharding/databases/{database}/key-generate-strategies
    name: sharding-key-generate-strategies
    title: Sharding Key Generate Strategies
    description: "List configured sharding key generate strategies."
    mimeType: application/json
    shardingSphereMetadata:
      <<: *databaseListMetadata
      relatedTools:
        - database_gateway_plan_sharding_key_generate_strategy
        - database_gateway_validate_workflow
  - uriTemplate: shardingsphere://features/sharding/databases/{database}/key-generate-strategies/{strategy}
    name: sharding-key-generate-strategy
    title: Sharding Key Generate Strategy
    description: "Read one configured sharding key generate strategy."
    mimeType: application/json
    shardingSphereMetadata:
      uriVariables:
        - name: database
          title: Logical Database
          description: "ShardingSphere logical database."
          required: true
          scope: logical-database
        - name: strategy
          title: Strategy Name
          description: "Sharding key generate strategy name."
          required: true
          scope: logical-rule
      resourceKind: rule
      feature: sharding
      relatedTools:
        - database_gateway_plan_sharding_key_generate_strategy
        - database_gateway_validate_workflow
  - uriTemplate: shardingsphere://features/sharding/databases/{database}/auditors
    name: sharding-auditors
    title: Sharding Auditors
    description: "List configured sharding auditors."
    mimeType: application/json
    shardingSphereMetadata:
      <<: *databaseListMetadata
      relatedTools:
        - database_gateway_plan_sharding_rule_component_cleanup
  - uriTemplate: shardingsphere://features/sharding/databases/{database}/unused-algorithms
    name: unused-sharding-algorithms
    title: Unused Sharding Algorithms
    description: "List DistSQL-visible unused sharding algorithms."
    mimeType: application/json
    shardingSphereMetadata:
      <<: *databaseListMetadata
      relatedTools:
        - database_gateway_plan_sharding_rule_component_cleanup
  - uriTemplate: shardingsphere://features/sharding/databases/{database}/unused-key-generators
    name: unused-sharding-key-generators
    title: Unused Sharding Key Generators
    description: "List DistSQL-visible unused sharding key generators."
    mimeType: application/json
    shardingSphereMetadata:
      <<: *databaseListMetadata
      relatedTools:
        - database_gateway_plan_sharding_rule_component_cleanup
  - uriTemplate: shardingsphere://features/sharding/databases/{database}/unused-auditors
    name: unused-sharding-auditors
    title: Unused Sharding Auditors
    description: "List DistSQL-visible unused sharding auditors."
    mimeType: application/json
    shardingSphereMetadata:
      <<: *databaseListMetadata
      relatedTools:
        - database_gateway_plan_sharding_rule_component_cleanup
  - uriTemplate: shardingsphere://features/sharding/databases/{database}/algorithms/{algorithm}/table-rules
    name: sharding-algorithm-used-table-rules
    title: Sharding Algorithm Used Table Rules
    description: "List table rules using one sharding algorithm."
    mimeType: application/json
    shardingSphereMetadata:
      uriVariables:
        - name: database
          title: Logical Database
          description: "ShardingSphere logical database."
          required: true
          scope: logical-database
        - name: algorithm
          title: Algorithm Name
          description: "Sharding algorithm name."
          required: true
          scope: logical-rule
      resourceKind: list
      objectScope: rule
      feature: sharding
      relatedTools:
        - database_gateway_plan_sharding_rule_component_cleanup
  - uriTemplate: shardingsphere://features/sharding/databases/{database}/key-generators/{keyGenerator}/table-rules
    name: sharding-key-generator-used-table-rules
    title: Sharding Key Generator Used Table Rules
    description: "List table rules using one sharding key generator."
    mimeType: application/json
    shardingSphereMetadata:
      <<: *databaseKeyGeneratorMetadata
      resourceKind: list
      objectScope: rule
      relatedTools:
        - database_gateway_plan_sharding_rule_component_cleanup
  - uriTemplate: shardingsphere://features/sharding/databases/{database}/auditors/{auditor}/table-rules
    name: sharding-auditor-used-table-rules
    title: Sharding Auditor Used Table Rules
    description: "List table rules using one sharding auditor."
    mimeType: application/json
    shardingSphereMetadata:
      uriVariables:
        - name: database
          title: Logical Database
          description: "ShardingSphere logical database."
          required: true
          scope: logical-database
        - name: auditor
          title: Auditor Name
          description: "Sharding auditor name."
          required: true
          scope: logical-rule
      resourceKind: list
      objectScope: rule
      feature: sharding
      relatedTools:
        - database_gateway_plan_sharding_rule_component_cleanup
  - uriTemplate: shardingsphere://features/sharding/databases/{database}/rule-count
    name: sharding-rule-count
    title: Sharding Rule Count
    description: "Count sharding table and table-reference rules."
    mimeType: application/json
    shardingSphereMetadata:
      <<: *databaseListMetadata
      relatedTools:
        - database_gateway_plan_sharding_table_rule
        - database_gateway_validate_workflow
prompts:
  - name: plan_sharding_table_rule
    title: Plan Sharding Table Rule
    description: "Guide the model to plan sharding table rule DistSQL, including database/table sharding and key generation."
    binding:
      templateResource: META-INF/shardingsphere-mcp/prompts/plan-sharding-table-rule.md
    arguments:
      - name: database
        title: Logical Database
        description: "ShardingSphere logical database."
        required: false
      - name: operation_type
        title: Operation Type
        description: "create or drop."
        required: false
      - name: algorithm_type
        title: Sharding Algorithm
        description: "Optional sharding algorithm type."
        required: false
      - name: plan_id
        title: Workflow Plan ID
        description: "Existing current-session workflow plan identifier used only to continue a sharding table rule plan. Omit when starting a new plan; never use placeholder values such as `plan_id`."
        required: false
    meta:
      org.apache.shardingsphere/related-tools:
        - database_gateway_plan_sharding_table_rule
        - database_gateway_apply_workflow
        - database_gateway_validate_workflow
      org.apache.shardingsphere/related-resource-uris:
        - shardingsphere://features/sharding/algorithm-plugins
        - shardingsphere://features/sharding/key-generate-algorithm-plugins
        - shardingsphere://features/sharding/databases/{database}/table-rules
        - shardingsphere://features/sharding/databases/{database}/table-nodes
        - shardingsphere://features/sharding/databases/{database}/tables/{table}/table-rule
        - shardingsphere://features/sharding/databases/{database}/tables/{table}/nodes
      org.apache.shardingsphere/stop-conditions:
        - "Stop after database_gateway_plan_sharding_table_rule returns a planned workflow with plan_id and reviewable artifacts."
        - "Stop after a clarifying response lists missing table, data nodes, storage units, strategy, algorithm, key generator, or auditor inputs."
      org.apache.shardingsphere/ask-user-conditions:
        - "Ask when database, table, data nodes, storage units, sharding column, strategy type, algorithm type, key generator, or auditor input is unclear."
        - "Ask before applying generated sharding table rule DistSQL that changes runtime state."
  - name: plan_sharding_table_reference_rule
    title: Plan Sharding Table Reference Rule
    description: "Guide the model to plan sharding table reference rule DistSQL."
    binding:
      templateResource: META-INF/shardingsphere-mcp/prompts/plan-sharding-table-reference-rule.md
    arguments:
      - name: database
        title: Logical Database
        description: "ShardingSphere logical database."
        required: false
      - name: operation_type
        title: Operation Type
        description: "create or drop."
        required: false
      - name: plan_id
        title: Workflow Plan ID
        description: "Existing current-session workflow plan identifier used only to continue a sharding.table.reference plan. Omit when starting a new plan; never use placeholder values such as `plan_id`."
        required: false
    meta:
      org.apache.shardingsphere/related-tools:
        - database_gateway_plan_sharding_table_reference_rule
        - database_gateway_apply_workflow
        - database_gateway_validate_workflow
      org.apache.shardingsphere/related-resource-uris:
        - shardingsphere://features/sharding/databases/{database}/table-reference-rules
        - shardingsphere://features/sharding/databases/{database}/table-reference-rules/{rule}
      org.apache.shardingsphere/stop-conditions:
        - "Stop after database_gateway_plan_sharding_table_reference_rule returns a planned workflow with plan_id and reviewable artifacts."
        - "Stop after a clarifying response lists missing rule name or reference table inputs."
      org.apache.shardingsphere/ask-user-conditions:
        - "Ask when database, rule name, or reference table list is unclear."
        - "Ask before applying generated sharding table reference DistSQL that changes runtime state."
  - name: plan_sharding_default_strategy
    title: Plan Sharding Default Strategy
    description: "Guide the model to plan default sharding strategy DistSQL."
    binding:
      templateResource: META-INF/shardingsphere-mcp/prompts/plan-sharding-default-strategy.md
    arguments:
      - name: database
        title: Logical Database
        description: "ShardingSphere logical database."
        required: false
      - name: operation_type
        title: Operation Type
        description: "create or drop."
        required: false
      - name: algorithm_type
        title: Sharding Algorithm
        description: "Optional default sharding algorithm type."
        required: false
      - name: plan_id
        title: Workflow Plan ID
        description: "Existing current-session workflow plan identifier used only to continue a default sharding strategy plan. Omit when starting a new plan; never use placeholder values such as `plan_id`."
        required: false
    meta:
      org.apache.shardingsphere/related-tools:
        - database_gateway_plan_sharding_default_strategy
        - database_gateway_apply_workflow
        - database_gateway_validate_workflow
      org.apache.shardingsphere/related-resource-uris:
        - shardingsphere://features/sharding/algorithm-plugins
        - shardingsphere://features/sharding/databases/{database}/default-strategy
        - shardingsphere://features/sharding/databases/{database}/algorithms
      org.apache.shardingsphere/stop-conditions:
        - "Stop after database_gateway_plan_sharding_default_strategy returns a planned workflow with plan_id and reviewable artifacts."
        - "Stop after a clarifying response lists missing default strategy type, sharding column, or algorithm input."
      org.apache.shardingsphere/ask-user-conditions:
        - "Ask when database, default strategy type, operation, sharding column, or algorithm type is unclear."
        - "Ask before applying generated default sharding strategy DistSQL that changes runtime state."
  - name: plan_sharding_key_generator
    title: Plan Sharding Key Generator
    description: "Guide the model to plan sharding key generator DistSQL."
    binding:
      templateResource: META-INF/shardingsphere-mcp/prompts/plan-sharding-key-generator.md
    arguments:
      - name: database
        title: Logical Database
        description: "ShardingSphere logical database."
        required: false
      - name: operation_type
        title: Operation Type
        description: "create or drop."
        required: false
      - name: key_generator_type
        title: Key Generator Algorithm
        description: "Optional key generator algorithm type."
        required: false
      - name: plan_id
        title: Workflow Plan ID
        description: "Existing current-session workflow plan identifier used only to continue a sharding key generator plan. Omit when starting a new plan; never use placeholder values such as `plan_id`."
        required: false
    meta:
      org.apache.shardingsphere/related-tools:
        - database_gateway_plan_sharding_key_generator
        - database_gateway_apply_workflow
        - database_gateway_validate_workflow
      org.apache.shardingsphere/related-resource-uris:
        - shardingsphere://features/sharding/key-generate-algorithm-plugins
        - shardingsphere://features/sharding/databases/{database}/key-generators
        - shardingsphere://features/sharding/databases/{database}/key-generators/{keyGenerator}
      org.apache.shardingsphere/stop-conditions:
        - "Stop after database_gateway_plan_sharding_key_generator returns a planned workflow with plan_id and reviewable artifacts."
        - "Stop after a clarifying response lists missing key generator name, type, or properties."
      org.apache.shardingsphere/ask-user-conditions:
        - "Ask when database, key generator name, operation, type, or required properties are unclear."
        - "Ask before applying generated sharding key generator DistSQL that changes runtime state."
  - name: plan_sharding_key_generate_strategy
    title: Plan Sharding Key Generate Strategy
    description: "Guide the model to plan sharding key generate strategy DistSQL."
    binding:
      templateResource: META-INF/shardingsphere-mcp/prompts/plan-sharding-key-generate-strategy.md
    arguments:
      - name: database
        title: Logical Database
        description: "ShardingSphere logical database."
        required: false
      - name: operation_type
        title: Operation Type
        description: "create or drop."
        required: false
      - name: key_generator_type
        title: Key Generator Algorithm
        description: "Optional key generator algorithm type."
        required: false
      - name: plan_id
        title: Workflow Plan ID
        description: "Existing current-session workflow plan identifier used only to continue a sharding key generate strategy plan. Omit when starting a new plan; never use placeholder values such as `plan_id`."
        required: false
    meta:
      org.apache.shardingsphere/related-tools:
        - database_gateway_plan_sharding_key_generate_strategy
        - database_gateway_apply_workflow
        - database_gateway_validate_workflow
      org.apache.shardingsphere/related-resource-uris:
        - shardingsphere://features/sharding/key-generate-algorithm-plugins
        - shardingsphere://features/sharding/databases/{database}/key-generators
        - shardingsphere://features/sharding/databases/{database}/key-generate-strategies
        - shardingsphere://features/sharding/databases/{database}/key-generate-strategies/{strategy}
      org.apache.shardingsphere/stop-conditions:
        - "Stop after database_gateway_plan_sharding_key_generate_strategy returns a planned workflow with plan_id and reviewable artifacts."
        - "Stop after a clarifying response lists missing table, column, sequence, or generator input."
      org.apache.shardingsphere/ask-user-conditions:
        - "Ask when database, strategy name, table, column, sequence, generator name, or generator type is unclear."
        - "Ask before applying generated key generate strategy DistSQL that changes runtime state."
  - name: plan_sharding_rule_component_cleanup
    title: Plan Sharding Rule Component Cleanup
    description: "Guide the model to clean up unused sharding algorithms, key generators, or auditors."
    binding:
      templateResource: META-INF/shardingsphere-mcp/prompts/plan-sharding-rule-component-cleanup.md
    arguments:
      - name: database
        title: Logical Database
        description: "ShardingSphere logical database."
        required: false
      - name: operation_type
        title: Operation Type
        description: "drop."
        required: false
      - name: plan_id
        title: Workflow Plan ID
        description: "Existing current-session workflow plan identifier used only to continue a sharding.component.cleanup plan. Omit when starting a new plan; never use placeholder values such as `plan_id`."
        required: false
    meta:
      org.apache.shardingsphere/related-tools:
        - database_gateway_plan_sharding_rule_component_cleanup
        - database_gateway_apply_workflow
        - database_gateway_validate_workflow
      org.apache.shardingsphere/related-resource-uris:
        - shardingsphere://features/sharding/databases/{database}/algorithms
        - shardingsphere://features/sharding/databases/{database}/key-generators
        - shardingsphere://features/sharding/databases/{database}/auditors
        - shardingsphere://features/sharding/databases/{database}/unused-algorithms
        - shardingsphere://features/sharding/databases/{database}/unused-key-generators
        - shardingsphere://features/sharding/databases/{database}/unused-auditors
        - shardingsphere://features/sharding/databases/{database}/algorithms/{algorithm}/table-rules
        - shardingsphere://features/sharding/databases/{database}/key-generators/{keyGenerator}/table-rules
        - shardingsphere://features/sharding/databases/{database}/auditors/{auditor}/table-rules
      org.apache.shardingsphere/stop-conditions:
        - "Stop after database_gateway_plan_sharding_rule_component_cleanup returns a planned workflow with plan_id and reviewable artifacts."
        - "Stop after a clarifying response lists missing component type or component name."
      org.apache.shardingsphere/ask-user-conditions:
        - "Ask when database, component type, or component name is unclear."
        - "Ask before applying generated component cleanup DistSQL that changes runtime state."
completionTargets:
  - referenceType: prompt
    reference: plan_sharding_table_rule
    arguments:
      - database
      - algorithm_type
      - plan_id
    maxValues: 50
  - referenceType: prompt
    reference: plan_sharding_table_reference_rule
    arguments:
      - database
      - plan_id
    maxValues: 50
  - referenceType: prompt
    reference: plan_sharding_default_strategy
    arguments:
      - database
      - algorithm_type
      - plan_id
    maxValues: 50
  - referenceType: prompt
    reference: plan_sharding_key_generator
    arguments:
      - database
      - key_generator_type
      - plan_id
    maxValues: 50
  - referenceType: prompt
    reference: plan_sharding_key_generate_strategy
    arguments:
      - database
      - key_generator_type
      - plan_id
    maxValues: 50
  - referenceType: prompt
    reference: plan_sharding_rule_component_cleanup
    arguments:
      - database
      - plan_id
    maxValues: 50
resourceNavigation:
  - from: shardingsphere://features/sharding/algorithm-plugins
    to: database_gateway_plan_sharding_table_rule
    requiredArguments: []
    carriedArguments:
      - algorithm_type
    description: "Use visible sharding algorithms when planning table rules."
  - from: shardingsphere://features/sharding/algorithm-plugins
    to: database_gateway_plan_sharding_default_strategy
    requiredArguments: []
    carriedArguments:
      - algorithm_type
    description: "Use visible sharding algorithms when planning default strategies."
  - from: shardingsphere://features/sharding/key-generate-algorithm-plugins
    to: database_gateway_plan_sharding_key_generator
    requiredArguments: []
    carriedArguments:
      - key_generator_type
    description: "Use visible key generate algorithms when planning key generators."
  - from: shardingsphere://features/sharding/key-generate-algorithm-plugins
    to: database_gateway_plan_sharding_key_generate_strategy
    requiredArguments: []
    carriedArguments:
      - key_generator_type
    description: "Use visible key generate algorithms when planning key generate strategies."
  - from: shardingsphere://features/sharding/databases/{database}/table-rules
    to: database_gateway_plan_sharding_table_rule
    requiredArguments:
      - database
    carriedArguments:
      - database
    description: "Inspect current sharding table rules before planning changes."
  - from: shardingsphere://features/sharding/databases/{database}/tables/{table}/table-rule
    to: database_gateway_plan_sharding_table_rule
    requiredArguments:
      - database
      - table
    carriedArguments:
      - database
      - table
    description: "Use current table rule state before planning create or drop."
  - from: shardingsphere://features/sharding/databases/{database}/tables/{table}/nodes
    to: database_gateway_plan_sharding_table_rule
    requiredArguments:
