resources:
  - uriTemplate: shardingsphere://features/mask/algorithms
    name: mask-algorithms
    title: Mask Algorithms
    description: >-
      List mask algorithm plugins visible from the current ShardingSphere-Proxy runtime, including property templates and secret-property hints.
      Read this before planning masking when the user asks for masking strategy or algorithm choice.
    mimeType: application/json
    resourceKind: list
    feature: mask
    relatedTools:
      - plan_mask_rule
    meta:
      runtimeVisibility: ShardingSphere-Proxy
  - uriTemplate: shardingsphere://features/mask/databases/{database}/rules
    name: mask-rules
    title: Mask Rules
    description: "List mask table rules for one ShardingSphere logical database. Read this before altering or validating mask configuration."
    mimeType: application/json
    parameters:
      - name: database
        title: Logical Database
        description: "ShardingSphere logical database whose mask rules should be inspected."
        required: true
        scope: logical-database
    resourceKind: list
    feature: mask
    relatedTools:
      - plan_mask_rule
      - validate_workflow
  - uriTemplate: shardingsphere://features/mask/databases/{database}/tables/{table}/rules
    name: mask-table-rule
    title: Mask Table Rule
    description: "Read mask rules for one logical table. Use this before planning column-level masking so the model can preserve existing mask configuration."
    mimeType: application/json
    parameters:
      - name: database
        title: Logical Database
        description: "ShardingSphere logical database that owns the mask rule."
        required: true
        scope: logical-database
      - name: table
        title: Logical Table
        description: "ShardingSphere logical table name, not a physical table shard."
        required: true
        scope: logical-table
    resourceKind: list
    feature: mask
    relatedTools:
      - plan_mask_rule
      - validate_workflow
prompts:
  - name: plan_mask_rule
    title: Plan Mask Rule
    description: "Guide the model to plan a ShardingSphere mask rule by reading logical metadata, mask algorithms, and existing mask rules before calling plan_mask_rule."
    templateResource: META-INF/shardingsphere-mcp/prompts/plan-mask-rule.md
    arguments:
      - name: database
        title: Logical Database
        description: "ShardingSphere logical database that owns the table."
        required: false
      - name: schema
        title: Schema
        description: "Optional schema or namespace that contains the table."
        required: false
      - name: table
        title: Logical Table
        description: "Logical table whose column should be masked."
        required: false
      - name: column
        title: Column
        description: "Logical column that should receive mask rule planning."
        required: false
      - name: algorithm_type
        title: Mask Algorithm
        description: "Optional primary mask algorithm type visible from ShardingSphere-Proxy."
        required: false
      - name: plan_id
        title: Workflow Plan ID
        description: "Optional current-session workflow plan identifier used to continue a mask plan."
        required: false
    meta:
      relatedTools:
        - plan_mask_rule
        - apply_workflow
        - validate_workflow
      relatedResources:
        - shardingsphere://features/mask/algorithms
        - shardingsphere://features/mask/databases/{database}/rules
      stopConditions:
        - "Stop after plan_mask_rule returns a planned workflow with plan_id and reviewable artifacts."
        - "Stop after a clarifying response lists missing inputs instead of guessing mask strategy."
      askUserConditions:
        - "Ask when field semantics or masking strategy are unclear."
        - "Ask before applying generated DistSQL that changes runtime state."

completionTargets:
  - referenceType: prompt
    reference: plan_mask_rule
    arguments:
      - database
      - schema
      - table
      - column
      - algorithm_type
      - plan_id
    maxValues: 50
  - referenceType: resource
    reference: shardingsphere://features/mask/algorithms
    arguments:
      - algorithm_type
    maxValues: 50
resourceNavigation:
  - from: shardingsphere://features/mask/algorithms
    to: plan_mask_rule
    requiredArguments: []
    carriedArguments:
      - algorithm_type
    description: "Use visible mask algorithms when planning a mask rule."
  - from: shardingsphere://features/mask/databases/{database}/rules
    to: plan_mask_rule
    requiredArguments:
      - database
    carriedArguments:
      - database
    description: "Preserve existing database-level mask rules when planning changes."
  - from: shardingsphere://features/mask/databases/{database}/tables/{table}/rules
    to: plan_mask_rule
    requiredArguments:
      - database
      - table
    carriedArguments:
      - database
      - table
    description: "Preserve existing table-level mask rule configuration."
  - from: plan_mask_rule
    to: shardingsphere://workflows/{plan_id}
    requiredArguments:
      - plan_id
    carriedArguments:
      - plan_id
    description: "Read the persisted workflow plan after planning mask rule changes."
  - from: plan_mask_rule
    to: apply_workflow
    requiredArguments:
      - plan_id
    carriedArguments:
      - plan_id
    description: "Preview or apply generated mask workflow artifacts after reviewing the plan."
tools:
  - name: plan_mask_rule
    title: Plan Mask Rule
    description: >-
      Plan a ShardingSphere mask rule workflow for a logical table column. This tool creates reviewable rule and DistSQL artifacts
      but does not execute them; use apply_workflow only after user review.
    fields:
      - name: plan_id
        required: false
        valueDefinition:
          type: STRING
          description: "Optional existing workflow plan identifier used to continue or revise a previous mask plan."
      - name: database
        required: false
        valueDefinition:
          type: STRING
          description: "ShardingSphere logical database that owns the target table."
      - name: schema
        required: false
        valueDefinition:
          type: STRING
          description: "Optional schema or namespace that owns the target logical table."
      - name: table
        required: false
        valueDefinition:
          type: STRING
          description: "Target ShardingSphere logical table name."
      - name: column
        required: false
        valueDefinition:
          type: STRING
          description: "Target logical column name to mask."
      - name: operation_type
        required: false
        valueDefinition:
          type: STRING
          description: "Mask rule lifecycle operation requested by the user."
          enumValues:
            - create
            - alter
            - drop
      - name: natural_language_intent
        required: false
        valueDefinition:
          type: STRING
          description: "User request in natural language, used together with structured_intent_evidence to clarify masking behavior."
      - name: structured_intent_evidence
        required: false
        valueDefinition:
          type: OBJECT
          description: "Structured intent extracted from the user request. Mask planning primarily uses field_semantics; other fields are kept explicit for cross-feature consistency."
          additionalProperties: false
          objectProperties:
            - name: requires_decrypt
              required: false
              valueDefinition:
                type: BOOLEAN
                description: "Whether plaintext recovery is required; mask planning treats this as evidence to ask for clarification."
            - name: requires_equality_filter
              required: false
              valueDefinition:
                type: BOOLEAN
                description: "Whether equality predicates are relevant; mask planning treats this as evidence to ask for clarification."
            - name: requires_like_query
              required: false
              valueDefinition:
                type: BOOLEAN
                description: "Whether LIKE predicates are relevant; mask planning treats this as evidence to ask for clarification."
            - name: field_semantics
              required: false
              valueDefinition:
                type: STRING
                description: "Domain meaning such as phone number, email, ID card, or other sensitive field category."
      - name: delivery_mode
        required: false
        valueDefinition:
          type: STRING
          description: "Whether the plan should return all artifacts at once or guide the user step by step."
          enumValues:
            - all-at-once
            - step-by-step
      - name: execution_mode
        required: false
        valueDefinition:
          type: STRING
          description: "Preferred final mode for later apply_workflow after preview and user approval."
          enumValues:
            - review-then-execute
            - manual-only
      - name: user_overrides
        required: false
        valueDefinition:
          type: OBJECT
          description: "Optional user-selected mask algorithm fields."
          additionalProperties: false
          objectProperties:
            - name: algorithm_type
              required: false
              valueDefinition:
                type: STRING
                description: "Primary mask algorithm type override."
      - name: algorithm_type
        required: false
        valueDefinition:
          type: STRING
          description: "Primary mask algorithm type override; equivalent to user_overrides.algorithm_type."
      - name: primary_algorithm_properties
        required: false
        valueDefinition:
          type: OBJECT
          description: "Plugin-defined primary mask algorithm properties. Accepted keys depend on the selected algorithm descriptor returned in planning output."
          additionalProperties: true
    outputSchema:
      type: object
      properties:
        response_mode:
          type: string
          description: "Stable response mode marker for workflow planning, or terminal when planning cannot continue."
          enum:
            - planning
            - terminal
        plan_id:
          type: string
          description: "Workflow plan identifier for apply_workflow and validate_workflow."
        workflow_kind:
          type: string
          description: "Workflow kind resolved by the planner."
        status:
          type: string
          description: "Stable workflow status, such as clarifying, planned, or failed."
        missing_required_inputs:
          type: array
          description: "Inputs still required before the plan can be completed."
        clarification_questions:
          type: array
          description: "Structured questions for the model to ask the user, including field, input_type, secret flag, and display_message."
        issues:
          type: array
          description: "Warnings, conflicts, and validation issues found during planning."
        global_steps:
          type: array
          description: "Workflow review and execution steps."
        current_step:
          type: string
          description: "Current workflow step."
        algorithm_recommendations:
          type: array
          description: "Recommended mask algorithms and ranking reasons."
        property_requirements:
          type: array
          description: "Required and optional algorithm properties for the selected mask algorithm."
        validation_strategy:
          type: object
          description: "Validation strategy generated by the planner."
        delivery_mode:
          type: string
          description: "Planner delivery mode used for user interaction."
        execution_mode:
          type: string
          description: "Preferred later apply mode captured by the plan."
        intent_inference:
          type: object
          description: "Resolved operation type, inferred values, unresolved fields, and reasoning notes."
        review_focus:
          type: object
          description: "Compact planning review focus: artifact categories, side-effect scope, manual-only mode, and next review action."
        next_actions:
          type: array
          description: "Ordered model-facing recommendations for the next call or user question."
          items:
            type: object
            properties:
              order:
                type: integer
                description: "1-based action order."
              type:
                type: string
                description: "Canonical action type such as tool_call, resource_read, ask_user, completion, or terminal."
              title:
                type: string
                description: "Short model-facing action title."
              requires_user_approval:
                type: boolean
                description: "Whether the next action requires user approval."
              tool_name:
                type: string
                description: "Canonical tool name when type is tool_call."
              resource_uri:
                type: string
                description: "Canonical resource URI when type is resource_read."
              arguments:
                type: object
                description: "Canonical arguments to provide to the target tool."
              reason:
                type: string
                description: "Why the model should take this action."
              required_inputs:
                type: array
                description: "User inputs needed before continuing."
        resources_to_read:
          type: array
          description: "Typed resources the model should read when more metadata or algorithm context is useful."
        requires_user_approval:
          type: boolean
          description: "Whether the preferred next action needs visible user approval before side effects."
      examples:
        - response_mode: planning
          plan_id: mask-rule-20260505-001
          status: planned
          workflow_kind: mask.rule
          missing_required_inputs: []
          clarification_questions: []
          issues: []
          global_steps: []
          current_step: review
          algorithm_recommendations: []
          property_requirements:
            - role: primary
              property_key: from-x
              required: true
              secret: false
          validation_strategy: {}
          delivery_mode: all-at-once
          execution_mode: review-then-execute
          intent_inference: {}
          resources_to_read:
            - uri: shardingsphere://features/mask/algorithms
              resource_kind: algorithm
              purpose: read_first
              reason: Read mask algorithm metadata before choosing algorithm arguments.
              source_field: resources_to_read
          next_actions:
            - order: 1
              type: tool_call
              title: Call apply_workflow
              tool_name: apply_workflow
              arguments: {}
              reason: Preview generated workflow artifacts.
              requires_user_approval: false
          requires_user_approval: false
    annotations:
      title: Plan Mask Rule
      readOnlyHint: true
      destructiveHint: false
      idempotentHint: true
      openWorldHint: true
      returnDirect: false
    meta:
      workflowRole: plan
      workflowKind: mask.rule
      relatedResources:
        - shardingsphere://features/mask/algorithms
        - shardingsphere://features/mask/databases/{database}/rules
        - shardingsphere://features/mask/databases/{database}/tables/{table}/rules
        - shardingsphere://databases/{database}/schemas/{schema}/tables/{table}/columns
      followUpTools:
        - apply_workflow
        - validate_workflow
