resources:
  - uri: shardingsphere://features/shadow/algorithm-plugins
    name: shadow-algorithm-plugins
    title: Shadow Algorithm Plugins
    description: "List shadow algorithm plugins visible from the current ShardingSphere runtime with built-in property guidance."
    mimeType: application/json
    meta:
      org.apache.shardingsphere/runtime-visibility: ShardingSphere-Proxy
    shardingSphereMetadata:
      resourceKind: list
      feature: shadow
      relatedTools:
        - database_gateway_plan_shadow_rule
        - database_gateway_plan_default_shadow_algorithm
resourceTemplates:
  - uriTemplate: shardingsphere://features/shadow/databases/{database}/rules
    name: shadow-rules
    title: Shadow Rules
    description: "List shadow rules for one ShardingSphere logical database through DistSQL-visible state."
    mimeType: application/json
    shardingSphereMetadata:
      uriVariables:
        - name: database
          title: Logical Database
          description: "ShardingSphere logical database whose shadow rules should be inspected."
          required: true
          scope: logical-database
      resourceKind: list
      feature: shadow
      relatedTools:
        - database_gateway_plan_shadow_rule
        - database_gateway_plan_shadow_algorithm_cleanup
        - database_gateway_validate_workflow
  - uriTemplate: shardingsphere://features/shadow/databases/{database}/rules/{rule}
    name: shadow-rule
    title: Shadow Rule
    description: "Read one shadow rule by name through DistSQL-visible rule state."
    mimeType: application/json
    shardingSphereMetadata:
      uriVariables:
        - name: database
          title: Logical Database
          description: "ShardingSphere logical database that owns the shadow rule."
          required: true
          scope: logical-database
        - name: rule
          title: Rule Name
          description: "Shadow rule name."
          required: true
          scope: logical-rule
      resourceKind: rule
      feature: shadow
      relatedTools:
        - database_gateway_plan_shadow_rule
        - database_gateway_validate_workflow
  - uriTemplate: shardingsphere://features/shadow/databases/{database}/table-rules
    name: shadow-table-rules
    title: Shadow Table Rules
    description: "List shadow table rules and their shadow algorithm names."
    mimeType: application/json
    shardingSphereMetadata:
      uriVariables:
        - name: database
          title: Logical Database
          description: "ShardingSphere logical database whose shadow table rules should be inspected."
          required: true
          scope: logical-database
      resourceKind: list
      feature: shadow
      relatedTools:
        - database_gateway_plan_shadow_rule
        - database_gateway_plan_shadow_algorithm_cleanup
        - database_gateway_validate_workflow
  - uriTemplate: shardingsphere://features/shadow/databases/{database}/tables/{table}/rules
    name: shadow-table-rule
    title: Shadow Table Rule
    description: "Read shadow table rule rows for one logical table."
    mimeType: application/json
    shardingSphereMetadata:
      uriVariables:
        - name: database
          title: Logical Database
          description: "ShardingSphere logical database that owns the shadow table rule."
          required: true
          scope: logical-database
        - name: table
          title: Logical Table
          description: "Logical table name."
          required: true
          scope: logical-table
      resourceKind: rule
      feature: shadow
      relatedTools:
        - database_gateway_plan_shadow_rule
        - database_gateway_validate_workflow
  - uriTemplate: shardingsphere://features/shadow/databases/{database}/algorithms
    name: shadow-algorithms
    title: Shadow Algorithms
    description: "List configured shadow algorithms and their default marker."
    mimeType: application/json
    shardingSphereMetadata:
      uriVariables:
        - name: database
          title: Logical Database
          description: "ShardingSphere logical database whose shadow algorithms should be inspected."
          required: true
          scope: logical-database
      resourceKind: list
      feature: shadow
      relatedTools:
        - database_gateway_plan_default_shadow_algorithm
        - database_gateway_plan_shadow_algorithm_cleanup
        - database_gateway_validate_workflow
  - uriTemplate: shardingsphere://features/shadow/databases/{database}/default-algorithm
    name: default-shadow-algorithm
    title: Default Shadow Algorithm
    description: "Read the default shadow algorithm for one logical database."
    mimeType: application/json
    shardingSphereMetadata:
      uriVariables:
        - name: database
          title: Logical Database
          description: "ShardingSphere logical database whose default shadow algorithm should be inspected."
          required: true
          scope: logical-database
      resourceKind: rule
      feature: shadow
      relatedTools:
        - database_gateway_plan_default_shadow_algorithm
        - database_gateway_plan_shadow_algorithm_cleanup
        - database_gateway_validate_workflow
  - uriTemplate: shardingsphere://features/shadow/databases/{database}/rule-count
    name: shadow-rule-count
    title: Shadow Rule Count
    description: "Count shadow rules for one ShardingSphere logical database."
    mimeType: application/json
    shardingSphereMetadata:
      uriVariables:
        - name: database
          title: Logical Database
          description: "ShardingSphere logical database whose shadow rule count should be inspected."
          required: true
          scope: logical-database
      resourceKind: list
      feature: shadow
      relatedTools:
        - database_gateway_plan_shadow_rule
        - database_gateway_validate_workflow
prompts:
  - name: plan_shadow_rule
    title: Plan Shadow Rule
    description: "Guide the model to plan ShardingSphere shadow rule DistSQL from current rule, table-rule, and algorithm state."
    binding:
      templateResource: META-INF/shardingsphere-mcp/prompts/plan-shadow-rule.md
    arguments:
      - name: database
        title: Logical Database
        description: "ShardingSphere logical database that owns the shadow rule."
        required: false
      - name: rule
        title: Rule Name
        description: "Shadow rule name."
        required: false
      - name: operation_type
        title: Operation Type
        description: "Rule lifecycle operation: create, alter, or drop."
        required: false
      - name: source_storage_unit
        title: Source Storage Unit
        description: "Existing production/source storage unit name."
        required: false
      - name: shadow_storage_unit
        title: Shadow Storage Unit
        description: "Existing shadow storage unit name."
        required: false
      - name: table
        title: Logical Table
        description: "Logical table name for the shadow table rule."
        required: false
      - name: algorithm_type
        title: Algorithm Type
        description: "Shadow algorithm type, such as SQL_HINT, VALUE_MATCH, or REGEX_MATCH."
        required: false
      - name: plan_id
        title: Workflow Plan ID
        description: "Optional current-session workflow plan identifier used to continue a shadow rule plan."
        required: false
    meta:
      org.apache.shardingsphere/related-tools:
        - database_gateway_plan_shadow_rule
        - database_gateway_apply_workflow
        - database_gateway_validate_workflow
      org.apache.shardingsphere/related-resource-uris:
        - shardingsphere://features/shadow/databases/{database}/rules
        - shardingsphere://features/shadow/databases/{database}/table-rules
        - shardingsphere://features/shadow/algorithm-plugins
      org.apache.shardingsphere/stop-conditions:
        - "Stop after database_gateway_plan_shadow_rule returns a planned workflow with plan_id and reviewable artifacts."
        - "Stop after a clarifying response lists missing inputs instead of guessing storage units or algorithms."
      org.apache.shardingsphere/ask-user-conditions:
        - "Ask when database, rule, source storage unit, shadow storage unit, table, algorithm type, or required properties are unclear."
        - "Ask before applying generated shadow rule DistSQL that changes runtime state."
  - name: plan_default_shadow_algorithm
    title: Plan Default Shadow Algorithm
    description: "Guide the model to plan default shadow algorithm DistSQL from current default and configured algorithm state."
    binding:
      templateResource: META-INF/shardingsphere-mcp/prompts/plan-default-shadow-algorithm.md
    arguments:
      - name: database
        title: Logical Database
        description: "ShardingSphere logical database that owns the default shadow algorithm."
        required: false
      - name: operation_type
        title: Operation Type
        description: "Default algorithm lifecycle operation: create, alter, or drop."
        required: false
      - name: algorithm_type
        title: Algorithm Type
        description: "Default shadow algorithm type."
        required: false
      - name: plan_id
        title: Workflow Plan ID
        description: "Optional current-session workflow plan identifier used to continue a default shadow algorithm plan."
        required: false
    meta:
      org.apache.shardingsphere/related-tools:
        - database_gateway_plan_default_shadow_algorithm
        - database_gateway_apply_workflow
        - database_gateway_validate_workflow
      org.apache.shardingsphere/related-resource-uris:
        - shardingsphere://features/shadow/databases/{database}/default-algorithm
        - shardingsphere://features/shadow/databases/{database}/algorithms
        - shardingsphere://features/shadow/algorithm-plugins
      org.apache.shardingsphere/stop-conditions:
        - "Stop after database_gateway_plan_default_shadow_algorithm returns a planned workflow with plan_id and reviewable artifacts."
      org.apache.shardingsphere/ask-user-conditions:
        - "Ask when database, operation, algorithm type, or required properties are unclear."
        - "Ask before applying generated default shadow algorithm DistSQL that changes runtime state."
  - name: plan_shadow_algorithm_cleanup
    title: Plan Shadow Algorithm Cleanup
    description: "Guide the model to drop a configured shadow algorithm only when DistSQL-visible state proves it is unused."
    binding:
      templateResource: META-INF/shardingsphere-mcp/prompts/plan-shadow-algorithm-cleanup.md
    arguments:
      - name: database
        title: Logical Database
        description: "ShardingSphere logical database that owns the shadow algorithm."
        required: false
      - name: algorithm_name
        title: Algorithm Name
        description: "Configured shadow algorithm name to clean up."
        required: false
      - name: plan_id
        title: Workflow Plan ID
        description: "Optional current-session workflow plan identifier used to continue a shadow algorithm cleanup plan."
        required: false
    meta:
      org.apache.shardingsphere/related-tools:
        - database_gateway_plan_shadow_algorithm_cleanup
        - database_gateway_apply_workflow
        - database_gateway_validate_workflow
      org.apache.shardingsphere/related-resource-uris:
        - shardingsphere://features/shadow/databases/{database}/algorithms
        - shardingsphere://features/shadow/databases/{database}/table-rules
        - shardingsphere://features/shadow/databases/{database}/default-algorithm
      org.apache.shardingsphere/stop-conditions:
        - "Stop after database_gateway_plan_shadow_algorithm_cleanup returns a planned workflow with plan_id and reviewable artifacts."
        - "Stop when the algorithm is still referenced by table rules or default algorithm state."
      org.apache.shardingsphere/ask-user-conditions:
        - "Ask when database or algorithm name is unclear."
        - "Ask before applying generated shadow algorithm cleanup DistSQL that changes runtime state."
completionTargets:
  - referenceType: prompt
    reference: plan_shadow_rule
    arguments:
      - database
      - algorithm_type
    maxValues: 50
  - referenceType: prompt
    reference: plan_default_shadow_algorithm
    arguments:
      - database
      - algorithm_type
    maxValues: 50
  - referenceType: prompt
    reference: plan_shadow_algorithm_cleanup
    arguments:
      - database
    maxValues: 50
resourceNavigation:
  - from: shardingsphere://features/shadow/databases/{database}/rules
    to: database_gateway_plan_shadow_rule
    requiredArguments:
      - database
    carriedArguments:
      - database
    description: "Inspect current shadow rules before planning create, alter, or drop."
  - from: shardingsphere://features/shadow/databases/{database}/table-rules
    to: database_gateway_plan_shadow_rule
    requiredArguments:
      - database
    carriedArguments:
      - database
    description: "Inspect current table-to-algorithm references before planning rule changes."
  - from: shardingsphere://features/shadow/databases/{database}/algorithms
    to: database_gateway_plan_shadow_algorithm_cleanup
    requiredArguments:
      - database
    carriedArguments:
      - database
    description: "Inspect configured algorithms before cleanup."
  - from: shardingsphere://features/shadow/databases/{database}/default-algorithm
    to: database_gateway_plan_default_shadow_algorithm
    requiredArguments:
      - database
    carriedArguments:
      - database
    description: "Inspect the current default shadow algorithm before planning changes."
  - from: shardingsphere://features/shadow/algorithm-plugins
    to: database_gateway_plan_shadow_rule
    requiredArguments: []
    carriedArguments:
      - algorithm_type
    description: "Choose an available shadow algorithm before planning create or alter."
  - from: shardingsphere://features/shadow/algorithm-plugins
    to: database_gateway_plan_default_shadow_algorithm
    requiredArguments: []
    carriedArguments:
      - algorithm_type
    description: "Choose an available shadow algorithm before planning the default algorithm."
  - from: database_gateway_plan_shadow_rule
    to: shardingsphere://workflows/{plan_id}
    requiredArguments:
      - plan_id
    carriedArguments:
      - plan_id
    description: "Read the persisted workflow plan after planning shadow rule changes."
  - from: database_gateway_plan_shadow_rule
    to: database_gateway_apply_workflow
    requiredArguments:
      - plan_id
    carriedArguments:
      - plan_id
    description: "Apply the reviewed shadow rule workflow after user approval."
  - from: database_gateway_plan_default_shadow_algorithm
    to: shardingsphere://workflows/{plan_id}
    requiredArguments:
      - plan_id
    carriedArguments:
      - plan_id
    description: "Read the persisted workflow plan after planning default shadow algorithm changes."
  - from: database_gateway_plan_default_shadow_algorithm
    to: database_gateway_apply_workflow
    requiredArguments:
      - plan_id
    carriedArguments:
      - plan_id
    description: "Apply the reviewed default shadow algorithm workflow after user approval."
  - from: database_gateway_plan_shadow_algorithm_cleanup
    to: shardingsphere://workflows/{plan_id}
    requiredArguments:
      - plan_id
    carriedArguments:
      - plan_id
    description: "Read the persisted workflow plan after planning shadow algorithm cleanup."
  - from: database_gateway_plan_shadow_algorithm_cleanup
    to: database_gateway_apply_workflow
    requiredArguments:
      - plan_id
    carriedArguments:
      - plan_id
    description: "Apply the reviewed shadow algorithm cleanup workflow after user approval."
tools:
  - name: database_gateway_plan_shadow_rule
    title: Plan Shadow Rule
    description: >-
      Plan a ShardingSphere shadow rule workflow. This tool creates reviewable rule DistSQL artifacts
      but does not execute them; use database_gateway_apply_workflow only after user review.
    inputSchema:
      type: object
      properties:
        plan_id:
          type: string
          description: "Optional existing workflow plan identifier used to continue or revise a previous shadow plan."
        database:
          type: string
          description: "ShardingSphere logical database that owns the shadow rule."
        rule:
          type: string
          description: "Shadow rule name."
        operation_type:
          type: string
          description: "Shadow rule lifecycle operation."
          enum:
            - create
            - alter
            - drop
        source_storage_unit:
          type: string
          description: "Existing production/source storage unit name."
        shadow_storage_unit:
          type: string
          description: "Existing shadow storage unit name."
        table:
          type: string
          description: "Logical table name for the shadow table rule."
        algorithm_type:
          type: string
          description: "Shadow algorithm type, such as SQL_HINT, VALUE_MATCH, or REGEX_MATCH."
        algorithm_properties:
          type: object
          description: "Shadow algorithm properties."
          additionalProperties:
            type: string
        natural_language_intent:
          type: string
          description: "User request in natural language."
        structured_intent_evidence:
          type: object
          description: "Shadow structured intent extracted from the user request."
          properties:
            rule:
              type: string
            source_storage_unit:
              type: string
            shadow_storage_unit:
              type: string
            table:
              type: string
            algorithm_type:
              type: string
          required: []
          additionalProperties: false
        delivery_mode:
          type: string
          enum:
            - all-at-once
            - step-by-step
        execution_mode:
          type: string
          enum:
            - review-then-execute
            - manual-only
      required: []
      additionalProperties: false
    outputSchema: &workflowPlanOutputSchema
      type: object
      properties:
        response_mode:
          type: string
          description: "Stable response mode marker for workflow planning, or terminal when planning cannot continue."
          enum:
            - planning
            - terminal
        summary:
          type: string
          description: "Short model-facing workflow planning summary."
        plan_id:
          type: string
          description: "Workflow plan identifier for database_gateway_apply_workflow and database_gateway_validate_workflow."
        workflow_kind:
          type: string
          description: "Workflow kind resolved by the planner."
        status:
          type: string
          description: "Stable workflow status, such as clarifying, planned, or failed."
        missing_required_inputs:
          type: array
          description: "Inputs still required before the plan can be completed."
          items:
            type: string
        clarification_questions:
          type: array
          description: "Structured questions for missing workflow inputs."
          items:
            type: object
        elicitation_support:
          type: object
          description: "Evaluated MCP elicitation capability and the selected interaction path when automatic form continuation cannot be used."
        fallback_reason:
          type: string
          description: "Machine-readable reason explaining why the planner returned structured fallback instead of automatic form continuation."
        issues:
          type: array
          description: "Warnings, conflicts, and validation issues found during planning."
        global_steps:
          type: array
          description: "Workflow review and execution steps."
        current_step:
          type: string
          description: "Current workflow step."
        algorithm_recommendations:
          type: array
          description: "Recommended shadow algorithms and ranking reasons."
        property_requirements:
          type: array
          description: "Required and optional algorithm properties for selected shadow algorithms."
        validation_strategy:
          type: object
          description: "Validation strategy generated by the planner."
        delivery_mode:
          type: string
          description: "Planner delivery mode used for user interaction."
        execution_mode:
          type: string
          description: "Preferred later apply mode captured by the plan."
        intent_inference:
          type: object
          description: "Resolved operation type, inferred values, unresolved fields, and reasoning notes."
        argument_provenance:
          type: object
          description: "Source of important workflow arguments, such as user-provided, inferred, or server-defaulted values."
        review_focus:
          type: object
          description: "Compact planning review focus: artifact categories, side-effect scope, manual-only mode, and next review action."
        distsql_artifacts:
          type: array
          description: "Generated shadow DistSQL artifacts for review."
          items:
            type: object
        resources_to_read:
          type: array
          description: "Resources the model should read before retrying or validating the plan."
          items:
            type: object
        proxy_topology_hint:
          type: object
          description: "Proxy topology guidance collected for DistSQL review."
        next_actions:
          type: array
          description: "Ordered next actions for the model or user."
          items:
            type: object
            properties:
              order:
                type: integer
                description: "1-based action order."
              type:
                type: string
                description: "Canonical action type such as tool_call, resource_read, ask_user, completion, or terminal."
              title:
                type: string
                description: "Short model-facing action title."
              tool_name:
                type: string
                description: "Canonical tool name when type is tool_call."
              resource_uri:
                type: string
                description: "Canonical resource URI when type is resource_read."
              arguments:
                type: object
                description: "Canonical arguments to provide to the target tool."
              reason:
                type: string
                description: "Why the model should take this action."
              required_inputs:
                type: array
                description: "User inputs needed before continuing."
      required:
        - response_mode
        - plan_id
        - workflow_kind
        - status
      additionalProperties: true
      examples:
        - response_mode: planning
          summary: Workflow plan `shadow-rule-20260606-001` for shadow.rule is ready for preview.
          plan_id: shadow-rule-20260606-001
          workflow_kind: shadow.rule
          status: planned
          database: shadow_db
          rule: shadow_rule
          missing_required_inputs: []
          clarification_questions: []
          distsql_artifacts: []
          resources_to_read: []
          proxy_topology_hint: {}
          next_actions: []
    annotations:
      title: Plan Shadow Rule
      destructiveHint: false
      idempotentHint: false
      openWorldHint: false
      readOnlyHint: false
    runtime:
      workflowRole: plan
    meta:
      org.apache.shardingsphere/workflow-kind: shadow.rule
      org.apache.shardingsphere/artifact-categories:
        - rule_distsql
      org.apache.shardingsphere/side-effect-scope:
        - rule-metadata
      org.apache.shardingsphere/related-resource-uris:
        - shardingsphere://features/shadow/databases/{database}/rules
        - shardingsphere://features/shadow/databases/{database}/table-rules
        - shardingsphere://features/shadow/algorithm-plugins
      org.apache.shardingsphere/follow-up-tools:
        - database_gateway_apply_workflow
        - database_gateway_validate_workflow
  - name: database_gateway_plan_default_shadow_algorithm
    title: Plan Default Shadow Algorithm
    description: >-
      Plan a ShardingSphere default shadow algorithm workflow. This tool creates reviewable rule DistSQL artifacts
      but does not execute them.
    inputSchema:
      type: object
      properties:
        plan_id:
          type: string
        database:
          type: string
        operation_type:
          type: string
          enum:
            - create
            - alter
            - drop
        algorithm_type:
          type: string
        algorithm_properties:
          type: object
          additionalProperties:
            type: string
        natural_language_intent:
          type: string
        structured_intent_evidence:
          type: object
          properties:
            algorithm_type:
              type: string
          required: []
          additionalProperties: false
        delivery_mode:
          type: string
          enum:
            - all-at-once
            - step-by-step
        execution_mode:
          type: string
          enum:
            - review-then-execute
            - manual-only
      required: []
      additionalProperties: false
    outputSchema:
      <<: *workflowPlanOutputSchema
      examples:
        - response_mode: planning
          summary: Workflow plan `default-shadow-algorithm-20260606-001` for shadow.default is ready for preview.
          plan_id: default-shadow-algorithm-20260606-001
          workflow_kind: shadow.default
          status: planned
          database: shadow_db
          missing_required_inputs: []
          clarification_questions: []
          distsql_artifacts: []
          resources_to_read: []
          proxy_topology_hint: {}
          next_actions: []
    annotations:
      title: Plan Default Shadow Algorithm
      destructiveHint: false
      idempotentHint: false
      openWorldHint: false
      readOnlyHint: false
    runtime:
      workflowRole: plan
    meta:
      org.apache.shardingsphere/workflow-kind: shadow.default
      org.apache.shardingsphere/artifact-categories:
        - rule_distsql
      org.apache.shardingsphere/side-effect-scope:
        - rule-metadata
      org.apache.shardingsphere/related-resource-uris:
        - shardingsphere://features/shadow/databases/{database}/default-algorithm
        - shardingsphere://features/shadow/databases/{database}/algorithms
        - shardingsphere://features/shadow/algorithm-plugins
      org.apache.shardingsphere/follow-up-tools:
        - database_gateway_apply_workflow
        - database_gateway_validate_workflow
  - name: database_gateway_plan_shadow_algorithm_cleanup
    title: Plan Shadow Algorithm Cleanup
    description: >-
      Plan a safe `DROP SHADOW ALGORITHM` workflow only when DistSQL-visible table-rule and default-algorithm state
      proves the target algorithm is unused. This tool creates reviewable rule DistSQL artifacts but does not execute them.
    inputSchema:
      type: object
      properties:
        plan_id:
          type: string
        database:
          type: string
        algorithm_name:
          type: string
        natural_language_intent:
          type: string
        structured_intent_evidence:
          type: object
          properties:
            algorithm_name:
              type: string
          required: []
          additionalProperties: false
        delivery_mode:
          type: string
          enum:
            - all-at-once
            - step-by-step
        execution_mode:
          type: string
          enum:
            - review-then-execute
            - manual-only
      required: []
      additionalProperties: false
    outputSchema:
      <<: *workflowPlanOutputSchema
      examples:
        - response_mode: planning
          summary: Workflow plan `shadow-algorithm-cleanup-20260606-001` for shadow.cleanup is ready for preview.
          plan_id: shadow-algorithm-cleanup-20260606-001
          workflow_kind: shadow.cleanup
          status: planned
          database: shadow_db
          missing_required_inputs: []
          clarification_questions: []
          distsql_artifacts: []
          resources_to_read: []
          proxy_topology_hint: {}
          next_actions: []
    annotations:
      title: Plan Shadow Algorithm Cleanup
      destructiveHint: false
      idempotentHint: false
      openWorldHint: false
      readOnlyHint: false
    runtime:
      workflowRole: plan
    meta:
      org.apache.shardingsphere/workflow-kind: shadow.cleanup
      org.apache.shardingsphere/artifact-categories:
        - rule_distsql
      org.apache.shardingsphere/side-effect-scope:
        - rule-metadata
      org.apache.shardingsphere/related-resource-uris:
        - shardingsphere://features/shadow/databases/{database}/algorithms
        - shardingsphere://features/shadow/databases/{database}/table-rules
        - shardingsphere://features/shadow/databases/{database}/default-algorithm
      org.apache.shardingsphere/follow-up-tools:
        - database_gateway_apply_workflow
        - database_gateway_validate_workflow
